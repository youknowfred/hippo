# ---------------------------------------------------------------------------
# Invariants every item must preserve (carried VERBATIM from rounds 1-2).
# An item that violates one is wrong, not bold. `invariant_note` names the
# guard when an item sits in tension.
# ---------------------------------------------------------------------------
guiding_invariants:
  - inv1: markdown-in-git is the single source of authority; index/telemetry/
      graph/rules-derived caches are derived, rebuildable, gitignored.
  - inv2: hooks always exit 0, never download, never block; recall failures
      degrade silently at the hook boundary but become LOUD at doctor/SessionStart.
  - inv3: degradation must be legible — every silent-fallback path gains a
      user-visible signal (nudge/doctor/producer).
  - inv4: destructive/corrective writes are per-item and agent-gated; no bulk
      autonomous sweeps; writes into the rules plane are reviewable per-item diffs.
  - inv5: one canonical name/path per concept; renames and schema changes are
      clean breaks with a version bump, not compat shims.
  - inv6: the UserPromptSubmit hot path stays PURE RETRIEVAL — no LLM calls, no
      network, no consolidation work per-prompt.

# ===========================================================================
# SESSION PROTOCOL — identical discipline to rounds 1-4; the capstone chain
# continues (hippo-enh-t22-* onward).
# ===========================================================================
session_protocol:
  purpose: >-
    Multi-session, multi-agent implementation with no loss of context. This
    file's `status:` fields are the source of truth for WHAT is done; the
    capstone memory chain (hippo-enh-t22-* onward, continuing the round-1..4
    chain) is the source of truth for the STORY (decisions, gotchas, next).
  pick_up: |
    - LAW ZERO for round 5: confirm the tier is RATIFIED before selecting
      items. This file ships with every status `proposed`, Q1/Q2 (r5) PENDING,
      and round-4 Q2/Q3 carried PENDING (ED5R-1); a tier whose gate names an
      unresolved owner decision is not startable. Ratification and each Q
      verdict are dated owner entries (chips or in-session), recorded on the
      tier/item when they land.
    - Read MEMORY.md; open the most recent hippo-enh-t* capstone to learn the
      active tier, what last shipped (with commit shas), and the next item.
    - Read this file; select the next item whose status is planned and all of
      whose dependencies are satisfied. A dependency id that is NOT a round-5
      item (not in workstreams below) is CROSS-FILE — every cross-file dep
      named in this round was verified SHIPPED at 827c607 (EVD-2 outcome lane
      + format_lane_health, JIT-2 touch provenance, FLT-1/2/3 presence lane,
      HYG-1/3 machine census + doctor line, PUB-1/2/3 publish lane, SEC-6
      trust spine, GRW-2 co-recall, GRW-4 decisions ledger, CAP-2/CAP-6
      capture queue, SIG-6/TMB-3/TMB-4 fixture-draft lanes, MSR-5 A/B rig,
      RET-14 outcome prior, DOC-16 stability lint, EXT-3 interview); re-confirm
      on the live tree anyway.
    - READ THE ITEM'S implementation_notes AND ITS TIER'S audit_note FIRST.
      They cite verified seams (file:symbol) as of baseline_ref 827c607.
      VERIFY EACH NAMED SYMBOL STILL EXISTS (the tree WILL have moved by
      build time); follow the note unless the live tree contradicts it, and
      correct it in-file as part of your commit if it does.
    - Sanity-check reality (git log, run the suite) before coding. Check the
      RUNWAY before your first edit: if your item touches session_start.py,
      doctor_checks_corpus.py, eval_recall.py, or telemetry.py, read ED5R-3
      and the tier audit_note's split-debt assignment first.
  execute: |
    - Implement ONE item (or a coherent slice) per RELEASING.md — one
      id-prefixed commit (e.g. "MEA-1: ..."), full suite green after each.
    - Preserve every guiding_invariant. If an item's invariant_note names a
      guard you cannot honor, set status to deferred, record why in the
      capstone, and stop — do not weaken an invariant to land a feature.
    - An item half gated on an owner decision (Q1/Q2 r5, or the carried
      round-4 Q2/Q3) must NOT be built before the dated owner decision lands;
      record the decision on the item when it does (ED5R-1).
    - Add tests pinning each acceptance_criterion (hermetic per-module
      convention; negative-capability pins where an invariant forbids a
      primitive; byte-identity pins where an additive field must not perturb
      existing output).
    - Flip item status planned -> in_progress -> done (or deferred).
  verify: |
    - Every acceptance_criteria demonstrably met; full suite green; no
      invariant regressed; any new silent-fallback path made legible at
      doctor/SessionStart.
    - NO round-5 item is expected to bump corpus_format (5 at baseline) or
      index SCHEMA_VERSION (7) — every artifact here is derived/gitignored,
      display-only, print-only, or additive/absence-emits-nothing. If yours
      needs a bump, re-read the item: it is probably out of scope (ED-4).
    - Ledger-row additive fields (MEA-4 `v`, MEA-6 `tree_path`, WRT-3
      window_decisions) are queue/ledger-own shapes read via .get() — they
      are NOT schema bumps and must not become ones.
  capstone:
    when: >-
      ALWAYS at the end of a session that touched this roadmap, and ALWAYS at
      tier completion. A multi-session tier gets a progress capstone each
      session.
    do: |
      - Write hippo-enh-t<N>-<slug>.md in the project memory dir
        (capstone_template below); continue the round-1..4 chain (link the
        previous capstone).
      - Refresh its one-line MEMORY.md pointer (supersede the prior same-tier
        line).
      - Update this file's item + tier status to match what shipped.
      - Link the new capstone to [[hippo-enh-exploration-r5]] and the prior
        capstone.
    rationale: >-
      The next session may be a different agent with none of this context. The
      capstone + status fields are the entire handoff. Under-recording is the
      main failure mode — write the capstone even if the session shipped
      nothing.
  capstone_template: |
    ---
    name: hippo-enh-t<N>-<slug>
    description: <tier theme> — shipped <X/Y> items; next: <next item id>
    metadata:
      type: project
    ---
    Tier T<N> (<target_version>, "<theme>") — session <YYYY-MM-DD>.
    SHIPPED THIS SESSION: <item-id — one-liner — commit sha> (repeat).
    TIER STATE: <n/total done>; done_means <met | not yet: what remains>.
    ENGINE STATE: suite <green | N failing>; corpus_format <n>; index schema <n>;
      re-bootstrap <yes/no>.
    DECISIONS / GOTCHAS: <invariant guard applied, premise correction vs the
      note, any dated owner decision recorded on an item (esp. Q1/Q2 r5)>.
    NEXT: <next unblocked item id + why>.
    DEFERRED / BLOCKED: <item ids + reason (esp. a PENDING owner-decision gate)>.
    Related: [[hippo-enh-exploration-r5]], [[hippo-enh-t<N-1>-<slug>]].

