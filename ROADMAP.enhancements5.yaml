          and the fold still returned False (the genuinely anomalous case;
          legacy fingerprint-less no-ops stay silent BY DESIGN) — append one
          legible line to their existing output: "this write did not join
          the consent baseline — it will be withheld from recall until
          re-consent (trust_corpus)". Requires a small disambiguation
          helper, since the fold's False is currently overloaded
          (legacy-no-op vs real failure); the helper reads existing state
          (consented_hashes presence), changes nothing. inv3 at the write
          moment; zero new artifact; zero behavior change to the fold
          itself; never hooks/index builds (pinned never-consent paths stay
          silent and unconsenting).
        acceptance_criteria:
          - "the disambiguation is mechanical: trusted + fingerprint present + fold False => anomalous; anything else stays silent (legacy corpora byte-identical — pinned)"
          - "each named write verb appends at most ONE line to its existing agent-facing output; wording names the consequence (withheld until re-consent) and the route (trust_corpus)"
          - "the fold's own behavior is untouched (extend-never-create, never-raise); negative-capability pin: no call site retries, re-consents, or marks trust in response to the line"
          - "hooks and index builds remain out of scope by test — the never-consent pins keep passing"
          - "the alloy shape is the fixture: an authored write against a trusted+fingerprinted corpus whose fold is forced False surfaces the line; the same write on a fingerprint-less corpus stays silent"
        dependencies: []
        invariant_note: >-
          ED-1 — a printed line on agent-invoked verbs; explicitly NOT
          auto-retry or auto-mark_trusted (the unattended re-baseline
          anti-pattern trust.py names). inv3 — this IS the legibility.
          BND-2 catches the same class later at census time; both state the
          pairing so neither assumes the other shipped.
        implementation_notes: >-
          Seams (verified at 827c607): trust.py:record_authored_write
          (:335-374 — return contract; the :476-480 narration is the
          item's own spec) + consented_hashes (:400-419 region — the
          disambiguation read); call sites to touch:
          new_memory.py:1266-1272, packs.py:757-763 + :973-977,
          provenance.py:1037-1039 (reverify_file), links.py:765-767 +
          :846-848 (add_typed_relation), dream_apply.py:288-290,
          dream_generate.py:642-644 — each verb's existing echo/describe
          output is the consumer (ED4R-2). Keep the helper in trust.py
