  # ---------------------------------------------------------------- WRT ---
  - id: WRT
    name: The write side tells the truth (capture/decision legibility)
    extends: CAP-2/CAP-6 capture queue + CAP-LLM triage (default-OFF) + GRW-4 decisions ledger + the SessionEnd/SubagentStop hook pair
    goal: >-
      The capture lane stops fabricating (the triage model gains the right
      to say nothing and a zero-LLM lint gains the right to doubt it),
      stops whispering (a human-invoked --from-hook run states its outcome
      on stderr while hook bytes stay identical), and stops dropping the
      WHY (MCP-recorded decisions get an honest reply and a labeled
      time-window fallback at the drain instead of being silent dead
      letters). Every change is detection/legibility inside existing
      per-item human gates; the hook contract (exit 0, silent, never-raise)
      is untouched.
    items:

      - id: WRT-1
        title: "Triage groundedness: an abstain lane + a mechanical ungrounded-identifier flag on CAP-LLM seeds"
        priority: P1
        effort: M
        status: done           # 2026-07-19, session 3 — abstain lane ({"abstain": true} -> honest llm_triage {"abstained": true}, forced-answer clause REPLACED, carry-over never re-bills an abstention, listed as ABSTAINED) + zero-LLM ungrounded_tokens (PR/issue refs, letter-bearing sha-likes, URLs, versions vs the EXACT prompt text; additive, absent when clean; AST pin holds the judged-lanes kill); both weekly exhibits are tests (capture-428d7452 drained pre-build — reconstructed from this signal per the tier audit_note); heuristic-only seeds byte-identical
        source: {origin: EXPLORATIONS5, verdict: KEEP, signal: "capture_triage.py:227-229 verbatim ('If the session shows no durable fact worth saving, still fill every field with your best single candidate') + :265-266 (_parse_response returns None on empty description — abstention is structurally impossible); TWO fabrications in one week: the '#237 merged' draft (no hippo PR above #85 exists at 827c607) and the LIVE seed in the queue now — capture-428d7452-c9bb-4fad-9c5c-d0dfb642e848.json's llm_triage.draft_description claims this session 'merged T14 invariants' while T14 merged 2026-07-16 as PR #57 (hippo-enh-t14-invariants capstone; the 07-19 session only re-stamped it); re-verified in the queue this cycle"}
        problem: >-
          The capture triage prompt FORCES a fabrication when a session has
          no durable fact — the prompt orders a best-single-candidate answer
          and the parser rejects abstention — so the model invents, and the
          plausible-but-wrong draft is the FIRST thing the drain reviewer
          reads. Measured twice this week, with the second exhibit still
          sitting live in the pending queue. A reviewer who gets burned
          twice stops trusting the lane, which un-earns CAP-LLM's whole
          opt-in.
        proposal: >-
          Two detection-half moves, both inside the existing default-OFF
          HIPPO_CAPTURE_LLM lane: (1) ABSTAIN LANE — extend the strict-JSON
          response shape with an explicit no-durable-fact option and parse
          it into an honest llm_triage {"abstained": true} (or omit the
          triage block) instead of treating emptiness as failure; the
          forced-answer prompt sentence is replaced by the abstain
          instruction. (2) GROUNDEDNESS FLAG — a zero-LLM post-check
          extracting concrete identifiers from the draft (PR/issue #N,
          7+-hex sha-likes, URLs, version strings) and flagging any that
          appear NOWHERE in the prompt evidence as an additive
          ungrounded_tokens list (absent when clean, ED-4);
          capture._format_listing renders one warning line beside the
          existing secret_flagged warning. The drain's per-item human
          ratification is untouched; triage failures still fall back to the
          heuristic-only seed; the flag rides the SEED (fingerprint-changed
          re-captures rebuild it, which is why it cannot live anywhere
          else).
        acceptance_criteria:
          - "the model can abstain: a no-durable-fact response parses into an honest abstained triage state (never a parse failure), and the forced-answer prompt sentence is gone; abstained seeds render as such in the drain listing"
          - "ungrounded_tokens is computed by deterministic extraction + evidence-membership check only (zero LLM — the judged-lanes kill honored); absent when clean; one warning line in _format_listing beside secret_flagged"
          - "both exhibits become tests: a '#N above max-PR' style draft and a wrong-tier-merge style draft each get flagged against fixture evidence; an evidence-grounded draft does not"
          - "HIPPO_CAPTURE_LLM stays default-OFF; hooks stay exit-0 fail-open; heuristic-only seeds are byte-identical to today (pinned)"
        dependencies: []
        invariant_note: >-
          ED-1 — REDUCES LLM authority (the model gains the right to say
          nothing; a mechanical lint gains the right to doubt it); the
          human verdict at the drain is unchanged. inv3 — the warning line
          is the legibility. ED-4 — additive seed fields, queue-own shape.
        implementation_notes: >-
          Seams (verified at 827c607; LIVE-TREE CORRECTION at build, session
          3: the render seam moved — capture._format_listing now lives in
          capture_queue.py behind the facade, split commit 13a004a):
          capture_triage.py:_build_prompt (the forced-answer clause),
          _parse_response (the not-description rejection), enrich_seed
          (evidence fingerprint — the groundedness check runs against the
          EXACT post-belt prompt string so flag and prompt see identical
          text). Keep extraction conservative (identifier classes listed in
          the AC) — the flag must have near-zero false positives to keep its
          authority.

      - id: WRT-2
        title: "Name the no-op: one legible outcome line for human-invoked capture --from-hook"
        priority: P2
        effort: S
        status: done           # 2026-07-19, session 3 — exactly ONE stderr line per --from-hook run (captured -> path / no-episodes with N-sessions-known + nearest-sid paste-typo aid / capture failed: <class>); discriminated (outcome, path, detail) return via the new raising gather core (_gather_session_context_raw) behind the never-raise wrapper; write_session_capture stays path-or-None; hook byte-identity pinned by citing both wired pipelines' `2>/dev/null || true` lines; stdout untouched, exit 0 all cases
        source: {origin: EXPLORATIONS5, verdict: KEEP, signal: "Reproduced this cycle: a --from-hook invocation with a foreign session_id exits 0 with zero output and writes nothing; with a real buffer sid it writes the seed and is STILL silent (capture.py:851-856 'Silent on the hook path' — the success print is gated `if path and not args.from_hook`); write_session_capture returns None for both no-episodes and any-exception (:414, :466-467); the 2026-07-19 incident: an operator's foreign-sid run coincided with a SubagentStop hook minting capture-428d7452 for the CURRENT session, and the silence made the misattribution undetectable; hooks discard stderr (memory_session_end.sh's `2>/dev/null || true` tail), so a stderr line is free"}
        problem: >-
          capture --from-hook has three indistinguishable outcomes at a
          human seam — foreign/unknown session_id, successful seed write,
          and internal failure are all exit-0 with zero output. That is an
          inv3 (legible degradation) gap, and it already produced a real
          misattribution: an operator's no-op run was credited with a seed
          a concurrent hook actually minted.
