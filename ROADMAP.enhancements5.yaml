        source: {origin: EXPLORATIONS5, verdict: KEEP, signal: "TWO independent read-only repros this cycle agreed: co_recall_pairs(td, exclude_names=floor) -> 20 pairs at the _CORECALL_MAX_PAIRS cap (17 fresh after build_graph adjacency drop — the 2026-07-19 incident's exact number), every pair lift 0.99-1.20 vs independence (median 1.06), members individually present in 54-68 of 72 sessions; telemetry.py:612-616 (raw distinct-session tally, min 3, cap 20, no null model); three shipped consumers ingest the pairs as behavioral evidence: mcp_tools_consolidate.py:518 (consolidate Step 4 proposals), deparasite.py:218 ('co-recalled' protection evidence), deparasite.py:301 (demote weak-link signal); design premise hippo-enh-t5-growth capstone ('below threshold -> [] — the sparse map STAYS empty') predates the corpus densifying"}
        problem: >-
          co_recall_pairs proposes raw distinct-session counts with no null
          model; on this corpus that yields 20/20 chance-level pairs —
          dev-history staples co-riding top-N because each is individually
          recalled in 75-94% of sessions — and the -sessions sort plus the
          20-pair cap means staple-x-staple pairs permanently crowd out any
          genuine mid-frequency association. The consolidate Step 4 turn
          burns reviewer time on zero signal (the 2026-07-19 incident: 17
          proposals, zero genuine), deparasite's protection leg can wrongly
          exonerate a parasite that co-rides staples, and the demote
          weak-link signal inherits the same confound.
        proposal: >-
          Detection-first annotation, zero writes: co_recall_pairs computes
          per-name session marginals in the same session-union pass and
          emits observed_sessions + expected_under_independence + lift on
          each pair (additive dict fields — existing consumers keep working
          unchanged); the proposal turn renders lift + member frequencies
          per pair, labels chance-level pairs ("lift ~1.0 — frequency
          confound"), and collapses pairs below a module-constant lift floor
          into ONE legible count line ("N chance-level pairs suppressed —
          lift < X") instead of proposing them (inv3 — nothing silently
