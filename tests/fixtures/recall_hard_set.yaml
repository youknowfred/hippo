# RET-4: code-heavy cases — a fenced traceback/symbol block should still retrieve the memory
# citing that exact symbol/file, now that clean_query MINES fence contents instead of
# deleting them wholesale. Written as the RAW prompt a debugging session would actually send
# (fenced traceback + prose) since eval_recall's hard-set feeds `query` straight into
# recall() (bypassing the hook's clean_query pass) — the mined tokens matter for the real
# UserPromptSubmit path (see tests/test_recall.py's clean_query→recall acceptance test),
# but this fixture pins the corpus-level retrieval outcome either way: the symbol/file
# tokens themselves (present verbatim in the query below) are the signal being pinned.
- query: >-
    our fire-and-forget worker keeps silently dying, trace:
    ```
    Traceback (most recent call last):
      File "worker.py", line 12, in <module>
        task.add_done_callback(_BG_TASKS.discard)
    ```
    what is going on
  expected: [feedback_anchor_fire_and_forget_tasks]
  category: single-hop

- query: >-
    getting this from a code-nav MCP:
    ```
    write_memory(key, value)
    read_memory(key)
    ```
    should the LSP server really be persisting knowledge like this
  expected: [feedback_serena_tools_only]
  category: single-hop

# RET-8: multi-hop cases — the query leans on a SEED memory's situation; the expected stem
# is the seed's [[wikilinked]] neighbor (the packs' two real link clusters), so the case
# validates that connected knowledge surfaces (GRA-1) rather than only direct lookup.
# GRF-2 grew this category 2 -> 10 (both edge directions per cluster; see the condition
# matrix in the header). Keep every query leaning on the SEED's situation — the expected
# stem's own vocabulary must stay weak in the query or the row degenerates to single-hop.
- query: "the timeout cascade recurred after we blamed provider latency again — a safety net caught it this time, so is there anything left to fix?"
  expected: [feedback_fallback_is_still_bug]
  category: multi-hop

- query: "mid-migration the plan adds a canary env flag so existing callers keep working — which of our standing principles does that violate?"
  expected: [feedback_no_backward_compat, feedback_no_tactical_shortcuts]
  category: multi-hop

