# Curated hard-set for the recall merge gate (eval_recall.py gate #2 + #3).
#
# Hand-written CROSS-VOCABULARY paraphrase queries -> the memory file stem(s) that should
# be recalled in the top-10. These deliberately AVOID the vocabulary of each memory's
# `description:` so they exercise the DENSE half of hybrid recall (BM25 alone catches the
# lexical overlaps; the dense embeddings catch the paraphrases).
#
# The stems target the memories this repo SHIPS (plugin/assets/ starter packs) — CI seeds
# a corpus from them and runs the bare CLI against it. Run the same thing locally from the
# repo root:
#
#   .venv/bin/pip install -r plugin/requirements.txt
#   mkdir -p .claude/memory && find plugin/assets -name '*.md' ! -name 'MEMORY.skeleton.md' ! -name 'README.md' -exec cp {} .claude/memory/ \;
#   cp plugin/assets/MEMORY.skeleton.md .claude/memory/MEMORY.md
#   PYTHONPATH=plugin .venv/bin/python -m memory.build_index --memory-dir .claude/memory --index-dir .claude/.memory-index
#   PYTHONPATH=plugin .venv/bin/python -m memory.eval_recall
#
# (In a consuming project, the project-local convention .claude/memory/.audit-fixtures/
# takes precedence over this file — see eval_recall._default_fixture_path.)
#
# `expected` is a list — any one of the listed stems in the top-10 counts as a hit (some
# queries legitimately map to a small cluster of related memories). This is the ONLY
# hand-maintained eval data; keep stems in sync with the shipped packs.
#
# RET-8: every row carries a `category` tag (canonical set: single-hop, multi-hop,
# temporal, update, abstention — eval_recall.CATEGORIES; an untagged row loads as
# single-hop). eval_recall emits recall@10/MRR PER CATEGORY so a regression is
# attributable to the question class that regressed. Categories present here:
#   - single-hop  — the original paraphrase-lookup class (every pre-RET-8 row).
#   - multi-hop   — the answer's own vocabulary is weak in the query; the query pulls
#                   toward a LINKED memory, so GRA-1 neighbor expansion (or a strong
#                   embedding) must carry the expected stem into the top-10. Cases target
#                   the packs' two real wikilink clusters (debugging-discipline:
#                   dont_blame_vendor_latency -> {fallback_is_still_bug,
#                   root_cause_not_symptom_handling, new_logs_mean_recurrence};
#                   engineering-process: no_feature_flagged_refactor_rollouts ->
#                   {no_backward_compat, no_tactical_shortcuts}), in both edge
#                   directions (out: lean the linking seed, expect its target;
#                   in: lean a target, expect the memory that links it).
#
#                   CONDITION MATRIX (index-mode x query-mode; the three production-
#                   reachable modes eval_recall --arms measures — MSR-2):
#                     dense+bm25  dense index resident, dense+bm25 fused query ranking
#                                 (the healthy production path)
#                     bm25-only   no dense index at all (HIPPO_DISABLE_DENSE at build:
#                                 hermetic/CI lanes; MMR and the dense floor never run)
#                     mixed       dense index RESIDENT, bm25-only ranking at query time
#                                 (embed-timeout / cold-model-cache degradation; MMR
#                                 still runs against the loaded matrix)
#
#                   MEASURED AT RET-8 SHIP TIME (2026-07-09, pack corpus, n=2):
#                   bm25-only 1.0, dense+bm25 0.0 — NOT fixture rot. Under BM25 a
#                   zero-term-overlap neighbor has no primary rank, so GRA-1's injection
#                   rides in knee-exempt (the designed path); under dense EVERY entry has
#                   a primary rank, so the knee exemption never fired and expansion was
#                   structurally suppressed (organic-or-knee-cut).
#                   RESOLVED 2026-07-09 (the GRA-1 dense-knee fix, 4d16022): knee
#                   exemption keys on _expand_neighbors' graph-ENDORSED set and the
#                   cliff latches instead of breaking — multi-hop measured 1.0 on both
#                   backends then.
#                   RE-MEASURED AT T9 (2026-07-16, n=2, MSR-2 arms): dense+bm25 had
#                   DRIFTED to 0.5 and mixed scored 0.0 — both legs the MMR diversity
#                   penalty (a wikilink neighbor is definitionally similar to its seed,
#                   so MMR displaced exactly the entries the graph endorsed; the fused
#                   pack corpus had shifted under the v1.16.0 packs restructure).
#                   RESOLVED AT T9 (GRF-2): graph-endorsed entries are exempt from the
#                   MMR re-cut (the knee exemption's symmetric twin), and a seed that is
#                   another seed's 1-hop neighbor is endorsed too (never injected).
#                   POST-FIX (2026-07-16, n=10): dense+bm25 1.0 / bm25-only 1.0 /
#                   mixed 1.0 (dense mrr stays low-ish by design: graph-discounted
#                   lines land mid-list). These rows are the regression tripwire for
#                   both fixes; still do not reword the queries toward the expected
#                   stems (that just relabels single-hop and un-measures the graph).
# temporal and update rows are DELIBERATELY ABSENT: the shipped starter packs are
# evergreen (no superseded facts, no invalid_after boundaries — nothing temporal to ask
# about honestly), so those categories grow in each project's own
# .claude/memory/.audit-fixtures set (the audit skill's Phase-0.5 drafts / SIG-6's
# confirmed abstention-cluster fixtures), where superseded facts actually exist. The
# per-category machinery is pinned against synthetic corpora in tests/test_eval_recall.py.

