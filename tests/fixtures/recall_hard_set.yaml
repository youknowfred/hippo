# Curated hard-set for the recall merge gate (eval_recall.py gate #2 + #3).
#
# Hand-written CROSS-VOCABULARY paraphrase queries -> the memory file stem(s) that should
# be recalled in the top-10. These deliberately AVOID the vocabulary of each memory's
# `description:` so they exercise the DENSE half of hybrid recall (BM25 alone catches the
# lexical overlaps; the dense embeddings catch the paraphrases).
#
# The stems target the memories this repo SHIPS (plugin/assets/ starter packs) — CI seeds
# a corpus from them and runs the bare CLI against it. Run the same thing locally from the
# repo root:
#
#   .venv/bin/pip install -r plugin/requirements.txt
#   mkdir -p .claude/memory && find plugin/assets -name '*.md' ! -name 'MEMORY.skeleton.md' ! -name 'README.md' -exec cp {} .claude/memory/ \;
#   cp plugin/assets/MEMORY.skeleton.md .claude/memory/MEMORY.md
#   PYTHONPATH=plugin .venv/bin/python -m memory.build_index --memory-dir .claude/memory --index-dir .claude/.memory-index
#   PYTHONPATH=plugin .venv/bin/python -m memory.eval_recall
#
# (In a consuming project, the project-local convention .claude/memory/.audit-fixtures/
# takes precedence over this file — see eval_recall._default_fixture_path.)
#
# `expected` is a list — any one of the listed stems in the top-10 counts as a hit (some
# queries legitimately map to a small cluster of related memories). This is the ONLY
# hand-maintained eval data; keep stems in sync with the shipped packs.

- query: "who is responsible for cleaning up outdated memories — do I approve each one?"
  expected: [claude_is_memory_master]

- query: "should we vet a consequential architecture with competing candidates and judges before writing code"
  expected: [adversarial_design_pinning_before_implementation]

- query: "the operator pointed me at one specific issue mid-task — do the other known fixes still apply?"
  expected: [feedback_additive_not_restrictive_redirects]

- query: "my background job vanished before finishing — the garbage collector ate the async task"
  expected: [feedback_anchor_fire_and_forget_tasks]

- query: "should I run the whole test suite after every single file edit during a big refactor"
  expected: [feedback_batch_tests_at_end]

- query: "the slowdown is probably just the upstream provider being slow again, right?"
  expected: [feedback_dont_blame_vendor_latency]

- query: "the urgent production fix is mergeable now — wait for the remaining checks or land it?"
  expected: [feedback_dont_poll_ci_on_hotfix_merges]

- query: "the primary path errored but the fallback caught it, so nothing needs fixing?"
  expected: [feedback_fallback_is_still_bug]

- query: "these failures predate my change — file them as a follow-up ticket instead?"
  expected: [feedback_fix_pre_existing_when_encountered]

- query: "the user sent fresh error output for something I already patched last week"
  expected: [feedback_new_logs_mean_recurrence]

- query: "keep the old code path alive so existing callers don't break during the migration?"
  expected: [feedback_no_backward_compat, feedback_no_legacy_read_fallbacks]

- query: "roll the internal refactor out behind an env flag with a phased canary first?"
  expected: [feedback_no_feature_flagged_refactor_rollouts]

- query: "stash my in-flight work to check whether the bug exists on a clean tree"
  expected: [feedback_no_git_stash_for_fault_attribution]

- query: "could we hit plan limits if we enable this — should I warn about upgrading the subscription?"
  expected: [feedback_no_hedging_on_confirmed_paid_services]

- query: "just wrap it in a try/except and log a warning so it stops crashing"
  expected: [feedback_root_cause_not_symptom_handling]

- query: "which MCP server should handle remembering things versus navigating code symbols"
  expected: [feedback_serena_tools_only]

- query: "three related bugs triaged together — open three separate pull requests?"
  expected: [feedback_single_pr_separate_commits]

- query: "will promoting this branch drop any commits — what diff do I trust to check"
  expected: [feedback_two_dot_diff_for_lost_work]

- query: "how should commits be attributed — do we include the AI co-author trailer?"
  expected: [oss-attribution-no-claude]

- query: "tempted to write a plan document and defer the hard half to avoid complexity"
  expected: [feedback_no_tactical_shortcuts]

# RET-4: code-heavy cases — a fenced traceback/symbol block should still retrieve the memory
# citing that exact symbol/file, now that clean_query MINES fence contents instead of
# deleting them wholesale. Written as the RAW prompt a debugging session would actually send
# (fenced traceback + prose) since eval_recall's hard-set feeds `query` straight into
# recall() (bypassing the hook's clean_query pass) — the mined tokens matter for the real
# UserPromptSubmit path (see tests/test_recall.py's clean_query→recall acceptance test),
# but this fixture pins the corpus-level retrieval outcome either way: the symbol/file
# tokens themselves (present verbatim in the query below) are the signal being pinned.
- query: >-
    our fire-and-forget worker keeps silently dying, trace:
    ```
    Traceback (most recent call last):
      File "worker.py", line 12, in <module>
        task.add_done_callback(_BG_TASKS.discard)
    ```
    what is going on
  expected: [feedback_anchor_fire_and_forget_tasks]

- query: >-
    getting this from a code-nav MCP:
    ```
    write_memory(key, value)
    read_memory(key)
    ```
    should the LSP server really be persisting knowledge like this
  expected: [feedback_serena_tools_only]
