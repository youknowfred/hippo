  expected: [claude_is_memory_master]
  category: single-hop

- query: "should we vet a consequential architecture with competing candidates and judges before writing code"
  expected: [adversarial_design_pinning_before_implementation]
  category: single-hop

- query: "the operator pointed me at one specific issue mid-task — do the other known fixes still apply?"
  expected: [feedback_additive_not_restrictive_redirects]
  category: single-hop

- query: "my background job vanished before finishing — the garbage collector ate the async task"
  expected: [feedback_anchor_fire_and_forget_tasks]
  category: single-hop

- query: "should I run the whole test suite after every single file edit during a big refactor"
  expected: [feedback_batch_tests_at_end]
