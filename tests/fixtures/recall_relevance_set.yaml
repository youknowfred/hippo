# Hand-judged relevance set for the precision@k scorecard metric (eval_recall.py, Tier 1
# of the memory-organism-instrument-immunize roadmap — REPORT-ONLY, never a merge gate).
#
# Distinct from recall_hard_set.yaml's binary recall@k ("any ONE of `expected` in the top-k
# counts as a full hit"): precision@k is a GRADED measure — `relevant` lists every memory
# stem judged relevant to the query, and a query is scored by what FRACTION of the top-k
# slots are occupied by a relevant memory (|top-k ∩ relevant| / k). A handful of entries
# below deliberately list MULTIPLE relevant stems (a real cluster of related memories) so
# the metric actually exercises "found more of the cluster" rather than degenerating into
# the same binary signal hard_set_metrics already reports.
#
# Like recall_hard_set.yaml, these are hand-written CROSS-VOCABULARY paraphrase queries that
# deliberately avoid each memory's own `description:` wording, to exercise the DENSE half of
# hybrid recall. This is the ONLY new hand-maintained eval data this tier adds; keep stems in
# sync with the corpus (a stem that no longer resolves to a file is silently dropped from the
# precision computation, mirroring how eval_recall already treats the hard set).
#
#   ./.venv/bin/pip install -r memory/requirements-memory.txt
#   ./.venv/bin/python -m memory.build_index
#   ./.venv/bin/python -m memory.eval_recall

