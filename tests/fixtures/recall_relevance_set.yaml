# Hand-judged relevance set for the precision@k scorecard metric (eval_recall.py —
# REPORT-ONLY, never a merge gate).
#
# Distinct from recall_hard_set.yaml's binary recall@k ("any ONE of `expected` in the top-k
# counts as a full hit"): precision@k is a GRADED measure — `relevant` lists every memory
# stem judged relevant to the query, and a query is scored by what FRACTION of the top-k
# slots are occupied by a relevant memory (|top-k ∩ relevant| / k). Several entries below
# deliberately list MULTIPLE relevant stems (a real cluster of related memories) so the
# metric actually exercises "found more of the cluster" rather than degenerating into the
# same binary signal hard_set_metrics already reports.
#
# Stems target the memories this repo SHIPS (plugin/assets/ starter packs); keep them in
# sync with the packs. Run instructions: see recall_hard_set.yaml's header — the same
# seeded corpus serves both fixtures.

- query: "what's our policy on keeping legacy compatibility paths alive"
  relevant: [feedback_no_backward_compat, feedback_no_legacy_read_fallbacks, feedback_no_feature_flagged_refactor_rollouts]

- query: "how do we handle a failure whose underlying cause is already known"
  relevant: [feedback_root_cause_not_symptom_handling, feedback_fallback_is_still_bug]

- query: "process for landing a batch of related fixes at once"
  relevant: [feedback_single_pr_separate_commits]

- query: "who owns memory hygiene and staleness resolution here"
  relevant: [claude_is_memory_master]

- query: "git techniques for checking whether work would be lost"
  relevant: [feedback_two_dot_diff_for_lost_work, feedback_no_git_stash_for_fault_attribution]

- query: "when should tests run during a long multi-file refactor"
  relevant: [feedback_batch_tests_at_end]

- query: "diagnosing a recurring degradation that keeps getting blamed on third parties"
  relevant: [feedback_dont_blame_vendor_latency, feedback_new_logs_mean_recurrence]

- query: "commit authorship and attribution rules for this repo"
  relevant: [oss-attribution-no-claude]
