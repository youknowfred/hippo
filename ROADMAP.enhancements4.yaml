north_star: >-
  Rounds 1-3 are shipped and RELEASED through v1.22.0 — the engine is measured,
  defended, team-ready, and reaches beyond the session. Living with all of it
  for one intensive week exposed the three assumptions round 4 attacks: hippo
  assumes ONE SESSION (the machine is multi-session — four documented
  same-clone collisions on 2026-07-16 alone), ONE AUDIENCE (the corpus is
  two-audience — 15 committed files ride in git while 34 memories stay local,
  a posture with zero tooling), and WRITE-ONLY EVIDENCE (touch rows, interview
  declines, and 671 reconsolidation verdicts a week accumulate in ledgers
  nothing reads). Make the fleet visible, give machine state a lifecycle, give
  the two-audience corpus a per-item publish lane, and give every write-only
  ledger a named reader — all detection-first (ED-1), print-only wherever an
  act would touch git or system state, gated on four PENDING owner decisions
  (ED4R-1), bound by the anti-dark-reservoir law (ED4R-2), with fleet
  visibility never becoming coordination (ED4R-3) — and without touching
  default ranking (ED-2: salience stays owner-decided-OFF; EVD-4 builds only
  its evidence).

# ---------------------------------------------------------------------------
# Invariants every item must preserve (carried VERBATIM from rounds 1-2).
# An item that violates one is wrong, not bold. `invariant_note` names the
# guard when an item sits in tension.
# ---------------------------------------------------------------------------
guiding_invariants:
  - inv1: markdown-in-git is the single source of authority; index/telemetry/
      graph/rules-derived caches are derived, rebuildable, gitignored.
  - inv2: hooks always exit 0, never download, never block; recall failures
      degrade silently at the hook boundary but become LOUD at doctor/SessionStart.
  - inv3: degradation must be legible — every silent-fallback path gains a
      user-visible signal (nudge/doctor/producer).
  - inv4: destructive/corrective writes are per-item and agent-gated; no bulk
      autonomous sweeps; writes into the rules plane are reviewable per-item diffs.
  - inv5: one canonical name/path per concept; renames and schema changes are
      clean breaks with a version bump, not compat shims.
  - inv6: the UserPromptSubmit hot path stays PURE RETRIEVAL — no LLM calls, no
      network, no consolidation work per-prompt.

# ===========================================================================
# SESSION PROTOCOL — identical discipline to rounds 1-3; the capstone chain
# continues (hippo-enh-t18-* onward).
# ===========================================================================
session_protocol:
  purpose: >-
    Multi-session, multi-agent implementation with no loss of context. This
    file's `status:` fields are the source of truth for WHAT is done; the
    capstone memory chain (hippo-enh-t18-* onward, continuing the round-1..3
    chain) is the source of truth for the STORY (decisions, gotchas, next).
  pick_up: |
    - LAW ZERO for round 4: confirm the tier is RATIFIED before selecting
      items. This file ships with every status `proposed` and Q1-Q4 PENDING
      (ED4R-1); a tier whose gate names an unresolved owner decision is not
      startable. Ratification and each Q1-Q4 verdict are dated owner entries.
    - Read MEMORY.md; open the most recent hippo-enh-t* capstone to learn the
      active tier, what last shipped (with commit shas), and the next item.
    - Read this file; select the next item whose status is planned and all of
      whose dependencies are satisfied. A dependency id that is NOT a round-4
      item (not in workstreams below) is CROSS-FILE — every cross-file dep
      named in this round was verified SHIPPED at 81177ba (RCH-11 PR #65,
      SEN-5 T10, SLP-2 T15, SEC-6 v0.8.0 spine, SEC-8 v0.8.0 tail, RCH-5,
      CLB-1/CLB-2/CLB-3 PR #74, IOP-3 PR #75, EXT-1/EXT-3 T17, TMB-1 PR #73,
      JIT-2 T16, MSR-5 PR #70, MSR-6 PR #68, RET-14 v1.12.0, LIF-6); re-confirm
      on the live tree anyway.
    - READ THE ITEM'S implementation_notes AND ITS TIER'S audit_note FIRST.
      They cite verified seams (file:symbol) as of baseline_ref 81177ba. VERIFY
      EACH NAMED SYMBOL STILL EXISTS (the tree WILL have moved by build time);
      follow the note unless the live tree contradicts it, and correct it
      in-file as part of your commit if it does.
    - Sanity-check reality (git log, run the suite) before coding.
  execute: |
    - Implement ONE item (or a coherent slice) per RELEASING.md — one
      id-prefixed commit (e.g. "FLT-1: ..."), full suite green after each.
    - Preserve every guiding_invariant. If an item's invariant_note names a
      guard you cannot honor, set status to deferred, record why in the
      capstone, and stop — do not weaken an invariant to land a feature.
    - An item half gated on Q1-Q4 must NOT be built before the dated owner
      decision lands; record the decision on the item when it does (ED4R-1).
    - Add tests pinning each acceptance_criterion (hermetic per-module
      convention; negative-capability pins where an invariant forbids a
      primitive; byte-identity pins where an additive field must not perturb
      existing output).
    - Flip item status planned -> in_progress -> done (or deferred).
  verify: |
    - Every acceptance_criteria demonstrably met; full suite green; no
      invariant regressed; any new silent-fallback path made legible at
      doctor/SessionStart.
    - NO round-4 item is expected to bump corpus_format (5 at baseline) or
      index SCHEMA_VERSION (7) — every artifact here is derived/gitignored,
      display-only, print-only, or additive/absence-emits-nothing. If yours
      needs a bump, re-read the item: it is probably out of scope (ED-4).
  capstone:
    when: >-
      ALWAYS at the end of a session that touched this roadmap, and ALWAYS at
      tier completion. A multi-session tier gets a progress capstone each
      session.
    do: |
      - Write hippo-enh-t<N>-<slug>.md in the project memory dir
        (capstone_template below); continue the round-1..3 chain (link the
        previous capstone).
      - Refresh its one-line MEMORY.md pointer (supersede the prior same-tier
        line).
      - Update this file's item + tier status to match what shipped.
      - Link the new capstone to [[hippo-enh-exploration-r4]] and the prior
        capstone.
    rationale: >-
      The next session may be a different agent with none of this context. The
      capstone + status fields are the entire handoff. Under-recording is the
      main failure mode — write the capstone even if the session shipped
      nothing.
  capstone_template: |
    ---
    name: hippo-enh-t<N>-<slug>
    description: <tier theme> — shipped <X/Y> items; next: <next item id>
    metadata:
      type: project
    ---
    Tier T<N> (<target_version>, "<theme>") — session <YYYY-MM-DD>.
    SHIPPED THIS SESSION: <item-id — one-liner — commit sha> (repeat).
    TIER STATE: <n/total done>; done_means <met | not yet: what remains>.
    ENGINE STATE: suite <green | N failing>; corpus_format <n>; index schema <n>;
      re-bootstrap <yes/no>.
    DECISIONS / GOTCHAS: <invariant guard applied, premise correction vs the
      note, any dated owner decision recorded on an item (esp. Q1-Q4)>.
    NEXT: <next unblocked item id + why>.
    DEFERRED / BLOCKED: <item ids + reason (esp. a PENDING Q1-Q4 gate)>.
    Related: [[hippo-enh-exploration-r4]], [[hippo-enh-t<N-1>-<slug>]].

# ===========================================================================
# WORKSTREAMS — fully-scoped enhancement items, grouped by area, sequenced into
# tiers by the release_train below. `extends` names the shipped work each
# builds on. `source.signal` carries the vetting's signal-bar citation.
# ===========================================================================
workstreams:

  # ---------------------------------------------------------------- FLT ---
  - id: FLT
    name: The fleet lane (same-clone session visibility)
    extends: session_start producers + the T16 JIT touch lane (outcome/PostToolUse)
    goal: >-
      Sessions sharing a clone become visible to each other — a bounded
      per-session presence doc, a moved-under-me tripwire, and worktree-first
      guidance at the first mutating act. Detection and one bounded line only:
      no lock, no daemon, no coordination protocol (ED4R-3). The whole tier is
      gated on owner decision Q1 (may hippo write the presence file); FLT-1 is
      the keystone — FLT-2's baseline and FLT-3's presence read both live in
      its per-session doc.
    items:

      - id: FLT-1
        title: Session presence file (per-session doc — the fleet keystone, Q1-gated)
        priority: P1
        effort: M
        status: proposed
        source: {origin: EXPLORATIONS4, verdict: RESHAPE, signal: "4 documented same-clone collisions on 2026-07-16: qa-sweep capstone (pytest pollution during v1.17.0 release validation), t16 capstone (branch pointer repositioned by the concurrent v1.18.0 release), PR #62 body ('the third shared-clone collision today'), t8-measurement capstone ('the 4th clone collision') + hippo-branch-cleanup-2026-07-16 Finding 2"}
        problem: >-
          No presence/heartbeat artifact exists at 81177ba (grep verified: only
          the packs lockfile and unrelated prose), yet concurrent same-clone
          sessions are the normal case on this machine and collided in FOUR
          documented multi-session events on 2026-07-16 alone. Sessions
          discover each other by reflog forensics (the branch-cleanup
          capstone's explicit lesson) or luck. A SEPARATE 5-session
          cwd-reset-trap class (T10/T12/T13 capstones) is adjacent, not
          identical — no second session is involved there. PREMISE FIX carried
          from vetting: the draft's other two exhibits are unsupported — "23
          baselines orphaned / cost real cleanup" contradicts the t16
          capstone's own "cherry-picked cleanly" text, and "v1.19.0 nearly cut
          twice / 90 seconds" has no record in any capstone, PR body, or
          comment. Neither may be cited as signal.
        proposal: >-
          New prefix-named sibling module `presence.py` (inv5: one canonical
          concept name — this is it): write a per-session doc
          <telemetry_dir>/presence/<safe(session_id)>.json = {session_id,
          branch, head, ts} at SessionStart from the existing mark_session
          block, via atomic.write_json_atomic under
          provenance.ensure_self_ignoring_dir. Per-session docs, NOT a shared
          file — telemetry.py documents the single-writer assumption a shared
          file would violate; jit.py's per-session state dir is the shipped
          multi-writer-safe pattern (mtime-TTL + count-capped oldest-first
          prune that already deletes other sessions' expired docs;
          fresh-defaults-on-corruption; never raises). The SessionEnd hook
          clears the session's own doc; crashes age out via TTL. ONE new
          producer in session_start.PRODUCERS (adjacency pins respected):
          empty-norm — emits NOTHING when no OTHER fresh entry exists,
          otherwise ONE bounded line naming the other session's branch and
          age. The doc's branch/head fields double as FLT-2's baseline; its
          presence dir is FLT-3's read. Scope stated explicitly: presence is
          per-WORKING-TREE (default_telemetry_dir) — a worktree-opened-as-
          project session resolves its OWN telemetry dir; spanning worktrees
          would need a git-common-dir home and is OUT OF SCOPE v1 (all four
          documented collisions had the main clone as project root, so
          per-tree suffices). Q1 PENDING gates the whole tier — the honest
          argument for "yes" is artifact-class parity with the episode buffer
          and jit state: all three are {gitignored, bounded, self-aging,
          absence-emits-nothing}.
        acceptance_criteria:
          - "presence logic lives in a NEW sibling presence.py (new-module cap 900); session_start.py and telemetry.py receive wiring only (both sit near their pinned size caps)"
          - "per-session doc written via atomic.write_json_atomic under provenance.ensure_self_ignoring_dir; mtime-TTL + count-capped oldest-first prune (the jit.py pattern, incl. pruning other sessions' expired docs); SessionEnd clears the session's own doc; fresh-defaults-on-corruption, never raises"
          - "ONE new producer registered in session_start.PRODUCERS respecting the adjacency pins (tests/test_session_start.py:625,979); empty-norm — no other fresh session emits NOTHING; otherwise exactly ONE bounded line naming the other session's branch and age"
          - "MSR-6 compatibility holds automatically — the producer line lands in the injection-cost ledger as a label row; nothing aggregates per-memory anywhere (the shipped AST pin is untouched)"
          - "presence scope is per-working-tree and DOCUMENTED as such — a worktree-opened-as-project session resolves its own telemetry dir; the git-common-dir spanning design is explicitly out of scope v1"
          - "gated on Q1 (ED4R-1) — no presence write ships before the dated owner decision; FLT-2/FLT-3 build only after it lands"
        dependencies: []               # none cross-file (RCH-11-adjacent); tier keystone
        invariant_note: >-
          inv1 — gitignored derived state, the same artifact class as the
          episode buffer + jit state; that parity is the ground Q1 is argued
          on. inv6 — SessionStart-only write, per-prompt hot path untouched.
          ED4R-3 — no lock, no daemon, no mutual exclusion; a file only ever
          read for one line of legibility.
        implementation_notes: >-
          Seams (verified at 81177ba): session_start.py:main mark_session
          block (L1643-1653; _read_hook_payload L1556 supplies source +
          session_id — COR-6 threads the harness id, so presence docs key on
          it directly, no shared token), session_start.PRODUCERS (L1285-1311;
          adjacency pins tests/test_session_start.py:625,979 — NB CLB-4's
          merge_digest joined PRODUCERS after floor_change in PR #74, so the
          registration landscape moved post-draft; re-verify), telemetry.py:
          default_telemetry_dir (L76) + COR-6 comment (L130-136) +
          single-writer note (L190-193), jit.py:_state_path/_write_state/
          _prune_state_dir (L245-302) — the per-session-doc pattern to mirror
          (MAX_STATE_FILES=32), atomic.py:write_json_atomic +
          provenance.ensure_self_ignoring_dir (SEC-3), plugin/hooks/
          memory_session_start.sh + memory_session_end.sh (the graceful-clear
          seam), tests/test_module_size.py (PLUGIN_CAP=900; telemetry.py and
          session_start.py are grandfathered near their caps — wiring only).
          Fleet state itself rots: the stale fix-worklist-rebounce worktree
          (two releases behind) lingering in `git worktree list` is the
          in-house proof that TTL discipline is mandatory, not optional.

      - id: FLT-2
        title: Moved-under-me tripwire (HEAD/branch baseline vs the presence doc)
        priority: P2
        effort: M
        status: proposed
        source: {origin: EXPLORATIONS4, verdict: RESHAPE, signal: "hippo-enh-t16-jit capstone (enh-t16-jit branch pointer repositioned by the concurrent v1.18.0 release) + hippo-branch-cleanup-2026-07-16 Finding 2 (the 14:21 checkout switch under the live T8 session; t8 capstone calls it 'the 4th clone collision of 2026-07-16')"}
        problem: >-
          Nothing detects a moved checkout or repositioned branch today — grep
          over session_start.py + doctor_checks_* finds only the
          _recent_merge_signals merge probes and diff-vs-HEAD changed-paths;
          no HEAD-sha/branch-position baseline is recorded or compared
          anywhere. The documented signatures this closes: T16 (branch pointer
          repositioned by a concurrent release) and T8/branch-cleanup (the
          14:21 checkout switch under a live session, which survived only
          because MSR-2 had committed 60 seconds earlier). Do NOT lean on the
          draft's "v1.19.0 nearly cut twice" exhibit — unverifiable, no record.
        proposal: >-
          Compare `git symbolic-ref --short HEAD` + `git rev-parse HEAD`
          against the session's OWN FLT-1 presence doc {branch, head}; on
          mismatch-without-a-matching-self-update emit ONE line, then update
          the doc so the tripwire fires once per move. The cheap re-check
          moment is the existing PostToolUse spawn (outcome.record_from_payload
          already runs per file-touch with session_id; two git reads + one
          JSON read fit the pinned 50ms budget), with next-SessionStart as the
          fallback for touchless sessions; the per-prompt hot path stays
          untouched (inv6). Detection-not-accusation is part of the spec:
          hooks never see Bash-mediated git, so the session's OWN checkout or
          commit also moves HEAD — the line is neutral, self-silencing, and
          may quote the reflog's "checkout: moving from A to B" entry via the
          _recent_merge_signals probe family for legibility. Recovery stays
          human (the cherry-pick/worktree recipes the capstones already
          teach).
        acceptance_criteria:
          - "SessionStart records {branch, head} in the FLT-1 presence doc; a bounded re-check on the PostToolUse spawn (next-SessionStart fallback for touchless sessions) compares live symbolic-ref + rev-parse against it"
          - "on mismatch without a matching self-update — exactly ONE neutral line (was X@sha, now Y@sha; may quote the reflog checkout entry), then the doc updates so the tripwire fires ONCE per move"
          - "the re-check stays inside the pinned 50ms PostToolUse budget (tests/test_scale.py:187); the UserPromptSubmit hot path gains zero new work"
          - "phrasing is detection-not-accusation (the session's own Bash git also moves HEAD — hooks cannot see it); no lock, no block, no recovery automation — one line only (ED4R-3)"
          - "the item's cited class is the four verified 2026-07-16 events; the unverifiable 'nearly cut twice' exhibit appears nowhere in docs or tests"
        dependencies: [FLT-1]          # in-round: the presence doc is the baseline carrier
        invariant_note: >-
          inv6 — rides the existing PostToolUse spawn, no new hook,
          budget-pinned; corroboration is already free per-prompt (every
          episode row carries head_commit — telemetry.py:987) but the hot path
          gains nothing new. inv3 — a moved tree becomes legible; recovery
          stays human. ED4R-3 binds.
        implementation_notes: >-
          Seams: outcome.py:record_from_payload (L60-124) + _FILE_TOOLS (L49)
          + the single hookSpecificOutput emit (L422-429; QUA-2 — at most ONE
          per spawn), jit.py:observe_touch (L342) fast-path discipline the
          check must match, session_start.py:_recent_merge_signals (L556) —
          the shipped reflog/branch probe pattern to reuse when quoting the
          move, telemetry.py:log_episode head_commit (L982-995) +
          reconsolidate.py:_last_session_watermark (L112) — the existing
          head-sha consumers proving the read is cheap,
          tests/test_scale.py:_JIT_OBSERVE_P95_MS=50.0 (L187) — the budget any
          addition to the touch path inherits. The qa-sweep capstone's
          same-day sibling symptom (an in-tree pytest run polluted by the
          other session's in-progress lint) shares this detector — a
          moved/shared-tree tripwire covers both signatures.

      - id: FLT-3
        title: Worktree-first nudge at the first shared-tree mutating act
        priority: P2
        effort: M
        status: proposed
        source: {origin: EXPLORATIONS4, verdict: RESHAPE, signal: "PR #62 body ('branching in place would have yanked [the T17 session's] working tree — the third shared-clone collision today'); t8/t12/t13 capstones ('START in a worktree even when the clone looks clean'; 'Worktree discipline held'); the live .claude/worktrees/<branch> convention in `git worktree list`"}
        problem: >-
          The worktree recipe is the proven mitigation — every tier session
          since T8 used it, and the capstones call it "the law" — but it is
          convention-only: nothing surfaces it at the moment a session starts
          mutating a shared tree while another session is live. The post-draft
          strikes are all mutations landing on the shared tree from sessions
          that belonged elsewhere (T10's SEN-3 misfire swept 12 uncommitted
          memory mods onto main; t12's pytest hit the main clone; t13 counts a
          FIFTH cwd strike).
        proposal: >-
          In the same PostToolUse spawn: when the payload's tool_name is in
          the mutating subset of _FILE_TOOLS ({Edit, Write, MultiEdit,
