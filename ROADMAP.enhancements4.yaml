    detail: >-
      Binds the EXPLORATIONS4 s3 cut permanently: hippo is files-and-git; a
      lock service, presence daemon, or blocking handshake is a posture
      break and a new failure mode. Presence (FLT-1), the tripwire (FLT-2),
      and the nudge (FLT-3) are detection + one bounded line each,
      self-silencing, kill-switched, and exit-0. Any future
      coordination-shaped proposal starts from a new dated owner decision,
      not from this tier's artifacts.

# ===========================================================================
# NOT PURSUING — the disciplined cuts and standing kills, recorded so their
# absence reads as a decision (full reasoning in EXPLORATIONS4.md + the
# vetting record).
# ===========================================================================
not_pursuing:
  - {id: locking-or-coordination-daemon, reason: "REFUSED by ED4R-3 — no lock, no daemon, no mutual exclusion; the fleet lane is detection + one bounded line only. A lock service is a posture break (files-and-git) and a new failure mode nobody asked for."}
  - {id: auto-drain-reconsolidation-queue, reason: "STANDING KILL (LIF-1) — auto-graduating when the cited diff 'looks harmless' is autonomy creep against the human-verdict contract, and grep-still-matches is the plausible-but-wrong trap. EVD-1 ships the evidence brief; the verdict stays human."}
  - {id: llm-judged-lanes, reason: "STANDING KILL — round 2's MSR thesis (deterministic beats judge) has survived three rounds; nothing in round 4 needs a judge. Zero LLM calls anywhere in this file."}
  - {id: stability-facts-lint, reason: "ALREADY SHIPPED — the DOC-15 prose-rot class was closed as DOC-16 (PR #66, merged 2026-07-16) while the draft was being written; cited there as evidence the lint-pinned-facts pattern generalizes. Nothing left to propose."}
  - {id: re-proposing-round-2, reason: "MOOT — the draft carried 'executing round 2 is a scheduling decision' as a cut; T8-T13 were executed and RELEASED (v1.20.0-v1.22.0) within a day of the draft. Recorded as a premise correction, not a proposal."}
  - {id: orphaned-derived-dirs-census-class, reason: "CUT from HYG-1 — derived dirs (.claude/.memory-index, .claude/.memory-telemetry) are in-repo siblings of memory_dir and die with the repo; the class is near-empty as drafted. The real machine-wide orphan class is the ~/.claude/projects symlink farm; derived-dir status survives only as one delegated field on the projects-row class."}
  - {id: plugin-install-census-class, reason: "CUT/DELEGATED from HYG-1 — bootstrap.status/_sibling_installs already enumerates the ~/.claude/plugins/data sibling installs and doctor's check_bootstrap surfaces them; a second walk of the same surface violates inv5. The census composes bootstrap.status, it does not re-implement it."}
  - {id: per-memory-injected-but-never-touched-table, reason: "STANDING KILL (round-1 inert-recall-noise-finder, enforced by the MSR-6 AST pin) — EVD-2 stays lane-level or positive-evidence-only (injection_hits' shipped shape); _injection_join stays the single join."}
  - {id: publish-content-transform, reason: "REFUSED in PUB-1 — a publish verb that rewrites content has become pack_extract (which strips provenance, stamps pack, emits manifest, refuses in-corpus dest) and must be killed as duplication; publish's defining property is byte-identical in-place file + git tracking only."}
  - {id: publish-hard-gate-on-staleness-or-conflict, reason: "DEMOTED in PUB-1 — refusing invalid_after-expired or unresolved-contradicts candidates encodes editorial policy the owner never ratified (#67's bar was secrets + eyeball; the committed subset IS dev-history; CLB-1 keeps conflicts/edges advisory to not automate human posture calls). Both render as ADVISORY receipt warnings."}
  - {id: touch-grain-graduation-arm, reason: "SEVERED (EVD-2 / EVD-4 Arm B) — a touch-grain-informed graduation or ranking arm needs nonzero touch data (today 0/0, mechanically) plus its own outcome-signal precondition and dated decision; DRM-6 graduation stays on session-grain injection_hits."}
  - {id: publish-stage-flag-git-index-write, reason: "DEFERRED behind Q3 (ED4R-1) — a --stage flag executing git add -f would be hippo's FIRST production write to a user repo's git index (the only in-package add/commit is a hermetic eval fixture); two shipped print-only precedents (SLP-2, the init nudge) argue the flip needs its own dated owner decision, which the draft itself recommends."}

