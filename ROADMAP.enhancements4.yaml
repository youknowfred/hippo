# ============================================================================
# hippo — Enhancement & Capability Roadmap, ROUND 4 (post-v1.22.0) — PROPOSAL
# ============================================================================
# The EXECUTABLE form of EXPLORATIONS4.md: the round-4 adversarially-vetted
# enhancement catalog (13 items -> 13 RESHAPE, zero KILL), formalized into
# fully-scoped, dependency-sequenced items and work tiers.
#
# This is the FOURTH enhancement train. Round-4 tiers are numbered T18-T21 and
# use NEW namespaces (FLT/HYG/PUB/EVD) so ids never collide with round 1
# (SIG/RUL/RCL/GOV/GRW/RCH), round 2 (MSR/GRF/SEN/TMB/CLB/IOP), round 3
# (INV/SLP/JIT/EXT), ROADMAP.yaml (RET/GRA/LIF/CAP/INT/TEA/SEC/...), or
# ROADMAP.v1.md.
#
# STATUS: every item and tier below is `proposed` — vetted, NOT scheduled.
# Which tiers to build, in what order, IF ANY, is the owner's scheduling call;
# four owner decisions (Q1-Q4) are carried PENDING (ED4R-1) and gate the
# relevant halves. Nothing in this file resolves them.
#
# Continuity across sessions lives in TWO synced places (same protocol as
# rounds 1-3):
#   1. This file's per-item / per-tier `status:` — the durable progress LEDGER.
#   2. A chain of CAPSTONE MEMORY files (`hippo-enh-t<N>-*`, continuing the
#      round-1..3 chain) — the narrative HANDOFF (session_protocol below).
#
# Companion documents:
#   EXPLORATIONS4.md           — the round-4 source catalog (draft 2026-07-16,
#                                vetted 2026-07-17; its §6 records the outcome)
#   ROADMAP.enhancements.yaml  — round-1 train (T1-T7, shipped)
#   ROADMAP.enhancements2.yaml — round-2 train (T8-T13, shipped + released
#                                v1.20.0-v1.22.0)
#   ROADMAP.enhancements3.yaml — round-3 train (T14-T17, shipped + released
#                                v1.18.0/v1.19.0)
#   ROADMAP.yaml / ROADMAP.v1.md — the engine + launch trains
# ============================================================================

