        implementation_notes: >-
          Attach: recall.format_results (the single render seam; verify the SEC-7 header/
          trust_note landed there per 2f960a7), eval_recall category loader,
          trust.corpus_consent_sample (SEC-5), the SEC-6 quarantine path in recall,
          .audit-fixtures sink, secrets.py threat-lint patterns (SEN-2, the oracle).
          Implementation MUST re-verify the trust-spine's landed shape against the tree at
