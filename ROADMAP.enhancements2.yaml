      - id: SEN-2
        title: Write-side threat lint (invisible Unicode & scoped exfil-shape detection, tiered by precision)
        priority: P1
        effort: M
        status: done
        source: {lens: trust-security, verdict: RESHAPE, convergence: 2, landscape: [pillar-invisible-unicode-2025, minja-2503, spotlighting-microsoft]}
        problem: >-
          Memory-poisoning payloads (invisible Unicode zero-width/bidi/PUA, exfil-link
          shapes, injection-imperative grammar) reach the corpus through capture/import
          with no detection; secrets.py catches only credentials, and rules files are
          the exact Pillar attack target.
        proposal: >-
          A secrets.py-sibling deterministic threat-lint shipping Tier-A classes
          (invisible Unicode with emoji-ZWJ/variation-selector carve-outs + stated RTL
          posture, mixed-script confusables, HTML comments LINT-ONLY pending an ED-3
          spike, exfil-link shapes scoped strictly to image-embeds/data-bearing query
          strings — never bare URLs) as review-surfaced flags + import HOLD at five
          seams; Tier-B (imperative injection grammar) ships LEDGER-ONLY — measured,
          never surfaced, never HOLD — until a dated owner decision graduates it on a
          measured near-zero FP rate. Lands inside SEN-1's verifier.
        acceptance_criteria:
          - Tier-A classes produce deterministic regex/codepoint flags (zero LLM) at all five seams — capture.py hunks_threat_flagged beside hunks_secret_flagged, new_memory scan seam, import_mdc HOLD, doctor sweep, and the SEC-8 CI scan (via CLB-1's --ci)
          - Tier-B writes to a persisted findings ledger + one aggregate doctor line ONLY — no per-write flag, no seed stamp, MUST NOT enter import_mdc's HOLD set — until a dated owner decision graduates it on a ledger-measured near-zero FP rate
          - an ED-3 in-harness spike on whether Claude Code's HTML-comment stripping covers hooks' additionalContext is run and dated BEFORE any HTML-comment neutralization; until then HTML comments are lint-only
          - secrets.py's _PATTERNS/scan_text/hunks_secret_flagged are unchanged (threat patterns are a sibling reusing the plumbing, not a fork); doctor line-count pin + hermetic fixtures (escape-sequence literals only, never literal invisible codepoints — filterwarnings=error) updated in lockstep
        dependencies: [SEN-1, SEC-8, GRA-5]   # SEN-1 same-tier (container, build first); GRA-5 shipped. PREMISE CORRECTED 2026-07-16 (build time): SEC-8 was marked "ROADMAP.v1, open" but SEC-8..14 ALL shipped 2026-07-10 (hippo-v080-sec-tail). The four write/import/doctor seams shipped; the fifth (CI) leg is genuinely deferred — its sanctioned vehicle is CLB-1 --ci (T12, UNBUILT), so threat_lint.scan_files ships ready for it, not forked into a second CI job.
        invariant_note: >-
          inv4 — per-item flags/HOLD, no bulk sweep; Tier-B is measurement-only. inv6 —
          detection at capture/write/import/doctor/CI, never the hot path; the one
          hot-path-adjacent capability (render-time codepoint stripping) is deferred
          entirely. inv3 — the load-bearing reshape: an over-broad flag surface degrades
          the human-review channel, so ED-1's split applies one level deeper (gate
          USER-VISIBLE flagging per pattern-class precision, hold imperative-grammar dark
          until FP measured).
        implementation_notes: >-
          Attach: secrets.py _PATTERNS/scan_text/scan_corpus (the one-list architecture
          to sibling), capture.py (hunks_threat_flagged beside hunks_secret_flagged),
          new_memory scan seam, import_mdc HOLD contract, doctor sweep, rules_plane.rules_rot
          (rules files are the Pillar target). SEC-8's relationship resolved: this lint
          FEEDS the single CI scan vehicle (CLB-1 --ci), not a second CI gate.

      - id: SEN-3
        title: Ungrounded-prescription lint (agent-voiced intent attribution, warn-only)
        priority: P2
        effort: M
        status: done
        source: {lens: capture-consolidation, verdict: RESHAPE, convergence: 1, landscape: [mist-sycophancy-25x, transcription-not-synthesis]}
        problem: >-
          Capture-from-evidence is hippo's spine, but nothing flags a memory body that
          asserts user intent ("the user always wants X") when that claim is grounded in
          neither the captured hunk nor a rationale — the exact synthesized-prescription
          shape that amplifies sycophancy (landscape: memory amplifies sycophancy 25x).
        proposal: >-
          A deterministic secrets.py-style lint flagging agent-voiced attribution-of-
          intent constructs when grounded in neither the captured verbatim hunk (GRW-1)
          nor an explicit --rationale (GOV-3); fires warn-only at write_memory + an
          audit-skill corpus sweep feeding a doctor "ungrounded-prescription fraction"
          line. No refuse-write path this item.
        acceptance_criteria:
          - the pattern set is restricted to agent-voiced attribution-of-intent (e.g. "the user wants/prefers/always wants"), not bare must/always/never; run against hippo's own docstrings/ROADMAP prose with zero false positives before defaulting on
          - write_memory flags a candidate ungrounded only when the prescriptive span has no overlap in the write-time hunk AND no --rationale; unit tests cover grounded-by-hunk (passes), synthesized-no-support (flagged), rationale-only (passes)
          - the audit sweep classifies the corpus grounded / ungrounded-prescription / observation and proposes per-item fixes only (inv4); doctor renders the fraction with no persisted per-item field unless a bump is separately budgeted
          - lint output never reaches check_candidate's route/neighbor result or recall (confidence-never-ranking AST pin); warn-only forever in this item's scope
        dependencies: [SEN-1, GRW-1, GOV-3, SEC-2]   # SEN-1 same-tier; rest cross-file, SHIPPED
        invariant_note: >-
          inv2/inv6 — write-plane only, never blocks. inv3 — doctor fraction + audit
          sweep make the rate legible. inv4 — sweep proposes per-item, no bulk rewrite.
          The refuse-write half is DROPPED not deferred: secrets.py's own warn-never-block
          doctrine for a higher-severity/lower-FP class argues against a blocking ambition
          for a fuzzier class.
        implementation_notes: >-
          Attach: new_memory.check_candidate (joins the dry-run battery, warn-only),
          _append_rationale + write_memory (grounding = rationale/hunk presence),
          telemetry.log_decision + capture seed decisions field (the grounding source),
          secrets.py _PATTERNS (template), audit + consolidate SKILL.md (the
          transcription-not-synthesis rule gains a mechanical check).

      - id: SEN-4
        title: Adversarial eval category (poisoned-memory fixtures acceptance-testing the shipped trust spine)
        priority: P1
        effort: L
        status: done
        source: {lens: trust-security, verdict: RESHAPE, convergence: 1, landscape: [agentpoison-neurips24, skillcloak-2607]}
        problem: >-
          The v0.8.0 trust spine (SEC-5/6/7) shipped with no adversarial regression
          harness — a defense with no poisoned fixtures is unproven, and the 2026 threat
          model (MINJA, AgentPoison, invisible-Unicode) is exactly what it must withstand.
        proposal: >-
          A new 'adversarial' RET-8 eval category — poisoned-memory fixture corpora
          (MINJA payloads, invisible-Unicode bodies, exfil-link descriptions, high-BM25
          trigger phrases) landing beside .audit-fixtures with ZERO eval_recall loader
          changes (data-driven unknown tags) — that deterministically reports per row:
          (1) payload crossed raw into format_results output, (2) SEC-6 quarantine
          withheld a post-consent-drifted file, (3) SEC-5 corpus_consent_sample exposed
          the payload byte-equal, (4) a threat-lint pattern flagged it, (5) knee/floor/
          MMR admitted it. Report-only, skip-if-no-fixture. The always-on spotlighting
          envelope is CUT (deferred, honestly reframed as boundary-spoof-resistance, not
          payload-crossing reduction).
        acceptance_criteria:
          - the 'adversarial' tag is recognized by the existing data-driven loader with ZERO loader changes; it surfaces in by_category only when fixtures exist under .audit-fixtures (absent = skip), never gating CI on its own
          - each poisoned row emits five deterministic booleans (raw-crossing, SEC-6-quarantine-withheld, SEC-5-consent-byte-equal, threat-lint-flagged, admitted) by direct assertion over format_results / corpus_consent_sample / the recall admission path — no LLM, worded as admission/coverage, never "injection success"
          - golden(50) and packs(22) numbers stay byte-identical (zero production ranking/render change)
          - hermetic tests pin the poisoned-fixture shape (memory files under .audit-fixtures, not hard_set rows) and the report schema; no existing MCP/skills/AST/byte-identity pin breaks
        dependencies: [SEN-2, RET-8, SEC-5, SEC-6, SEC-7]   # SEN-2 same-tier (threat-lint oracle, build first); rest cross-file, all SHIPPED (2f960a7 / f2d1979)
        invariant_note: >-
          ED-1 — ships only the detection/instrumentation half; the incoherent envelope
