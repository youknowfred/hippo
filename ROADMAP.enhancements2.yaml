          Extend check_candidate into a small deterministic pre-write verifier — secret
          lint (mechanizing the procedural gate via scan_with_remediation), fenced-hunk
          fidelity against a freshly-fetched git HEAD, and archive-shadow name-collision
          detection — alongside the existing checks, reusing staleness/lint_links
          directly, surfaced as a "write ticket" (renamed off the GOV-5 recall receipt)
          rendered verbatim at the consolidate/new approval prompt. Every check
          warn-only, no schema bump, no persistent ledger this round. This is the
          CONTAINER SEN-2 and SEN-3 land their line-items inside.
        acceptance_criteria:
          - check_candidate additionally invokes scan_with_remediation and surfaces secret-lint warnings in its dry-run dict, rendered at the same approval-prompt step as dup/rules-echo (closes the gap where write_memory only warns AFTER writing)
          - a fenced-hunk fidelity check compares each fenced code block against `git show <fresh HEAD>:<path>` (baseline from a fresh git_head call at verify time, not parsed from rationale) and warns on byte mismatch
          - an archive-shadow check warns when a candidate stem collides with an existing archive/ entry, reusing the GRA-5 fail-closed guard pattern
          - no new frontmatter/corpus_format field, no new skill, no new MCP tool, no persistent ledger; all checks warn-only and check_candidate's never-raise/no-autonomous-rejection contract is unchanged (a test pins it)
        dependencies: []
        invariant_note: >-
          inv4 — every check stays inside check_candidate's warn-only/never-raise
          contract; autonomous refuse-write is cut, deferred to a per-check dated owner
          decision. inv5 — the artifact is a "write ticket"/"gate stamp", NOT "receipt"
          (that names GOV-5's shipped glass-box). inv6 — runs only in agent-gated write
          flows. Scope explicitly orthogonal to SEC-8 (consumes scan_with_remediation
          as-is, does not extend pattern breadth).
        implementation_notes: >-
          Attach: new_memory.check_candidate (subsumes/extends the existing battery),
          write_memory (backstop -> ticket-emitting), secrets.scan_with_remediation,
          rules_plane.rule_dup_candidates, staleness.read_provenance + build_repo_file_index,
          lint_links.LinkGraph. Call staleness/lint_links helpers directly — do not
