      - id: SEN-5
        title: Incident response — untrust verb + blast-radius report
        priority: P1
        effort: S
        status: done
        source: {lens: trust-security, verdict: RESHAPE, convergence: 1, landscape: [mcpoison-cve-2025]}
        problem: >-
          After discovering a bad/poisoned memory a user has no recourse — there is NO
          untrust/revoke verb (only mark_trusted), and no way to see what a suspect
          memory touched (which sessions recalled it, what links/rules cite it).
        proposal: >-
          Two verbs only: `untrust <repo>` — minimal registry-entry removal beside
          mark_trusted, revocation-BY-GATE (is_trusted re-checks live on every injection
          path, so no cache-wipe machinery; at most a doctor hint that untrusted-source
          derived caches are stale-but-inert) — and `blast-radius <name>` — a read-only
          report joining episode_buffer.recalled_names, links.json typed_out/typed_in
          adjacency (its FIRST real consumer), gov_citations, and .archive_journal.jsonl,
          extending GRA-8, with a coverage banner naming episode-rotation + MCP-telemetry
          blind spots. Quarantine tier DROPPED (collides with shipped SEC-6).
        acceptance_criteria:
          - untrust <repo> removes exactly that repo's hippo-trust.json entry, is idempotent, preserves sibling keys; a hermetic test proves trust -> recall(injected) -> untrust -> recall(withheld) with zero on-disk index/cache files touched
          - untrust ships zero cache-invalidation code; the only cache surface is at most one doctor line noting untrusted-source caches are stale-but-inert (inv1); remove/SKILL.md's "trust left as-is on removal" note is cross-referenced to state how untrust differs
          - blast-radius <name> writes nothing, reads only episode_buffer / links.json / gov_citations / .archive_journal.jsonl, and its output explicitly states coverage limits (episode-rotation window; MCP recall invisible to episode_buffer today)
          - no 'quarantine' verb ships; notes cite GRA-8 as extended and shipped SEC-6 as the reason a second quarantine concept was dropped
        dependencies: [GRF-1, SEC-6]     # GRF-1 (T9, GRA-8) backward; SEC-6 cross-file SHIPPED
        invariant_note: >-
          inv5 — 'quarantine' already names SEC-6's shipped per-file drift-withholding;
          a second verb under the same word is cut. inv1 — untrust needs no cache wipe
          (is_trusted re-reads live). inv4 — blast-radius is pure read; untrust is a
          single named target, not a sweep. inv3 — blast-radius's coverage banner must
          state the episode-rotation + MCP-invisibility limits IN the report.
        implementation_notes: >-
          Attach: trust.py (untrust beside mark_trusted; sibling-key preservation),
          archive.py GRA-5 guard + journal (the incident template), telemetry episode
          readers, links.load_edges (typed_out — currently DARK, becomes a consumer),
          rules_plane.gov_citations.

  # ---------------------------------------------------------------- TMB ---
  - id: TMB
    name: Temporal truth, lifecycle & forgetting
    extends: GOV-1 + LIF + reconsolidate + archive
    goal: >-
      Give the timestamp-less resolve/lifecycle plane a clock (git-mined, no new
      state), close the retire-without-drift and archive-shadow blind spots, and
      measure forgetting correctness — all detection-first, git-native.
    items:

      - id: TMB-1
        title: Resolve-inbox evidence card (age + git-freshness + drift + prefill-agreement capture)
        priority: P2
        effort: M
        status: done
        source: {lens: temporal-lifecycle, verdict: RESHAPE, convergence: 3, landscape: [zep-bitemporal-2501, memtrack-conflict]}
        problem: >-
          The contradiction inbox derives fresh every call with ZERO timestamps — no
          pair age, no drain rate, no verdict provenance on three of four verdict paths
          — so a stale conflict is indistinguishable from a fresh one and the human has
          no evidence to adjudicate with.
        proposal: >-
          Render a deterministic evidence card in resolve_view.describe()/--list per
          contradicts pair: commits-since-birth age (git-mined from the commit that
          added the edge — satisfies the no-timestamps render pin), the git-newer side
          (via provenance.git_last_commit_with_time on both .md files, NEVER importing
          reconsolidate), cited-code drift (stale.json), usage asymmetry (only above a
          session-count floor); a prefill suggestion expressed STRICTLY in the resolve
          skill's own four verdict names; one additive field on each of the four verdict
          paths (incl. merge + keep-both, which today record nothing) logging the
          prefill next to the human's choice. No sibling ledger, no threshold-gated
          automation. (Merges conflict-chronometer x3 + freshness-adjudicator.)
        acceptance_criteria:
          - resolve --list/describe() shows each pair's age as commits-since-introduction (git-mined; legible "age unknown" fallback for shallow/rewritten history) — zero new persisted files/fields
          - the card's suggested verdict uses ONLY the four names the resolve skill exposes (keep-A-supersede-B with direction, keep-both-as-scoped, merge, mark-not-conflicting) + explicit abstain; grep finds no second verdict taxonomy
          - usage asymmetry is omitted or low-confidence-labeled below a stated session-count threshold (unit-tested at the boundary)
          - each of the four verdict paths gains one additive field capturing the prefill vs the actual verdict, with no new ledger and no change to _RECONSOLIDATION_OUTCOMES; accept-prefill/auto-default is absent and gated in the roadmap behind a dated owner decision + the SIG-5/RET-8 revisit trigger
          - no git subprocess runs on the SessionStart or hot path (a test asserts zero git calls during SessionStart producer execution); resolve_view's no-corpus-write AST pin stays green
        dependencies: [GOV-1, GOV-5, GOV-6]   # cross-file, SHIPPED
        invariant_note: >-
          inv1 — no new persisted state; pure on-demand git-history read. inv6 — git
          calls confined to resolve_view/doctor cold paths, never SessionStart or the hot
          path. inv5 — git history is the single canonical birth source (no per-clone
          first-seen sidecar). The resolve_view no-corpus-write AST pin is preserved by
          computing freshness via provenance.git_last_commit_with_time directly — NO
          `from .reconsolidate import` in resolve_view.py.
        implementation_notes: >-
          Attach: resolve_view.unresolved_contradictions / describe, provenance.git_last_commit_with_time,
          reconsolidate._successor_commit_iso (the freshness primitive — reuse verbatim,
          do not import into resolve_view; hoist to provenance if shared), staleness stale.json,
          telemetry.read_usage_aggregates, doctor._scorecard_message. Deferred (dark-reservoir
          risk at solo scale, ~0-5 pairs): drain-rate metrics, scorecard_history.jsonl, a
          ledger ts field — in-scope only via a dated owner decision once queue depth justifies it.

      - id: TMB-2
        title: invalid_after terminal-state surfacing + archive-admission leg for drift-free retirements
        priority: P2
        effort: S
        status: done
        source: {lens: temporal-lifecycle, verdict: RESHAPE, convergence: 1, landscape: [forgeteval-deletion-correctness]}
        problem: >-
          invalid_after is visible only through the git-drift stale set, so a memory
          retired via supersede/merge (no code drift) is invisible to BOTH
          session_start's staleness_producer AND archive_candidates — it lingers with no
          count anywhere and cannot reach the archive flow session_start points users at.
        proposal: >-
          Two small additive fixes reusing existing primitives: widen invalid_after
          visibility from stale-scoped to CORPUS-WIDE (a producer/doctor count of
          memories invalidated via non-drift paths), and add a 5th admission leg to
          archive_candidates so a purely time-invalidated memory reaches the shipped
          GRA-5-guarded archive flow. No new queue, no new write primitive, no new verb —
          reinstatement is the existing semantic_reverify(name, outcome='graduate'|'fix')
          which already strips invalid_after.
        acceptance_criteria:
          - a corpus-wide invalid_after-old count (session_start line or doctor check) reports memories past the old-invalidation horizon NOT in find_stale's set — verified with a fixture carrying invalid_after but no cited_paths/drift, which today signals nowhere
          - archive_candidates (or a parallel fn reusing its soak gate + zero-inbound + not-cited-by-CLAUDE.md + GRA-5 guard verbatim) admits an invalid_after-old memory absent from find_stale — verified end-to-end it can reach a journaled archive move via report-then-approve
          - no new write primitive/skill/ledger-outcome/verb; the new surfacing does NOT route through recalled_stale_worklist (whose LIF-1 exclusion of invalidated items is deliberate)
          - byte-identity / cheap-at-zero — a corpus with no such memories produces no extra output and no measurable cost
        dependencies: [LIF-1, GRA-5]     # cross-file, SHIPPED
        invariant_note: >-
          inv3 — closes a real legibility gap (non-drift-invalidated memories signal
          nowhere). inv4 — reinstatement + archiving stay per-item human-gated through
          shipped primitives, no queue/auto-move. inv5 — do NOT coin "resurrect" (it
          already names the recall.py expansion invariant "expansion must never resurrect
          an invalidated memory"); use graduate/fix. inv1 — reuses invalid_after
          frontmatter + the archive journal, no bump. Distinct from the round-1-killed
          spaced-reverify-scheduler-full: corpus-STATE-driven (a count of an existing
          invisible population), not a calendar cadence — state this explicitly.
        implementation_notes: >-
          Attach: staleness.invalid_after_map / set_invalid_after / _strip_invalid_after,
          recall._invalidation_state + the emission-loop display filter,
          reconsolidate.semantic_reverify + snooze, archive journaled move, doctor.CHECKS.
          Population is near-zero for typical solo corpora until an active supersede/merge
          practice + 30 days elapse — cheap-at-zero is the acceptance bar, not volume.

      - id: TMB-3
        title: Forgetting correctness & archive reversibility (shadow check + report-only category + restore primitive + regret detector)
        priority: P2
        effort: M
        status: done
        source: {lens: temporal-lifecycle, verdict: RESHAPE, convergence: 1, landscape: [memoryagentbench-forgetting-7pct, persistbench-leakage]}
        problem: >-
          Forgetting failures dominate production memory systems (deletion correctness
          0-93%), yet hippo's archive is a one-way door: no unarchive primitive, archived
          stems can shadow live ones (_first_seen_times deliberately skips archive/), and
          there is zero measurement of whether forgetting is correct.
        proposal: >-
          Ship a pure-detection forgetting measurement + a decoupled reversibility
          primitive: (a) a read-only check_archive_shadowing doctor check (archive/ vs
          live stems, prints a manual git mv suggestion, zero write); (b) a hermetic pin
          that corpus builds never traverse archive/; (c) a report-only 'forgetting'
          eval category (archive-absence rows from an archive/*.md listing, scored by a
          NEW absence-polarity metric, through SIG-6's confirm flow); (d) a standalone
          archive.restore(stem) primitive (per-item, journaled, GRA-5-style collision
          guard); (e) an evidence-only regret detector (abstention clusters vs archived
          bodies via vendored BM25, inert text + a logged regret event). NO wiring
          between detector and restore. (Merges forgetting-gate + archive-regret.)
        acceptance_criteria:
          - check_archive_shadowing flags any stem in both archive/ and live corpus with zero false positives on a clean corpus and a hit on a synthetic shadow; printed suggestion only, no corpus write; a hermetic test pins that build_index never includes archive/ contents
          - a report-only 'forgetting' by_category line appears with archive-absence gold rows enumerated from an archive/*.md listing (journal used only as reversibility metadata) scored by an absence-polarity metric distinct from hard_set_metrics; rows populate via SIG-6's confirm flow with absent=skip
          - archive.restore(stem) moves one named file back, journals it, collision-checks the stem against live memories with an _inbound_referrers-style guard, refusing (not overwriting) on collision; a no-bulk-restore test pin mirrors the no-bulk-archive pin; no code path connects detector output to restore execution
          - the regret detector runs only at SessionStart-producer/doctor time (never per-prompt), surfaces matches as inert text + a logged regret event, with zero restore action attached
        dependencies: [SIG-6, RET-8]     # SIG-6 landed long ago (PR #17 merged 4dc3256, 2026-07-10); RET-8 shipped
        invariant_note: >-
          inv4 — the restore/unarchive write is per-item human/agent-invoked, journaled,
          collision-guarded, no bulk verb; the detector is evidence-only, no prefilled
          restore proposal (that would be the demand-gap-auto-draft shape round 1 killed +
          races ahead of the tree's own soak-before-autonomous precedent). ED-1 — zero
          measured incidence of shadow collisions yet, so no write-capable auto-fix ahead
          of observed occurrence. The restore collision-check is load-bearing (it closes
          the exact shadowing hazard _first_seen_times skips).
        implementation_notes: >-
          Attach: archive.py _JOURNAL_NAME / _journal_untracked_move / _inbound_referrers
          (GRA-5 guard to mirror in restore) / _first_seen_times (the archive/ skip under
          test), eval_recall.derive_self_query + load_hard_set (unknown tags -> own bucket),
          doctor.CHECKS + new check_archive_shadowing, recall's invalidation/supersession
          block (behavior under test), _vendor BM25 (regret matching). Before writing any
          invalid_after-old / supersedes-ordering gold rows, re-verify recall's 'old'-state
          emission handling against the live tree (two skeptic reads contradicted) — those
          row types may reasonably defer; archive-absence rows (zero prior coverage) ship first.

      - id: TMB-4
        title: Edge-derived update / premise-resistance eval fixtures (extends SIG-6)
        priority: P2
        effort: M
        status: done
        source: {lens: eval-flywheel, verdict: RESHAPE, convergence: 2, landscape: [longmemeval-knowledge-update, stale-2605]}
        problem: >-
          The temporal/update eval categories have ZERO shipped rows (evergreen packs
          have no superseded facts), so knowledge-update — the measured-weakest ability
          across the landscape — is unmeasured for hippo, exactly where its supersedes
          edges + invalid_after should shine.
        proposal: >-
          A deterministic fixture synthesizer walks supersedes-chain typed edges
          (load_edges typed_out + history.typed_inbound chain-tip resolution) + GRW-7
          successor-date stamps to draft category:update rows — query = VERBATIM
          derive_self_query text from the SUPERSEDED memory, gold = the live successor
          stem — plus verbatim-template premise-resistance rows, routed one-at-a-time
          through SIG-6's drafts/confirm flow into .audit-fixtures. Scoring is
          stamp-state-bucketed (unstamped/recent: successor-must-outrank-corpse;
          old-stamped: successor-presence-only, since those are recall-filtered).
          by_category stays report-only until a dated owner decision promotes a
          GATE_UPDATE_* gate.
        acceptance_criteria:
          - the synthesizer emits draft rows whose query is a literal verbatim span of the SUPERSEDED memory's file (no paraphrase) and gold = the live chain-tip via history.typed_inbound; a test asserts draft queries are literal substrings and zero LLM/network calls
          - rows are tagged category:update (never temporal, which stays zero rows) and bucketed by the superseded memory's invalid_after state (unstamped/recent scored successor-must-outrank-corpse; old-stamped scored successor-presence-only); a test verifies both scoring paths
          - every drafted row requires per-item human confirmation via SIG-6's confirm_hard_set_row before landing (inv4); a test confirms an N-row drafts file produces zero live fixtures until each is confirmed; no bulk-confirm path
          - update numbers surface report-only in eval + a per-project doctor line naming the outrank-failure count; GATE_UPDATE_* promotion is never auto-triggered by a row count — a dated owner decision is required
        dependencies: [SIG-6, GRW-7, GRA-4]   # ALL SHIPPED — SIG-6 merged 2026-07-10 (PR #17, 4dc3256; the old 'open PR #17' note was stale); GRW-7/GRA-4 shipped earlier
        invariant_note: >-
          inv4 — drafts-only, per-row human confirm via SIG-6's gate, no bulk autonomous
          fixture writes. inv6 — synthesis at audit/CLI time, never the hot path.
          Fabrication-kill adjacency: any templated/generative rewording collapses the
          derivation-only property distinguishing this from demand-gap-auto-draft — query
          assembly is verbatim-span-only and fails closed (skip the row) rather than
          paraphrase. GATE_UPDATE_* promotion is a dated owner sign-off (the LIF-7
          soak_status precedent), never an automatic threshold.
        implementation_notes: >-
          Attach: links.load_edges (typed_out — first production consumer), history.typed_inbound
          (supersedes tip = live resolution), eval_recall._load_fixture_docs / load_hard_set,
          _default_fixture_path (.audit-fixtures sink), and SIG-6's draft/confirm surface
          (recall_hard_set.drafts.yaml + confirm_hard_set_row) — the "ABSENT from
          this baseline (on open PR #17)" note was STALE (SIG-6 merged 2026-07-10); the
          landed schema was re-read fresh on MAIN before coding (T3-T7 premise-correction
          law) and extended additively (superseded= on confirm, passthrough in load_hard_set).

      - id: TMB-5
        title: Succession replay (verify a supersede's recall surface transfers)
        priority: P2
        effort: M
        status: done
        source: {lens: capture-consolidation, verdict: RESHAPE, convergence: 1, landscape: [memoryagentbench-update-track]}
        problem: >-
          When a memory is superseded, nothing verifies that the queries which used to
          recall the OLD name now recall the SUCCESSOR — a supersede can silently leave a
          tombstone that still surfaces or a successor that never does.
        proposal: >-
          On semantic_reverify --outcome demote[--superseded-by], harvest historical
          query_previews (recall_events/episode_buffer) that recalled the OLD name,
          re-run recall() offline against the post-verdict corpus, and print PASS/FAIL/
          INCONCLUSIVE per query (successor ranks now? tombstoned name still leaks?) at
          verdict time + a doctor line for supersedes left with a failing/unrun replay.
          Read-only, zero hot-path cost. The SIG-6-fixture-drafting half is CUT — the cut
          STANDS even though its stated rationale aged (SIG-6 merged 2026-07-10, not
          absent as written): TMB-4 owns update-fixture drafting, and a second drafting
          surface inside the demote verdict would be double ownership.
        acceptance_criteria:
          - given a demote/superseded_by verdict on a memory with >=1 prior recall_events hit for its name, the replay prints one line per harvested query — PASS (successor ranks), FAIL (tombstone still recalled, successor absent/low), or INCONCLUSIVE (80-char preview insufficient)
          - given zero prior hits for the predecessor name, the replay reports "nothing to replay" rather than erroring or fabricating a query
          - doctor gains exactly one new line surfacing supersedes with a failing/unrun replay; test_doctor's len(CHECKS) line-count assertion passes unmodified
          - semantic_reverify's replay hook is exercised only via its existing single-item CLI path (the no-bulk AST pin passes); replay outcomes append only to the existing reconsolidation_events ledger (no new ledger, no draft-fixture generation)
        dependencies: []
        invariant_note: >-
          inv6 — replay fires only inside semantic_reverify's CLI path, zero hot-path
          cost. inv4 — confined to the single-item demote path already AST-pinned against
          bulk; no replay_all verb. inv1 — outcomes append to the existing gitignored
          reconsolidation_events ledger. inv5 by removal — the SIG-6-dependent
          fixture-drafting half is CUT (originally "SIG-6's draft surface is absent on
          the tree" — stale, SIG-6 merged 2026-07-10; the cut survives as single-ownership:
          TMB-4 is the update-fixture drafter).
        implementation_notes: >-
          Attach: reconsolidate.semantic_reverify (the demote/superseded_by trigger),
          telemetry.log_recall_event ledger (names + query_preview, both LIVE — do NOT
          claim this reads the DARK scores/ranks; it reads query_preview+names only),
          recall.recall (offline re-run, same API the eval drives). No SIG-6 dependency
          in this cut.

  # ---------------------------------------------------------------- CLB ---
  - id: CLB
    name: Team collaboration substrate
    extends: TEA + SEC-spine + GRW
    goal: >-
      Turn review-gated writes — hippo's identity, and the unclaimed high ground the
      landscape says no shipped system holds — into team ergonomics: a review packet,
      per-verification attribution, cited-code re-verification-before-reuse, and
      incoming-merge dedup — all human-merges-still, git-native.
    items:

      - id: CLB-1
        title: Corpus review packet (op-classified diff + scoped lints + local recall-impact preview; --ci = SEC-8 vehicle)
        priority: P1
        effort: L
        status: done
        source: {lens: team-substrate, verdict: RESHAPE, convergence: 1, landscape: [fountaincity-pr-review-2026, cc-team-bottleneck-38536]}
        problem: >-
          A teammate reviewing a memory PR has no tooling — no op-classified diff, no
          scoped lints, no preview of how the change shifts recall. The landscape says
          PR-review-for-memory is named best practice and NO shipped system implements
          the human-promotion step; it is also the top Claude Code team bottleneck.
        proposal: >-
          A zero-LLM `memory review [base..head]` CLI (default HEAD~1..HEAD, or
          working-tree-vs-HEAD solo) + a skill that op-classifies each touched memory
          (ADD/UPDATE/SUPERSEDE/ARCHIVE/EDGE from frontmatter/edges/archive-moves), runs
          touched-file-scoped lints (scan_text/scan_portability/conflict_radar/edge-
          integrity) with a `--ci` mode whose nonzero-exit IS the SEC-8 CI-scan vehicle,
          and — LOCAL-ONLY, never CI, disclosing the 80-char preview bound and printing
          "no local episodes to replay" when empty — replays recent episode_buffer
          previews against a temp-worktree shadow index at head-vs-base to preview which
          memories would newly recall or stop recalling. Human still merges: no
          auto-approve anywhere; the only future autonomous behavior (posting the packet
          as a gh PR comment) is out of scope, gated behind the trust spine.
        acceptance_criteria:
          - the `memory review` CLI produces a pasteable markdown packet whose op classification is derivable purely from frontmatter/edges/archive-moves — an AST/import pin proves zero LLM/network in the classifier path
          - lints run scoped to touched files, reusing scan_text/scan_portability/conflict_radar/edge-integrity verbatim; `--ci` exits nonzero iff a finding exists and is documented/wired as the SINGLE CI secret-scan surface (SEC-8's gate half, not a parallel one)
          - the recall-impact preview never runs under CI/HIPPO_DISABLE_DENSE=1 (grep/test-verifiable local-only), always prints the 80-char truncation bound inline, and prints an explicit "no local episodes to replay" line when episode_buffer is empty
          - no auto-approve/auto-merge/auto-post code path exists (grep-verifiable); test_skills_contract's literal skill-count pin is updated in the same PR that ships the skill
        dependencies: [SEC-8]           # PREMISE CORRECTED at build (2026-07-17): SEC-8 was marked "ROADMAP.v1, open" but SEC-8..14 ALL shipped 2026-07-10 — INCLUDING a repo-tree secret-scan CI job (ci.yml). What remained unbuilt was the memory-DIFF gate half + SEN-2's threat-lint CI leg: CLB-1's --ci is THAT single vehicle (the new memory-review job); the repo-tree job stays as SEC-8's release-hygiene half over the shipped tree — different scope, documented in ci.yml, not a second memory scanner.
        invariant_note: >-
          inv4 — auto-approving clean memory PRs is REMOVED outright (deletes the
          review-gated-writes identity pillar; cannot be metric-gated back); only
          auto-posting survives as a future trust-spine-gated behavior. inv1/inv6 —
          shadow index is temp/derived/gitignored, whole packet off the hot path. inv3 —
          explicit "no local episodes" line for the fresh-clone/CI case. inv5 — the --ci
          lint-gate is the single canonical CI secret-scan surface.
        implementation_notes: >-
          Attach: eval_recall.evaluate (shadow-eval machinery), build_index (shadow index
          at ref), telemetry.log_episode (previews), rules_plane.conflict_radar,
          portability.scan_portability, secrets.scan_text, links.all_typed_edges + load_edges,
          a new skill (14-skill pin update). Reconcile with the shipped SEC-6 changed-file
          consent-sample machinery (2f960a7) — reuse that "what changed" surface, don't
          duplicate it. Use hippo's canonical edge vocabulary (supersedes/contradicts/
          refines + archive moves); cite Mem0's ADD/UPDATE/DELETE taxonomy as a mapping
          reference only, not the shipped vocabulary.

      - id: CLB-2
        title: verified_by attribution (per-verification identity + team-coverage reporting, suppressed at solo)
        priority: P2
        effort: M
        status: done
        source: {lens: team-substrate, verdict: RESHAPE, convergence: 1, landscape: [copilot-citation-scoping-2026]}
        problem: >-
          hippo records WHO authored a memory (git) but not who VERIFIED it — last_verified
          exists but its read path is dark, and there is no verified_by identity — so a
          team cannot see coverage (which memories only their author has ever vouched for).
        proposal: >-
          Add an additive, absence-emits-nothing verified_by:<user_slug> stamp with its
          OWN per-verification timestamp (decoupled from write-once last_verified) through
          the existing gated reverify verdict; ship doctor + trust-scorecard consumers for
          BOTH last_verified (lighting up its dark read path) and verified_by (never-
          verified-by-non-author, authored-vs-verified ratio, departed-verifier signal);
          SUPPRESS every team-coverage line at <=1 distinct git author; sequence the
          identity-committing stamp behind SEC-14's opt-in/public-remote-warning switch.
        acceptance_criteria:
          - reverify_file additively stamps verified_by:<slug>@<own-ts> on every human-gated reverify verdict without altering last_verified's write-once semantics; corpus_format stays 4 (no bump)
          - doctor + check_trust_scorecard ship real consumers for BOTH last_verified and verified_by, with every team-coverage line omitted (not just empty) at <=1 git author — a byte-identity/no-op test for solo corpora
          - an AST pin proves verified_by is never read by any ranking-adjacent path (mirrors the confidence pin); git-log identities normalize through current_user_slug's slugification before any join
          - the verified_by stamp ships gated on/after SEC-14; the departed-verifier line is dropped or rendered in a deterministic non-timestamp bucketed form (doctor no-timestamps pin)
        dependencies: [SEC-6, SEC-14]   # PREMISE CORRECTED at build (2026-07-17): SEC-14 was marked "open" but shipped 2026-07-10 (HIPPO_TEA5_OPT_IN + public-remote warning + check_committed_usage_privacy) — the ED-5 sequencing is satisfied by LANDING AFTER it; the stamp itself stays human-gated by the reverify verdict. Also stale: the AC said "corpus_format stays 4" — the live value was already 5 pre-CLB-2; the binding invariant (NO bump) held and is now test-pinned.
        invariant_note: >-
          ED-1 — detection-half only; writes through the existing per-item human-gated
          reverify (inv4). ED-4 — additive/absence-emits-nothing, corpus_format 4. inv1 —
          the coverage join is computed at report time, never persisted. inv6 — no hot
          path. New AST pin: verified_by never a ranking input. ED-5 sequencing — this
          opens a second committed-identity surface while SEC-14 is open, so it shares
          that switch or lands after it.
        implementation_notes: >-
          Attach: provenance.reverify_file + _stamp_last_verified, staleness.read_last_verified
          + find_citation_rot, reconsolidate.semantic_reverify (the ONE reverify gate),
          telemetry user_slug discipline (TEA-5), doctor.CHECKS + check_trust_scorecard.
          Re-anchor reverify_file to the current tree BEFORE the SEC-6 record_authored_write
          consent-baseline fold (2f960a7 touched provenance).

      - id: CLB-3
        title: Evidence-fence contract + cited-code drift detector (hunk staleness)
        priority: P2
        effort: M
        status: done
        source: {lens: team-substrate, verdict: RESHAPE, convergence: 1, landscape: [copilot-jit-reverify-2026]}
        problem: >-
          GRW-1 captures verbatim hunks into drafted bodies, but once a memory quotes a
          code region there is no check that the region still matches the tree — the
          quoted evidence silently rots, and a reviewer reusing it can't tell.
        proposal: >-
          Phase 1: an additive machine-recognizable evidence-fence marker (path:region-
          attributed) in the consolidate drain contract for quoted hunk lines, future
          drains only (no backfill). Phase 2: inside session_start's existing
          _build_run_context/find_stale pass (the sole stale.json writer, off the hot
          path — NEVER build_index), extract marked blocks and diff-aware-match them
          (unified-diff prefixes stripped; removed lines excluded) against the tree,
          writing an optional evidence_drift into stale.json; upgrade the RET-6 banner to
          name the match level and union hits into the existing watermark_stale_candidates
          -> semantic_reverify gate.
        acceptance_criteria:
          - consolidate SKILL.md defines a machine-recognizable evidence-fence marker (fence + path:region line); pre-existing unmarked bodies are out of scope (skipped, doctor-counted unverifiable) — no backfill claim
          - extraction + matching run inside session_start's find_stale pipeline, never build_index, with an AST/behavioral pin that recall's hot-path _ensure_index performs zero evidence matching
          - the matcher is diff-line-class aware (prefixes stripped; context/added lines checked exact-then-whitespace-normalized; removed lines excluded); tests cover all three classes + a whitespace-only-refactor false-positive case
          - evidence_drift is an optional stale.json field (no bump); doctor + the upgraded RET-6 banner + the salience-off byte-identity pin stay green with the field absent and present; drifted memories union only into watermark_stale_candidates -> semantic_reverify (no new write verb)
        dependencies: [GRW-1, RET-5, RET-6]   # cross-file, SHIPPED
        invariant_note: >-
          inv6 — the original build_index in-build slot is hot-path-reachable via
          _ensure_index; relocate all matching into session_start's find_stale pass (already
          an off-hot-path full-text read); add the AST pin. inv5 — stale.json's single-writer
          contract preserved. inv3 — the banner states match level so refactor/whitespace
          false positives stay legible. inv4 — routes into the existing gate, no new verb.
          ED-4 — evidence_drift optional in the self-gating stale.json cache, no bump. ED-1 —
          the autonomous nearest-region pre-fill half is dropped, deferred behind a dated
          precision finding from reconsolidation_events.
        implementation_notes: >-
          Attach: capture._git_diff_hunks (evidence producer) + the drain fence contract in
          consolidate SKILL.md, staleness.find_stale + write_stale_cache + read_stale_cache,
          recall (RET-6 banner emission), reconsolidate.watermark_stale_candidates + semantic_reverify.

      - id: CLB-4
        title: Incoming-merge duplicate digest
        priority: P2
        effort: S
        status: done
        source: {lens: team-substrate, verdict: RESHAPE, convergence: 1, landscape: [obsidian-git-conflicts-803, crdt-structure-not-semantics]}
        problem: >-
          When a teammate's memories arrive via git merge, nothing surfaces that an
          incoming memory duplicates or conflicts with a local one — the two-plane drift
          hippo prevents at write time is unguarded at merge time.
        proposal: >-
          At SessionStart, when the incoming commit range touching .claude/memory/ is
          non-empty (via the existing _last_session_watermark/_recent_merge_signals
          lineage, falling back to SEC-6's trust.untrusted_changes delta on untrusted
          clones), run committed_duplicate_neighbors over just the incoming-touched
          stems, cap <=5 pairs, and emit one bounded producer line + one doctor line
          routing each pair to /hippo:consolidate (GRW-3 merge tier) or /hippo:resolve —
          no second detector, no new ledger, no autonomous edge writes, no
          same-stem-collision leg, no precision-gated phase 2.
        acceptance_criteria:
          - when the watermark-derived (or SEC-6 trust-drift) incoming range contains commits touching .claude/memory/, one producer line lists >=1 duplicate-candidate pair (committed_duplicate_neighbors over incoming stems, cap <=5); an empty/unreachable range (squash-merge) emits an explicit legible degradation line, never silent nothing
          - no contradicts/supersedes edge is written autonomously; every pair routes to an existing human-gated flow; resolve_view's inbox derivation is untouched
          - no second merge-detector or per-clone ledger is introduced — the digest reuses _recent_merge_signals/_last_session_watermark + the GOV-4 ledger pattern, verified against the current tree
          - the 21+-producer pinned-order test + doctor CHECKS pin are updated in the same commit; existing AST pins stay green
        dependencies: [SEC-6, GRW-3, GRW-6, GOV-4]   # cross-file (SEC-6 shipped; GRW-3/GRW-6/GOV-4 shipped)
        invariant_note: >-
          inv4 — every pair terminates in an existing human-gated flow, never an
          autonomous edge write. inv5 — reuses _recent_merge_signals/_last_session_watermark
          (single merge-range detector) + the GOV-4 ledger (single seen-state). inv6 —
          bounded <=5, SessionStart-only, reuses resident dense vectors. inv3 — the
          squash/unreachable-range case emits an explicit degradation line. Sequencing —
          reads SEC-6's trust-drift delta (2f960a7), so lands after/alongside it.
          Distinct from round-1-killed cross-clone-auto-harvest: single repo's own incoming
          range, human-routed, no autonomous write — re-verify against that kill's rationale.
        implementation_notes: >-
          Attach: session_start.PRODUCERS (pinned order), reconsolidate._last_session_watermark,
          resolve_view.unresolved_contradictions + describe, new_memory.committed_duplicate_neighbors
          (GRW-3), rules_plane.rule_dup_candidates (template), links.all_typed_edges, doctor.CHECKS.

  # ---------------------------------------------------------------- IOP ---
  - id: IOP
    name: Interop & reach
    extends: RUL + RCH + import/export
    goal: >-
      Make hippo the git-drift hygiene layer over every rule dialect in the repo and
      the tool you graduate TO from the incumbents — detection-only, trust-spine-gated
      where it touches foreign content, one ED-3 spike before parsing any foreign format.
    items:

      - id: IOP-1
        title: Foreign-dialect radar (census + cross-dialect divergence + git-drift rot)
        priority: P2
        effort: M
        status: planned
        source: {lens: interop-reach, verdict: RESHAPE, convergence: 1, landscape: [ctxlint-2026-07, scoped-frontmatter-converged-fragmented]}
        problem: >-
          A repo may carry Cursor .mdc, Copilot .instructions.md, and hippo memories that
          say the same thing and drift apart, and a scoped-rule file may point at code
          that moved — hippo has the only real drift machinery but applies it to none of
          the foreign dialects.
        proposal: >-
          A report-only doctor/audit-skill check that (a) censuses known scoped-rule
          dialect files by PRESENCE alone (Cursor .cursor/rules/*.mdc, Copilot
          .github/instructions/*.instructions.md, watch-only unratified .agents/rules/),
          (b) cross-applies rule_dup_candidates across discovered dialect files to flag
          same-rule-diverged pairs, and (c) applies existence-check citation-rot + dead-
          glob detection to .mdc files via the RCH-2 parse_mdc/resolve_globs — all in a
          BRAND-NEW FOREIGN_GLOBS sibling NEVER merged into GOV_GLOBS and never added to
          PRODUCERS. Writes nothing, parses no foreign frontmatter beyond .mdc, imports
          nothing. (Merges rule-dialect-bridge + all-dialect-rules-rot.)
        acceptance_criteria:
          - the census reports which dialects have files present via filesystem glob-presence only (no foreign-frontmatter parsing beyond .mdc), degrading to a "no other dialects found" line for the single-dialect case
          - cross-dialect divergence reuses rule_dup_candidates across discovered files as doctor/audit output only — never written, never enqueued as an import candidate
          - two rot checks ship: existence-only stale-citation (NOT framed as git-log drift-since-written, since .mdc carry no source_commit baseline) + zero-match glob detection via resolve_globs; Copilot/nested-AGENTS.md/contradiction-via-conflict_radar are out of scope
          - a new FOREIGN_GLOBS symbol (separate from GOV_GLOBS) is never passed to gov_citations/conflict_radar/rule_dup_candidates/load_rules_cache authority paths (grep/AST verified); rules_rot_producer + PRODUCERS untouched; doctor CHECKS pin updated in lockstep
        dependencies: [RUL-2, RUL-7, RCH-2]   # cross-file, SHIPPED
        invariant_note: >-
          inv5 is binding — foreign enumeration lives in FOREIGN_GLOBS, never merged into
          GOV_GLOBS, so RUL-1's authority-gap join, RUL-3's write-dedup, and RUL-4's
          recall pointer never mistake un-owned Cursor content for hippo authority. inv6 —
          audit-skill/doctor-only, on demand, NOT added to PRODUCERS. inv1/inv4 — derived/
          gitignored report, read-only; per-item fix proposals stay behind a dated
          precision-measurement decision. ED-3 — a completed live probe before any future
          Copilot applyTo: support; .agents/rules/ (#179) is unratified, out of scope.
        implementation_notes: >-
          Attach: import_mdc.parse_mdc + resolve_globs + import_candidates, rules_plane.GOV_GLOBS
          + rule_dup_candidates + _glob_to_re, staleness.find_citation_rot + _path_change_times,
          audit SKILL.md. The cut import/export scope is where the real risk lived — keep
          it out; this is evidence-gathering only until a census shows real multi-dialect usage.

      - id: IOP-2
        title: Import upstream fingerprints (hash-on-change re-review at the import plane)
        priority: P2
        effort: S
        status: planned
        source: {lens: interop-reach, verdict: RESHAPE, convergence: 1, landscape: [mcpoison-hash-on-change-2025]}
        problem: >-
          A .mdc-imported memory has no link back to its source file, so when the upstream
          .mdc drifts or is deleted, the imported memory silently goes stale with no signal.
        proposal: >-
          At .mdc import (import_mdc_file, RCH-2), append the source .mdc's own repo-
          relative path into the existing cited_paths route (the "Applies to:" backfill)
          so RET-6's already-shipped git-log staleness scan + doctor flag BOTH upstream
          drift AND deletion for free — no new frontmatter stamp, no new doctor check, no
          re-import-diff pipeline. Non-git upstream adapters (claude-mem/Mem0) are out of
          scope until a second adapter ships.
        acceptance_criteria:
          - after importing a .mdc, the memory's cited_paths (per staleness.read_provenance) includes the source .mdc's repo-relative path, verified alongside the existing glob-target paths
          - editing the source .mdc post-import and running find_stale flags the memory, so RET-6's verify-at-use banner fires on next recall — verified live (ED-3 spike), doctor line-count unchanged (no new check)
          - deleting the source .mdc post-import is picked up by the same git-log --name-only scan as a changed path — verified live, no separate orphaned-detection path
          - byte-identical output for every write_memory call outside import_mdc_file (no bump — cited_paths already exists in schema)
        dependencies: [RCH-2, RET-6]     # cross-file, SHIPPED
        invariant_note: >-
          ED-4 satisfied trivially — no new frontmatter field (cited_paths is pre-existing),
          no bump, no new doctor CHECKS entry. inv4 — no new auto-write/refresh; RET-6's
          banner is read-only signal, re-import stays manual. Scope confined to the shipped
          .mdc adapter; a future non-git adapter reuses trust.file_sha256/corpus_fingerprint
          (shipped SEC-6) rather than inventing hashing — but that is NOT this item.
        implementation_notes: >-
          Attach: import_mdc.import_mdc_file, new_memory.write_memory, staleness.read_provenance,
          doctor, reconsolidate. Run the ED-3 live probe (edit + delete the source .mdc,
          confirm RET-6 fires) before claiming the deletion path.

      - id: IOP-3
        title: Curated export receipts (evidence ledger for AGENTS.md floor items)
        priority: P2
        effort: S
        status: planned
        source: {lens: interop-reach, verdict: RESHAPE, convergence: 1, landscape: [eth-llm-agents-md-hurts-2602, progressive-disclosure-consensus]}
        problem: >-
          export_agents proposes an AGENTS.md diff but shows no evidence for WHY each
          floor line earned export — and the landscape warns LLM-generated AGENTS.md HURTS
          success (-3%); a curated, evidence-bearing export is the counter-story hippo can
          uniquely tell, but the evidence is invisible today.
        proposal: >-
          export_agents gains a report-only curation receipt at export time — a thin
          composition over existing compute_strength_scores/read_stale_cache/rules_rot/
          conflict_radar/describe explaining, per floor line, why it earned export (soak
          strength + gate_met/maturity, staleness, graduation, conflict hits, prior-block
          rot) and what was excluded and why; ZERO bytes of the proposed AGENTS.md change.
          Progressive-disclosure multi-file emission (#179) is out of scope (that is
          RUL-6's LIF-7-gated deliverable).
        acceptance_criteria:
          - the receipt fires only via the explicit /hippo:export-agents invocation (never the hot path) as a separate report alongside the existing diff; the proposed AGENTS.md content is byte-identical to today
          - the receipt is built by calling describe/compute_strength_scores/read_stale_cache/rules_rot/conflict_radar verbatim (no reimplemented evidence math); notes reconcile it with export_agents's "zero new reporting surface" design intent
          - every item shows conflict_radar's gate_met/soak-maturity flag explicitly, so a thin/fresh-clone corpus renders "insufficient evidence" rather than indistinguishable-from-clean (inv3)
          - no selection/filtering/ranking behavior changes — evidence is display-only, export stays a human-applied read-only proposal, confidence/strength never a ranking input (AST pin)
        dependencies: [RUL-7]           # cross-file, SHIPPED
        invariant_note: >-
          ED-1 — report artifact, zero AGENTS.md bytes, no auto-exclude. AST pin — evidence
          values display-only, never a selection/ranking input. inv4 — export stays
          per-item human-applied. inv3 — per-item gate_met/maturity so thin evidence reads
          "insufficient", never false-confidence clean. EXCLUDES progressive-disclosure/#179
          emission (RUL-6's reserved LIF-7-gated path — must not be written under a
          different code path). Do not conflate this export-time evidence with the
          SIG-5/RET-8 read-side revisit trigger — label/gate independently.
        implementation_notes: >-
          Attach: export_agents.export_agents + _render_block + _splice, soak.compute_strength_scores,
          staleness.read_stale_cache, rules_plane.rules_rot + conflict_radar, export-agents SKILL.md.

      - id: IOP-4
        title: claude-mem read-only migration audit (on the shipped import adapter tail)
        priority: P2
        effort: M
        status: planned
        source: {lens: interop-reach, verdict: RESHAPE, convergence: 1, landscape: [claude-mem-86k-stars, letta-memfs-convergence]}
        problem: >-
          claude-mem (86.6K stars) is the incumbent hippo should be the graduation path
          FROM, but there is no adapter — and its auto-write-everything model is exactly
          what hippo's review gate improves on, so a migration audit is the wedge.
        proposal: >-
          A single claude-mem (discover, parse) adapter plugging into import_mdc's existing
          generic tail (import_candidates report; later import_one_candidate's per-item
          check_candidate->secret-lint->write_memory), gated by an ED-3 live probe of
          claude-mem's on-disk store as literal step zero. v1 ships AUDIT-ONLY (zero writes,
          no pending-queue/_SEED_SCHEMA routing); any write leg reuses the shipped RCH-5
          pack_install_item hard-refuse-on-secret + SEC-5 consent pattern (now shipped) for
          foreign content instead of a new primitive. Letta MemFS + "adapter family"
          framing dropped until this one proves the pattern.
        acceptance_criteria:
          - an ED-3 live probe of claude-mem's on-disk store (docs + binary + live inspection, dated finding recorded) completes before any reader/parser is written
          - the `import --from claude-mem` command ships v1 audit-only — an import_candidates-shaped report (candidate count, dedupe rate via rule_dup_candidates, secrets/portability hit counts) with zero writes to corpus, rules.json, or the pending queue
          - no dependency on a not-yet-shipped quarantine-lint sibling; any later write leg reuses pack_install_item's refuse-on-secret + SEC-5 consent verbatim and lands only after it is re-verified on the tree
          - any later write leg follows import_one_candidate's per-item pattern (one file, one yes, one run) — no batch/loop enqueue, no new _SEED_SCHEMA kind
        dependencies: [SEC-5, SEC-6, SEC-7, RCH-5, RCH-2]   # ALL cross-file, ALL SHIPPED (2f960a7 / d6ec77d)
        invariant_note: >-
          inv4 — writes (when they ship) go through import_one_candidate's per-item path,
          never a loop. inv1/ED-4 — no new pending-queue seed kind / _SEED_SCHEMA bump.
          ED-3 — live probe of claude-mem's format as literal step zero (web-claimed only).
          inv5 — avoid the name "quarantine lint" (collides with shipped SEC-6). The trust
          spine + RCH-5 are now SHIPPED, so unlike the round-1 framing this item's write leg
          is unblocked once the ED-3 probe + audit half land — but still stays per-item.
        implementation_notes: >-
          Attach: import_mdc.import_candidates (the generic tail), capture.write_session_capture
          / _SEED_SCHEMA (what NOT to route through), new_memory.write_memory, secrets.scan_text,
          portability.scan_portability, rules_plane.rule_dup_candidates, packs.pack_install_item
          (the shipped RCH-5 refuse-on-secret template — re-read on the tree), import SKILL.md.

# ===========================================================================
# RELEASE TRAIN — round-2 tiers T8-T13. done_means + a dependency-satisfied item
# list + a tier gate where one applies. Build order within a tier respects the
# same-tier deps noted on items (GRF-2 before GRF-4; SEN-1 before SEN-2/3; SEN-2
# before SEN-4). No item depends on a LATER round-2 tier (validated).
# ===========================================================================
release_train:

  - tier: T8
    target_version: 1.8.0   # STALE (authored pre-v1.8): T8 actually landed post-v1.19.0, 2026-07-16 — round 3 (T14–T17) executed first
    theme: "The measurement spine"
    status: done
    gate: "None — every T8 item's deps are shipped (RET-8/SIG-4/GOV-6). This is the foundation the rest of the round consumes; build it first."
    done_means: >-
      hippo can see its own behavior: eval runs persist and diff against a committed
      baseline with a proven-deterministic (pass^k) core; the dark recall_events
      scores/ranks arrays and the score-less abstention arm are read for the first
      time (drop-reason autopsy); MCP recall/why stop being telemetry-invisible; and
      the cost of what hippo injects is measured and surfaced. All report-only, no
      ranking change, no schema bump.
    items: [MSR-1, MSR-2, MSR-3, MSR-4, MSR-6]
    audit_note: >-
      Read each item's implementation_notes; re-verify every named symbol (the tree
      moved three times during authoring). MSR-1 is the keystone (MSR-5, GRF-2/4,
      TMB-3/4 consume persisted/diffable eval). MSR-3 MUST channel-filter
      doctor.check_hot_path_latency or an MCP call corrupts the KPI-3 p95 gate. MSR-4
      does NOT own RET-9 (GRF-3 does); it supplies the abstention-side evidence only.
      MSR-6's anti-per-memory-aggregation AST pin is load-bearing (keeps the round-1
