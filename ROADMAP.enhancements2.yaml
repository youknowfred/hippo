# ============================================================================
# hippo — Enhancement & Capability Roadmap, ROUND 2 (post-trust-spine / v1.8+)
# ============================================================================
# The EXECUTABLE form of EXPLORATIONS2.md: the round-2 adversarially-vetted
# enhancement catalog (47 candidates -> 37 merged -> 36 RESHAPE + 1 KILL across a
# 158-agent ideation+vetting fan-out), formalized into fully-scoped, dependency-
# sequenced items and work tiers for multi-session implementation.
#
# This is the SECOND enhancement train. It is downstream of, and uses the same
# machinery as, ROADMAP.enhancements.yaml (round 1, tiers T1-T7). Round-2 tiers
# are numbered T8-T13 and round-2 workstreams use NEW namespaces (MSR/GRF/SEN/
# TMB/CLB/IOP) so ids never collide with round 1 (SIG/RUL/RCL/GOV/GRW/RCH),
# ROADMAP.yaml (RET/GRA/LIF/CAP/INT/TEA/SEC/...), or ROADMAP.v1.md.
#
# Continuity across sessions lives in TWO synced places (same protocol as round 1):
#   1. This file's per-item / per-tier `status:` — the durable progress LEDGER.
#   2. A chain of CAPSTONE MEMORY files (`hippo-enh-t<N>-*`, continuing the round-1
#      chain) — the narrative HANDOFF written at each tier session (session_protocol).
#
# Companion documents:
#   ROADMAP.enhancements.yaml — round-1 enhancement train (T1-T7, shipped)
#   ROADMAP.yaml              — shipped engine roadmap (v0.2.0-v0.7.0 + exploratory)
#   ROADMAP.v1.md             — the v0.8.0->v1.0.0 OSS-launch plan
#   EXPLORATIONS2.md          — the round-2 source catalog (verdicts, reshapes, kill)
# ============================================================================

meta:
  title: hippo enhancement & capability roadmap — round 2
  repo: youknowfred/hippo
  authored: 2026-07-09
  baseline_ref: 3a4a94a          # branch v080-trust-spine HEAD at authoring time
  baseline_state: >-
    corpus_format 4, index SCHEMA_VERSION 6, seed schema 2, MCP 5 tools / 3
    resources, 14 skills, suite ~1474. SHIPPED since round 1 (verified live at
    authoring): the GRA-1 dense-knee fix (4d16022 — multi-hop dense 0.0->1.0), the
    v0.8.0 trust spine SEC-5/6/7 (2f960a7 — corpus_consent_sample / corpus_fingerprint
    / untrusted_changes / record_authored_write / check_trust_drift), and RCH-5 pack
    install/update (d6ec77d — pack_install_item / pack_install_plan). ON ITS OWN
    UNMERGED PR since mid-cycle: SIG-6 is committed on branch enh-t7-sig6 (PR #17,
    open, base main) but is ABSENT from both main and v080-trust-spine — a real
    cross-file dependency for six items here (it must land / merge PR #17).
  source: >-
    Formalized from EXPLORATIONS2.md. Round-2 method: a 13-agent read-only grounding
    fan-out (every claim file:symbol-verified against the tree) + a 6-survey landscape
    fan-out (provenance-tagged) + an 8-lens ideation (47 candidates) + a 3-skeptic
    adversarial panel per candidate (signal-existence / user-value / fit) + a judge,
    then a coverage critic. Every item here is a surviving RESHAPE; the one KILL and
    the disciplined cuts are recorded under not_pursuing.
  method: >-
    Items carry the vetters' reshape guidance in `proposal` and the verified seams in
    `implementation_notes`. The governing design principle is decisions.ED-1
    (detection-first, carried verbatim from round 1): ship the legible detection /
    human-in-the-loop half; gate any autonomous ranking or corpus/rules write on
    proven signal density. Every autonomous half in this file is severed and deferred
    behind a DATED OWNER DECISION + measured evidence, never a metric-proxied gate.
  audits:
    - date: 2026-07-09
      scope: >-
        Live re-baseline during authoring (the round-1 premise-correction law): the
        branch advanced three times mid-exploration. Confirmed by reading commits +
        re-running the eval that the trust spine (2f960a7), the GRA-1 fix (4d16022),
        and RCH-5 (d6ec77d) SHIPPED, and that SIG-6 lives on its own unmerged PR #17 (absent from main and v080-trust-spine). Re-measured multi-hop
        on HEAD: production dense+bm25 = 1.0 (fixed); mixed-mode (dense index
        resident, bm25 query-time ranking) = 0.0 (the residual MMR leg GRF-2 targets).
        implementation_notes are BINDING but SNAPSHOT guidance: verify each named
        symbol against the live tree before coding, then follow the note unless the
        tree contradicts it (the repo is the source of truth) and correct it in-file.
  scoring:
    priority:
      P0: broken promise / unblocks a tier — do first in its tier
      P1: core to the tier's done_means
      P2: quality and leverage
      P3: opportunistic or gated on a proving condition
    effort: {S: under a day / one PR, M: one to three days, L: multi-day / multi-PR}
  status_legend:
    planned: not started
    in_progress: an agent session is actively implementing it
    done: acceptance_criteria met, suite green, invariants preserved
    deferred: blocked or descoped this cycle (reason recorded in the capstone)

north_star: >-
  With the engine measured, defended, and team-ready: make hippo's own behavior a
  first-class deterministic artifact (a real eval flywheel over the ledgers it
  already writes), turn the just-shipped trust spine into a proven, incident-ready
  defense, and turn review-gated writes — hippo's identity — into team ergonomics —
  all WITHOUT compromising the local, offline, git-native, zero-LLM-hot-path,
  human-gated-write identity, and without shipping a single always-on read-side
  ranking prior (the salience keystone stays owner-decided-OFF; this round builds
  only the evidence substrate for its revisit).

# ---------------------------------------------------------------------------
# Invariants every item must preserve (carried VERBATIM from round 1 / ROADMAP.yaml).
# An item that violates one is wrong, not bold. `invariant_note` names the guard
# when an item sits in tension.
# ---------------------------------------------------------------------------
guiding_invariants:
  - inv1: markdown-in-git is the single source of authority; index/telemetry/
      graph/rules-derived caches are derived, rebuildable, gitignored.
  - inv2: hooks always exit 0, never download, never block; recall failures
      degrade silently at the hook boundary but become LOUD at doctor/SessionStart.
  - inv3: degradation must be legible — every silent-fallback path gains a
      user-visible signal (nudge/doctor/producer).
  - inv4: destructive/corrective writes are per-item and agent-gated; no bulk
      autonomous sweeps; writes into the rules plane are reviewable per-item diffs.
  - inv5: one canonical name/path per concept; renames and schema changes are
      clean breaks with a version bump, not compat shims.
  - inv6: the UserPromptSubmit hot path stays PURE RETRIEVAL — no LLM calls, no
      network, no consolidation work per-prompt.

# ===========================================================================
# SESSION PROTOCOL — identical discipline to round 1; the capstone chain continues.
# ===========================================================================
session_protocol:
  purpose: >-
    Multi-session, multi-agent implementation with no loss of context. This file's
    `status:` fields are the source of truth for WHAT is done; the capstone memory
    chain (hippo-enh-t8-* onward, continuing the round-1 chain) is the source of
    truth for the STORY (decisions, gotchas, next).
  pick_up: |
    - Read MEMORY.md; open the most recent hippo-enh-t* capstone to learn the active
      tier, what last shipped (with commit shas), and the next item.
    - Read this file; select the next item whose status is planned and all of whose
      dependencies are satisfied. A dependency id that is NOT a round-2 item (not in
      workstreams below) is CROSS-FILE — resolve it against round 1
      (ROADMAP.enhancements.yaml), ROADMAP.yaml, or ROADMAP.v1.md and confirm it is
      shipped/planned there. SIG-6 (round 1) is the most common open cross-file dep.
    - READ THE ITEM'S implementation_notes AND ITS TIER'S audit_note FIRST. They cite
      verified seams (file:symbol) as of the baseline_ref. VERIFY EACH NAMED SYMBOL
      STILL EXISTS (the tree moved three times DURING authoring — see meta.audits);
      follow the note unless the live tree contradicts it, and correct it in-file as
      part of your commit if it does.
    - Sanity-check reality (git log, run the suite) before coding.
  execute: |
    - Implement ONE item (or a coherent slice) per RELEASING.md — one id-prefixed
      commit (e.g. "MSR-1: ..."), full suite green after each.
    - Preserve every guiding_invariant. If an item's invariant_note names a guard you
      cannot honor, set status to deferred, record why in the capstone, and stop — do
      not weaken an invariant to land a feature.
    - Add tests pinning each acceptance_criterion (hermetic per-module convention;
      negative-capability pins where an invariant forbids a primitive; byte-identity
      pins where an additive field must not perturb existing output).
    - Flip item status planned -> in_progress -> done (or deferred).
  verify: |
    - Every acceptance_criteria demonstrably met; full suite green; no invariant
      regressed; any new silent-fallback path made legible at doctor/SessionStart.
    - If an item bumps a schema/derived-cache version, follow ED-4 (clean break + one
      migration + a doctor-reported delta) and state the re-bootstrap flag. NOTE: no
      item in this round is EXPECTED to bump corpus_format or index SCHEMA_VERSION —
      every new field is additive/absence-emits-nothing. If yours needs a bump,
      re-read the item: it is probably out of scope.
  capstone:
    when: >-
      ALWAYS at the end of a session that touched this roadmap, and ALWAYS at tier
      completion. A multi-session tier gets a progress capstone each session.
    do: |
      - Write hippo-enh-t<N>-<slug>.md in the project memory dir (capstone_template
        below); continue the round-1 chain (link the previous capstone).
      - Refresh its one-line MEMORY.md pointer (supersede the prior same-tier line).
      - Update this file's item + tier status to match what shipped.
      - Link the new capstone to [[hippo-enh-exploration-r2]] and the prior capstone.
    rationale: >-
      The next session may be a different agent with none of this context. The
      capstone + status fields are the entire handoff. Under-recording is the main
      failure mode — write the capstone even if the session shipped nothing.
  capstone_template: |
    ---
    name: hippo-enh-t<N>-<slug>
    description: <tier theme> — shipped <X/Y> items; next: <next item id>
    metadata:
      type: project
    ---
    Tier T<N> (<target_version>, "<theme>") — session <YYYY-MM-DD>.
    SHIPPED THIS SESSION: <item-id — one-liner — commit sha> (repeat).
    TIER STATE: <n/total done>; done_means <met | not yet: what remains>.
    ENGINE STATE: suite <green | N failing>; corpus_format <n>; index schema <n>;
      re-bootstrap <yes/no>.
    DECISIONS / GOTCHAS: <invariant guard applied, premise correction vs the note,
      any dated owner decision recorded on an item>.
    NEXT: <next unblocked item id + why>.
    DEFERRED / BLOCKED: <item ids + reason (esp. SIG-6 cross-file)>.
    Related: [[hippo-enh-exploration-r2]], [[hippo-enh-t<N-1>-<slug>]].

# ===========================================================================
# WORKSTREAMS — fully-scoped enhancement items, grouped by area, sequenced into
# tiers by the release_train below. `extends` names the prior workstream each
# relates to. `source.landscape` tags carry the round-2 survey provenance.
# ===========================================================================
workstreams:

  # ---------------------------------------------------------------- MSR ---
  - id: MSR
    name: Measurement & the eval flywheel
    extends: RET-8 + telemetry + SIG-4
    goal: >-
      Make hippo's own behavior a first-class, deterministic, reproducible artifact:
      persist eval runs and diff baselines, read the ledgers hippo already writes but
      never reads (dark scores/ranks, score-less abstention, telemetry-invisible MCP
      recall), and account for the cost of what it injects — all report-only, all
      off the hot path.
    items:

      - id: MSR-1
        title: Eval run ledger + fingerprint-keyed baseline diff + pass^k determinism probe
        priority: P1
        effort: M
        status: done
        source: {lens: eval-flywheel, verdict: RESHAPE, convergence: 2, landscape: [hidden-layer-2026, seeds-stddev-hygiene]}
        problem: >-
          RET-8 shipped category-tagged eval + tracked gates, but every gate is an
          ABSOLUTE frozen threshold — a regression that stays above it is invisible.
          There is no --json, no persisted run, no baseline diff, and no proof the
          deterministic metrics are actually deterministic (pass^k).
        proposal: >-
          Add --json/--out serializing the full evaluate() report (incl. by_category)
          to a gitignored append-only run ledger under the derived telemetry dir; a
          report-only --baseline diff (per-metric/per-category deltas) against a
          COMMITTED baseline file keyed to git HEAD + fixture fingerprint + corpus
          fingerprint (reuse refresh_index's compare-field lists), mirroring RET-8's
          skip-if-absent / provided-empty-loud-fail semantics; and a --repeat k
          pass^k probe on the hermetic (HIPPO_DISABLE_DENSE=1) lane asserting
          epsilon=0 byte-identity of deterministic metrics (latency excluded). The CI
          FAIL ratchet is explicitly deferred behind a dated owner blessing of the
          first baseline (never a metric-proxied gate).
        acceptance_criteria:
          - eval_recall.main gains --json/--out writing the full report to a gitignored run-ledger file; the 5+2 absolute gate constants and their pass/fail outcomes are byte-unchanged (additive-only, pin updates in lockstep per ED-4)
          - --repeat k re-runs evaluate() k times in fresh processes on the hermetic lane and asserts exact byte-identity of deterministic metrics (epsilon=0; p95/cold-p50 excluded); any nonzero delta is a bug to fix, not jitter to tolerate
          - --baseline compares against a committed baseline file keyed to git HEAD + fixture + corpus fingerprint; on fingerprint mismatch it skips with a loud note; any category at/below its n-floor (multi-hop, temporal, update) is always report-only
          - no CI job fails on baseline drift and no new required check is added; the ratchet is deferred behind a dated owner decision
        dependencies: [RET-8]           # cross-file: ROADMAP.v1 v0.9.0, SHIPPED (f2d1979)
        invariant_note: >-
          inv1 — run ledger is gitignored derived telemetry; the committed baseline is
          a fixture-class pinned artifact (recall_hard_set.yaml precedent), not a
          second authority. Latency is excluded from both byte-identity and baseline
          diffs so the determinism claim holds. inv6 — CLI/CI only, never the hot path.
        implementation_notes: >-
          Serialize eval_recall.evaluate()'s report dict (the by_category values from
          hard_set_metrics_by_category); argv surface at eval_recall.main. Home the
          ledger via telemetry.default_telemetry_dir (SEC-3 self-ignoring pattern).
          Corpus/fixture fingerprints reuse build_index.refresh_index's compare-field
          lists (entry hashes, body hashes, invalid_after, source_commit_time, steer,
          confidence). Run the --repeat probe FIRST to empirically establish
          determinism before building baseline machinery. This is the KEYSTONE tier-T8
          item — MSR-5, GRF-2/GRF-4, TMB-3, TMB-4 all consume persisted/diffable eval.

      - id: MSR-2
        title: Null-hypothesis eval arms (grep + true-bm25 + labeled mixed-mode)
        priority: P1
        effort: M
        status: done
        source: {lens: eval-flywheel, verdict: RESHAPE, convergence: 1, landscape: [letta-filesystem-2025, condition-matrix]}
        problem: >-
          hippo's eval reports absolute recall but never what the ranking STACK adds
          over trivial baselines, and it cannot distinguish the production dense path
          from the production-reachable MIXED mode (dense index resident, bm25 ranking
          at query time) — the exact condition where the residual multi-hop defect lives.
        proposal: >-
          evaluate() grows report-only, per-category delta arms over an index-mode x
          query-mode condition matrix: (a) a pure-stdlib grep/token-overlap null,
          relabeled a "ranking-stack lift" measure (NOT the Letta/Hidden-Layer
          adopt-memory-at-all threshold — these fixtures cannot answer that); (b) a
          TRUE bm25-only arm built as a second index in a scratch index_dir via
          HIPPO_DISABLE_DENSE (never an in-process flag flip against the resident dense
          matrix, never writing the real index_dir); (c) an explicitly-labeled
          mixed/degraded arm — all three delegating to the unmodified
          hard_set_metrics_by_category (one scoring path preserved), printing n per
          category, skipping (not zero-emitting) degenerate deltas.
        acceptance_criteria:
          - evaluate() reports per-category deltas for >=3 explicitly labeled arms (full pipeline, true bm25-only in a scratch index_dir, mixed/degraded), with mixed mode NEVER presented as "bm25-only"
          - all arms feed hard_set_metrics_by_category via a parameterized ranked-list source (no reimplemented hit-judgment); no arm can disagree about what counts as a hit
          - the grep arm is documented as a ranking-stack-lift measure over the curated corpus, not an adoption-threshold result; no >=10-point adoption gate ships; the only gate is report-only
        dependencies: []
        invariant_note: >-
          Eval-only, stdlib, offline — inv6 untouched. The true-bm25 arm builds into a
          scratch index_dir (HIPPO_INDEX_DIR override / env save-restore precedent),
          NEVER flips HIPPO_DISABLE_DENSE in-process against a resident dense index
          (that is mixed mode, not bm25-only) and NEVER writes the real index_dir.
        implementation_notes: >-
          Attach at eval_recall.evaluate (arm orchestration + report keys) and a new
          eval_recall._grep_baseline (pure stdlib token-overlap over memory_dir
          markdown). Mechanism citations in docs/comments must use the corrected
          re-measurement (mixed-mode MMR diversity-penalty defect), NOT the superseded
          "1.0 bm25 vs 0.0 dense" headline — GRA-1 knee suppression already landed at
          4d16022. This arm is what lets GRF-2 see the mixed-mode leg it must close.

      - id: MSR-3
        title: Channel-tagged recall_events telemetry for MCP recall/why
        priority: P2
        effort: M
        status: done
        source: {lens: eval-flywheel, verdict: RESHAPE, convergence: 3, landscape: [amemgym-iclr26, mem0-no-self-feedback-2026]}
        problem: >-
          MCP recall and why are telemetry-INVISIBLE — recall_view.describe bypasses
          recall.main, so every mid-turn and subagent recall is missing from soak,
          blind spots, and the doctor p95 check. The usage ledger the ED-2 salience
          revisit depends on is systematically undercounting the highest-intent recalls.
        proposal: >-
          Add an additive `channel` field ('hook'|'mcp'; absent=hook) to
          log_recall_event; thread a channel kwarg through recall_view.describe with
          fire-and-forget logging that REPLICATES main()'s SEC-1 untrusted-zero-trace
          and SEC-3 corpus-existence gates; mcp_server's recall/why tools log through
          it, feeding a new MCP arm of abstention_backlog and a per-channel doctor
          volume line. SCOPE STRICTLY to recall_events.jsonl consumers; log_episode /
          episode_buffer.jsonl (co-recall, KPI-2, resume card, RCL-2/RCL-3) is
          explicitly out of scope.
        acceptance_criteria:
          - log_recall_event gains an additive `channel` field (absent reads as 'hook'); existing rows parse unchanged; no schema bump (ED-4)
          - recall_view.describe's new fire-and-forget log fires only when the same trust + corpus-existence gates main() applies are satisfied — a test asserts an untrusted-corpus MCP recall leaves zero ledger trace
          - doctor.check_hot_path_latency filters to channel in {hook, absent} before computing p95 — a byte-identity test proves the p95 line is unchanged after an MCP-channel event is appended
          - log_episode/episode_buffer.jsonl is untouched (RCL-2/RCL-3/co_recall/KPI-2/resume-card byte-identical); abstention_backlog gains a channel-tagged MCP arm as its own line
        dependencies: []
        invariant_note: >-
          inv6 — MCP is not the hot path; logging is fire-and-forget/never-raise. inv4/
          ED-1 — pure detection, no new MCP tool (5-tool pin intact), no ranking change.
          Do NOT extend logging to the 'cli' channel — describe()'s docstring states it
          deliberately skips telemetry for human browsing; MCP (agent-issued) is the
          only channel to add.
        implementation_notes: >-
          Seams: mcp_server.py recall tool (~:184) + why tool (~:233) -> recall_view.describe
          (channel kwarg + fire-and-forget log) -> telemetry.log_recall_event (additive
          channel). Two corrections the vetting verified and REQUIRES: (1) replicate
          main()'s SEC-1 zero-trace + SEC-3 gates verbatim; (2) doctor.check_hot_path_latency
          is a real unfiltered recall_events consumer the original risk-list missed — it
          MUST be channel-filtered or an MCP call (heavier than a hook recall) corrupts
          the KPI-3 p95 gate. A measurement rider (coverage-critic miss SEC-13): the
          per-channel volume line MAY note MCP writes that hit an untrusted corpus, but
          building the SEC-13 write-gate itself belongs to ROADMAP.v1, not this item.
          BUILD-TIME DECISION (T8, 2026-07-16): the MAY-rider was declined — counting
          untrusted-corpus MCP writes requires persisting a trust-posture trace, which
          is exactly the mcp-channel-flight-recorder shape not_pursuing already killed
          (SEC-1's eliminated trace must stay eliminated); the shipped scope is the
          per-channel volume line + the channel-tagged abstention arm only.

      - id: MSR-4
        title: Drop-reason autopsy ledger (near-miss scores on abstention; per-category miss autopsy)
        priority: P1
        effort: M
        status: done
        source: {lens: graph-retrieval, verdict: RESHAPE, convergence: 3, landscape: [memsyco-2026, post-retrieval-bottleneck]}
        problem: >-
          The recall pipeline throws away WHY a memory did not surface. The
          scores[]/ranks[] arrays on recall_events are written and read by nothing
          (telemetry.py:227-231); abstention events carry NO near-miss scores
          (telemetry.py:300-303), so "how close was the miss" — the exact evidence
          RET-11's BM25-floor decision and the SIG-5 revisit need — does not exist.
        proposal: >-
          Every admission-walk cut (floor, knee/cliff, MMR displacement, cooldown,
          pool_n overflow, dangling/old-state skip) records an additive reason-code +
          score-at-death on recall_events, capped per mechanism (top-N nearest misses
          or a margin window). Abstention events gain near-miss scores. eval_recall
          attributes every expected-but-missed RET-8 stem to the mechanism and margin
          that cut it, per category. One deterministic doctor aggregation line. Pure
          detection — nothing ranks on the data.
        acceptance_criteria:
          - each admission-walk cut records an additive reason-code + score-at-death, capped per mechanism so the byte-rotated ledger is not bloated; capture is O(already-computed) with zero hot-path recomputation (inv6 byte-identity/perf holds)
          - abstention (backend='none') events log near-miss scores, closing telemetry.py:300-303 and giving RET-11's BM25-floor decision + the SIG-5 revisit their first measured evidence
          - eval_recall attributes every missed RET-8 hard-set stem to the mechanism and margin that cut it, per category
          - doctor gains exactly one deterministic aggregation line (gated on a min event count; no timestamps; line-count pin preserved)
        dependencies: [RET-8]           # cross-file, SHIPPED
        invariant_note: >-
          ED-1/inv3 — reason codes are legibility only; nothing ranks or auto-tunes.
          inv6 — capture bounded per mechanism (floor cuts are O(corpus); the ledger is
          byte-rotated), scores read from values the walk already holds, no
          recomputation. Does NOT absorb RET-9 (per-corpus floor sanity) — that is
          GRF-3's sole deliverable; this item supplies the abstention-side evidence only.
        implementation_notes: >-
          Attach at recall.py's admission walk + emission loop (~2140-2230),
          telemetry.log_recall_event (the dark scores/ranks
          fields), the abstention arm (~telemetry.py:300-303), eval_recall.hard_set_metrics_by_category
          (per-miss autopsy), doctor (aggregation line). PREMISE CORRECTED at build time
          (T8, 2026-07-16): _expand_neighbors has no per-candidate CUTS to record — a
          "declined injection" there keeps the entry's organic tuple and marks it
          graph-ENDORSED (a superset the knee then exempts), so the mechanism list is
          the walk's six (dense_floor, old_state, dangling_file, knee_cliff,
          pool_overflow, mmr_displaced) plus main()'s session-state declines
          (floor/cooldown collapse, display overflow); the SEC-6 drift-quarantine skip
          is deliberately unrecorded (its loud surfaces are SessionStart+doctor, and a
          per-query ledger row naming withheld content would recreate the trace SEC-1
          eliminates). Retell the GRA-1 story per the
          re-measurement: the knee leg is FIXED at 4d16022 (graph_endorsed exemption +
          cliff latch); the residual is the mixed-mode MMR leg. Deferred, not dropped:
          answerable/unanswerable abstention twin rows (wait for SIG-6) and a --trace CLI
          funnel (fold into recall_view or drop) are separate follow-ups.

      - id: MSR-5
        title: Salience-revisit A/B rig (lived-in-corpus, usage-prior precondition fix)
        priority: P1
        effort: M
        status: done
        source: {lens: eval-flywheel, verdict: RESHAPE, convergence: 1, landscape: [sleep-time-2504, ed2-revisit]}
        problem: >-
          SIG-5 decided salience default-OFF because fixture corpora carry no usage/
          staleness/recency signal; ED-2's revisit trigger names "a lived-in corpus
          re-run" but there is no rig to do it — AND the current eval path is
          usage-prior-BLIND (evaluate()'s internal recall() calls don't thread
          memory_dir, so the ON arm can't even see usage_aggregates/stale.json).
        proposal: >-
          Add `eval --ab <flag>` (whitelist, default HIPPO_SALIENCE) that FIRST fixes
          the usage-blind path (thread memory_dir through every evaluate()-internal
          recall() call), then runs evaluate() twice in-process over the live
          per-project corpus via SIG-6's fixture probe, emitting a paired per-category
          delta (per-category n, an index-mode x query-mode x backend condition stamp,
          an asserted OFF-arm byte-identity self-check, a dated evidence footer) to the
          gitignored dir. MEASURES ONLY — never flips the default. One deterministic
          doctor nudge line when a corpus crosses a lived-in threshold.
        acceptance_criteria:
          - eval --ab HIPPO_SALIENCE runs evaluate() twice over the live corpus and writes a paired per-category delta with per-category n + condition stamp + dated ED-2 footer to a gitignored dir; never committed, never the golden/CI report
          - the ON arm's usage/staleness visibility is an asserted precondition — memory_dir threaded through every internal recall(); a test fails loudly if _usage_boost_map/_staleness_penalty_map resolve empty for a non-empty usage_aggregates/stale.json
          - the OFF arm is asserted byte-identical to the pinned production result-dict both before and after; a byte-identical-arms outcome on a signal-less corpus is labeled a self-check pass, not a finding, and drops any "decision-grade" framing at low n
          - no autonomous execution path — invoked only via explicit CLI/skill; the only automatic surface is a deterministic (no-timestamp) doctor nudge line at a lived-in threshold
