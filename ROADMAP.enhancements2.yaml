# ===========================================================================
# DECISIONS — governing choices this round rests on (owner-ratifiable). ED-1..ED-5
# are carried from round 1 (ROADMAP.enhancements.yaml) and still bind; ED2R-* are new.
# ===========================================================================
decisions:
  - id: ED-1
    carried_from: round-1
    decision: detection-first
    detail: >-
      Ship the LEGIBLE detection / human-in-the-loop half; gate any autonomous ranking
      or corpus/rules write on proven signal density. Every autonomous half in this file
      is severed and deferred behind a DATED OWNER DECISION + measured evidence, never a
      metric-proxied gate. Still the governing law.
  - id: ED-2
    carried_from: round-1
    decision: the salience keystone (SIG-5) stays owner-decided-OFF
    detail: >-
      SIG-5 decided salience default-OFF (owner-ratified 2026-07-09) because fixture
      corpora carry no usage/staleness/recency signal. No round-2 item ships an always-on
      read-side ranking prior. MSR-5 builds the lived-in-corpus A/B EVIDENCE the revisit
      trigger names, but the flip stays a dated owner decision on affirmative evidence.
  - id: ED2R-1
    question: What gates the round-2 measurement class?
    decision: the eval observability spine (T8, esp. MSR-1) must land first
    detail: >-
      Just as ED-2's salience keystone gates a ranking class, T8's eval spine gates a
      MEASUREMENT class: MSR-5's salience A/B, GRF-2/GRF-4's GRA-7 baseline, TMB-3's
      forgetting category, and TMB-4's update category all need persisted, baseline-
      diffable, condition-matrixed eval that does not exist until MSR-1 ships. Sequence
      T8 first; do not build a downstream measurement on an instrument that cannot
      persist or diff a run.
  - id: ED2R-2
    question: SIG-6 is on its own unmerged PR mid-cycle — is it still a dependency?
    decision: yes — SIG-6 is a hard cross-file dependency, treat it as planned
    detail: >-
      SIG-6 (round 1, the self-populating abstention-fixture draft/confirm flow) was
      in-flight then committed to its own branch enh-t7-sig6 (PR #17, open, base main), NOT
      merged and ABSENT from both main and v080-trust-spine at authoring. Six round-2 items
      (MSR-5, TMB-3, TMB-4, and the confirm-flow riders) depend on it. It is the one
      freely-buildable round-1 T7 item and should land (merge PR #17) before those tiers.
      Any item that touches its draft/confirm surface MUST re-read the landed schema fresh
      (its working-tree form moved once already — the T3-T7 premise-correction law).
      RESOLVED 2026-07-10: PR #17 squash-merged to main (4dc3256) the day after authoring —
      draft_abstention_fixtures/confirm_hard_set_row have been live on main through every
      round-2 build since; T11 re-read the landed schema on MAIN (not the PR) per this
      decision's own law and extended confirm_hard_set_row additively (absent=/superseded=).
