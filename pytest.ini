[pytest]
pythonpath = plugin
python_files = test_*.py
addopts =
    -q
    --import-mode=importlib
    -m "not network"
markers =
    network: may download the fastembed ONNX model (~130MB) on a cold cache — deselected by default so the suite stays hermetic/airplane-mode-safe; CI's dense lane opts in with `-m network` against a restored actions cache
