[pytest]
pythonpath = plugin
python_files = test_*.py
addopts =
    -q
    --import-mode=importlib
    -m "not network and not slow and not scale"
markers =
    network: may download the fastembed ONNX model (~130MB) on a cold cache — deselected by default so the suite stays hermetic/airplane-mode-safe; CI's dense lane opts in with `-m network` against a restored actions cache
    slow: environment/timing-sensitive (real wall-clock assertions) rather than actually slow to run — deselected by default so a noisy hermetic runner can never flake a wall-clock gate red; CI's dense lane opts in alongside `network` (`-m "network or slow"`), where the real eval_recall CLI gate covers the same threshold for real
    scale: PRF-3 500-memory scale-envelope lane — a generated ~500-memory BM25-only corpus asserting recall latency, bounded output, and build/refresh time. Genuinely slow to run (builds a large corpus) and wall-clock-gated, so deselected by default AND kept off the per-PR dense lane (`-m "network or slow"` excludes it); CI runs it NIGHTLY (`-m scale`) so a scale regression names the budget it broke without taxing every push.
# QUA-10: fail the suite on any warning NOT explicitly ignored below, so new deprecations
# are caught at the source instead of accumulating silently until a future Python/dep bump
# turns them into a wall of noise. stdlib and hippo's own code must be warning-free; ignores
# below are scoped by module/message to known third-party churn (fastembed/onnxruntime/
# huggingface_hub/numpy) so an upstream dependency's own deprecation warnings — which hippo
# cannot fix — don't red the build. Every ignore names the module and, where practical, the
# category/message so a warning from hippo's OWN code sharing a category never slips through.
filterwarnings =
    error
    # The test suite's own established idiom for byte-identical before/after assertions is
    # `open(path, "rb").read()` with no `with` block (100+ call sites across tests/*.py) — a
    # deliberate one-liner, not a resource leak: CPython refcounting closes the FileIO the
    # instant the expression's temporary is dropped, same statement, well before the next
    # line runs. pytest's unraisableexception plugin still promotes the FileIO destructor's
    # informational ResourceWarning to a PytestUnraisableExceptionWarning on every one of
    # those calls; without this ignore, filterwarnings=error would fail ~70 otherwise-passing
    # tests for a non-bug rather than surface anything actionable. hippo's OWN plugin/memory/
    # source has zero naked `open()` calls (grep confirms every production open() uses
    # `with`) — this is scoped to the test suite's read-only convenience idiom, not a
    # production resource-management gap.
    ignore::pytest.PytestUnraisableExceptionWarning
    # fastembed/onnxruntime/huggingface_hub — only imported by the dense (network-marked)
    # lane and the real fastembed cache-pin test; upstream deprecation churn hippo can't fix.
    ignore::DeprecationWarning:onnxruntime.*
    ignore::DeprecationWarning:huggingface_hub.*
    ignore::DeprecationWarning:fastembed.*
    ignore::FutureWarning:fastembed.*
    ignore::UserWarning:fastembed.*
    ignore::ResourceWarning:onnxruntime.*
timeout = 300
timeout_method = thread
