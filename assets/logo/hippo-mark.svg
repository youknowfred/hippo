<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hippo mark: a hippo surfacing at a waterline, its body ghosted below the surface">
  <!-- The waterline hippo: the corpus lives below the surface; recall surfaces
       exactly the right bits (ears, eyes, nostrils — how a real hippo floats). -->
  <!-- ears (small, behind head) -->
  <circle cx="36" cy="42" r="7.5" fill="#1B7A83"/>
  <circle cx="92" cy="42" r="7.5" fill="#1B7A83"/>
  <!-- head above the waterline (wide, squat; flat bottom = the surface) -->
  <path d="M22 78 V62 Q22 44 44 44 H84 Q106 44 106 62 V78 Z" fill="#1B7A83"/>
  <!-- eyes: high and wide, just under the crown -->
  <circle cx="44" cy="57" r="5" fill="#0C3B40"/>
  <circle cx="84" cy="57" r="5" fill="#0C3B40"/>
  <!-- nostrils: the hippo signature -->
  <ellipse cx="54" cy="69" rx="4" ry="5.5" fill="#0C3B40"/>
  <ellipse cx="74" cy="69" rx="4" ry="5.5" fill="#0C3B40"/>
  <!-- waterline -->
  <line x1="6" y1="78" x2="16" y2="78" stroke="#66C3CA" stroke-width="5" stroke-linecap="round"/>
  <line x1="112" y1="78" x2="122" y2="78" stroke="#66C3CA" stroke-width="5" stroke-linecap="round"/>
  <!-- submerged body, ghosted under the surface -->
  <path d="M28 84 V90 Q28 102 44 102 H84 Q100 102 100 90 V84 Z" fill="#1B7A83" opacity="0.18"/>
  <!-- ripples -->
  <line x1="10" y1="90" x2="18" y2="90" stroke="#66C3CA" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="110" y1="90" x2="118" y2="90" stroke="#66C3CA" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
