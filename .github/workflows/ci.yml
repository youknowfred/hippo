# CI — the suite finally gates something (QUA-1).
#
# Per-PR lanes (the six required checks):
#   hermetic  — the default (network+slow+scale-deselected) pytest suite, dense disabled,
#               across the declared support matrix {ubuntu, macos} × {py3.10, py3.12}.
#   dense     — fastembed model restored from actions/cache; runs the network-marked
#               dense tests plus the bare eval_recall CLI against a corpus seeded from
#               the shipped starter packs (so default-path fossils fail loudly, COR-2).
#   shellcheck — the hook scripts and bin/hippo launcher.
#   secret-scan — SEC-8: the secret-lint detector run over the shipped/committed tree
#               (starter packs + docs + source, tests excluded) so a credential can never
#               reach a user through a release. Deterministic prefixes only (entropy off).
#
# Non-required lanes:
#   resolution — QUA-11: dependency resolution + bootstrap smoke across the WIDER support
#               matrix {py3.11, py3.13, py3.14}, proving OSP-3's numpy `<3` widening actually
#               resolves on 3.13 (and the ranges hold on 3.11/3.14). NOT a required check —
#               `fail-fast: false` so each interpreter reports independently, and a py3.14 miss
#               (fastembed may not ship 3.14 wheels until upstream catches up) is informational,
#               not a merge blocker. The hermetic lane above stays the {3.10, 3.12} gate.
#   scale     — PRF-3's generated ~500-memory BM25 corpus, asserting recall latency, bounded
#               output, and build/refresh time. NIGHTLY only (schedule trigger). `scale`-marked
#               so it never runs on the hermetic or dense lanes.
#
# Branch protection for `main` (QUA-12 — codified here so the intended ruleset is versioned,
# not just a memory in the GitHub UI). Apply on `main` once the repo can enforce it (a public
# repo, or a plan with branch protection — the free private plan returns 403 on the API, so the
# maintainer self-merges until then):
#   - Require a pull request before merging; require review from Code Owners (.github/CODEOWNERS).
#   - Require these status checks to pass (use each job's FULL reported name — the string
#     GitHub shows is the evaluated `name:` field, not the job id):
#         hermetic (ubuntu-latest, py3.10) · hermetic (ubuntu-latest, py3.12)
#         hermetic (macos-latest, py3.10)  · hermetic (macos-latest, py3.12)
#         dense (cached model + eval_recall CLI)
#         shellcheck (hooks + launcher)
#         secret-scan (SEC-8 — shipped packs + repo)
#     (the `resolution` and nightly `scale` lanes are intentionally NOT required.)
#   - Require branches to be up to date before merging; require linear history.
#   - Do not allow force pushes or deletions of `main`.
# All GitHub Actions below are pinned by commit SHA (supply-chain hardening); dependabot
# (.github/dependabot.yml) keeps the pins current.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC nightly — the PRF-3 scale lane (see the `scale` job)

jobs:
  hermetic:
    name: hermetic (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    env:
      HIPPO_DISABLE_DENSE: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Install deps
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: Hermetic suite (network + slow tests deselected via addopts)
        run: python -m pytest

  dense:
    name: dense (cached model + eval_recall CLI)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: /home/runner/.cache/fastembed-ci
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Install deps
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: Restore fastembed model cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /home/runner/.cache/fastembed-ci
          key: fastembed-bge-small-en-v1.5-v1
      # QUA-10: slow-marked tests are the real wall-clock assertions moved off the hermetic
      # lane (timing-sensitive, not download-sensitive) — this restored-cache runner is the
      # closest thing to a controlled timing environment CI has, so they run here alongside
      # the network-marked (model-download) tests.
      - name: Dense + slow tests (network-marked; downloads the model only on a cold cache)
        run: python -m pytest -m "network or slow"
      - name: Seed a corpus from the shipped starter packs
        run: |
          mkdir -p .claude/memory
          find plugin/assets -name '*.md' ! -name 'MEMORY.skeleton.md' ! -name 'README.md' -exec cp {} .claude/memory/ \;
          cp plugin/assets/MEMORY.skeleton.md .claude/memory/MEMORY.md
      - name: Build the dense index
        run: PYTHONPATH=plugin python -m memory.build_index --memory-dir .claude/memory --index-dir .claude/.memory-index
      - name: eval_recall CLI, bare defaults + --gate-cold (gates 1-3 + warm p95 + cold p95; path fossils fail loudly)
        # PRF-2/PRF-5: --gate-cold enforces GATE_COLD_P95_MS (the p95 tail, not the p50 median) on this lane only -- the warm p95 gate
        # (run everywhere, including hermetic) documents itself as ~10x under the real
        # per-prompt cost; this lane has a restored fastembed cache (index.dense_ready=True)
        # so cold_latency's fresh-subprocess-per-sample p95 is the honest tail number and a real
        # regression here (heavier model, new per-import cost) fails the build.
        run: PYTHONPATH=plugin python -m memory.eval_recall --gate-cold

  shellcheck:
    name: shellcheck (hooks + launcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: shellcheck hook scripts and bin/hippo
        run: shellcheck plugin/hooks/*.sh plugin/bin/hippo

  secret-scan:
    name: secret-scan (SEC-8 — shipped packs + repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # No deps: secrets.py is pure-stdlib (re + a tiny entropy heuristic). Scans the TRACKED
      # tree (git ls-files) for known credential shapes; exits 1 on any finding, reporting the
      # KIND per file, never the secret. tests/ is excluded — it ships intentional detector
      # vectors. A hit here means a release would carry a credential: rotate + purge history.
      - name: Secret-scan the shipped/committed tree
        run: PYTHONPATH=plugin python -m memory.secrets --repo .

  resolution:
    name: resolution (py${{ matrix.python }} dep bootstrap)
    # QUA-11: NOT a required check. Proves the pinned dep RANGES resolve + bootstrap on the wider
    # {3.11, 3.13, 3.14} interpreters (the hermetic gate covers {3.10, 3.12}). numpy was widened to
    # `<3` for 3.13 (OSP-3); this is where that resolution is exercised. fail-fast: false so a
    # py3.14 install miss (fastembed 3.14 wheels may lag upstream) reports without blocking 3.11/3.13.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13", "3.14"]
    env:
      HIPPO_DISABLE_DENSE: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Resolve + install the pinned dep ranges (proves OSP-3's numpy <3 widening)
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: All four deps import on this interpreter
        run: python -c "import numpy, rank_bm25, yaml, fastembed; print('deps import on', __import__('sys').version)"
      - name: Bootstrap smoke — build a real BM25 index over a one-memory corpus
        run: |
          mkdir -p .claude/memory
          printf '%s\n' '---' 'name: smoke' 'description: "a smoke-test memory"' 'metadata:' '  type: project' '---' 'body' > .claude/memory/smoke.md
          printf '%s\n' '# Memory Index' '' '## Project' > .claude/memory/MEMORY.md
          PYTHONPATH=plugin python -m memory.build_index --memory-dir .claude/memory --index-dir .claude/.memory-index
      - name: Hermetic suite on this interpreter (dense disabled)
        run: python -m pytest

  scale:
    name: scale (500-memory BM25 lane, nightly)
    # NIGHTLY ONLY (PRF-3): gated on the schedule event so the 500-memory build never runs on a
    # push/PR — it is a scale-envelope tripwire, not a per-PR gate. `scale`-marked tests are
    # deselected everywhere else (hermetic addopts, and the dense lane's `-m "network or slow"`).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      HIPPO_DISABLE_DENSE: "1"  # BM25-only for speed — the scale lane asserts lexical-path envelope
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Install deps
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: PRF-3 500-memory scale lane (scale-marked; latency + bounded output + build/refresh budgets)
        run: python -m pytest -m scale tests/test_scale.py
