# CI — the suite finally gates something (QUA-1).
#
# Three lanes:
#   hermetic  — the default (network-deselected) pytest suite, dense disabled, across
#               the declared support matrix {ubuntu, macos} × {py3.10, py3.12}.
#   dense     — fastembed model restored from actions/cache; runs the network-marked
#               dense tests plus the bare eval_recall CLI against a corpus seeded from
#               the shipped starter packs (so default-path fossils fail loudly, COR-2).
#   shellcheck — the hook scripts and bin/hippo launcher.
#
# Mark all three required on PRs to main in the repo's branch-protection settings.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hermetic:
    name: hermetic (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    env:
      HIPPO_DISABLE_DENSE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Install deps
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: Hermetic suite (network + slow tests deselected via addopts)
        run: python -m pytest

  dense:
    name: dense (cached model + eval_recall CLI)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: /home/runner/.cache/fastembed-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: plugin/requirements.txt
      - name: Install deps
        run: python -m pip install -r plugin/requirements.txt pytest pytest-timeout hypothesis
      - name: Restore fastembed model cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/fastembed-ci
          key: fastembed-bge-small-en-v1.5-v1
      # QUA-10: slow-marked tests are the real wall-clock assertions moved off the hermetic
      # lane (timing-sensitive, not download-sensitive) — this restored-cache runner is the
      # closest thing to a controlled timing environment CI has, so they run here alongside
      # the network-marked (model-download) tests.
      - name: Dense + slow tests (network-marked; downloads the model only on a cold cache)
        run: python -m pytest -m "network or slow"
      - name: Seed a corpus from the shipped starter packs
        run: |
          mkdir -p .claude/memory
          find plugin/assets -name '*.md' ! -name 'MEMORY.skeleton.md' ! -name 'README.md' -exec cp {} .claude/memory/ \;
          cp plugin/assets/MEMORY.skeleton.md .claude/memory/MEMORY.md
      - name: Build the dense index
        run: PYTHONPATH=plugin python -m memory.build_index --memory-dir .claude/memory --index-dir .claude/.memory-index
      - name: eval_recall CLI, bare defaults + --gate-cold (gates 1-3 + warm p95 + cold p50; path fossils fail loudly)
        # PRF-2: --gate-cold enforces GATE_COLD_P50_MS on this lane only -- the warm p95 gate
        # (run everywhere, including hermetic) documents itself as ~10x under the real
        # per-prompt cost; this lane has a restored fastembed cache (index.dense_ready=True)
        # so cold_latency's fresh-subprocess-per-sample p50 is the honest number and a real
        # regression here (heavier model, new per-import cost) fails the build.
        run: PYTHONPATH=plugin python -m memory.eval_recall --gate-cold

  shellcheck:
    name: shellcheck (hooks + launcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck hook scripts and bin/hippo
        run: shellcheck plugin/hooks/*.sh plugin/bin/hippo
