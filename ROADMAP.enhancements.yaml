# ============================================================================
# hippo — Enhancement & Capability Roadmap (post-v1 / v1.1+)
# ============================================================================
# The EXECUTABLE form of EXPLORATIONS.md: the adversarially-vetted enhancement
# catalog, formalized into fully-scoped, dependency-sequenced items and work
# tiers designed to be implemented across MANY independent agent sessions.
#
# Continuity across sessions lives in TWO places, kept in sync:
#   1. This file's per-item and per-tier `status:` — the durable progress LEDGER.
#   2. A chain of CAPSTONE MEMORY files (`hippo-enh-t<N>-*`) — the narrative
#      HANDOFF written at the end of each work-tier session (see session_protocol).
#
# An agent session resumes by reading the latest capstone + this file, finding
# the next unblocked item, implementing it under the guiding_invariants, updating
# `status:`, and writing the capstone before it stops.
#
# This roadmap is DOWNSTREAM of ROADMAP.v1.md's v1.0.0 launch. Do not begin these
# tiers until v1.0.0 has shipped (see decisions.ED-5). Companion documents:
#   ROADMAP.yaml         — shipped engine roadmap (v0.2.0–v0.7.0 + exploratory)
#   ROADMAP.v1.md        — the v0.8.0→v1.0.0 OSS-launch plan
#   EXPLORATIONS.md      — the source idea catalog (verdicts, reshapes, kills)
# ============================================================================

meta:
  title: hippo enhancement & capability roadmap
  repo: youknowfred/hippo
  authored: 2026-07-08
  baseline_version: 0.7.0
  applies_after: 1.0.0            # do not start before ROADMAP.v1's launch ships
  source: >-
    Formalized from EXPLORATIONS.md (a 15-agent divergent-ideation + adversarial-
    vetting workflow: 6 lenses, ~53 ideas, ~two-thirds killed or reshaped). Every
    item here is a KEEP or a surviving RESHAPE; kills are recorded under
    not_pursuing. file:line references were verified against the v0.7.0 tree.
  method: >-
    Items carry the vetters' reshape guidance in `proposal`. The governing design
    principle is decisions.ED-1 (detection-first): ship the legible detection /
    human-in-the-loop half of an idea; gate any autonomous ranking or corpus
    write on proven signal density.
  audits:
    - date: 2026-07-08
      scope: original A-to-Z seam check (95 checks, 0 broken seams) before T1.
    - date: 2026-07-08
      scope: >-
        POST-T2 dry audit of every remaining tier (T3-T7), 5-agent read-only
        fan-out against the enh-t2-rules-bridge tree. Every remaining planned
        item gained an `implementation_notes:` field — verified seams
        (file:symbol), T2-interaction guards (the corpus="rule" pointer lane),
        exact attach points, state-file names, schema-bump mechanics, and the
        load-bearing test pins an implementer must update. Premise corrections
        folded into proposals: RCL-2 (floor-dedup already ships as a silent
        DROP in recall.main — the item converts it to a legible collapse),
        RCL-3 (clean_query does NOT skip most terse follow-ups; the rescue
        point is main()), RCL-6 (body-chunk TEXT is already persisted; the
        @sha mark needs a NEW manifest head_commit), GOV-1 (write-time
        conflicts are never persisted today), GOV-3 (source_commit does not
        exist at proposal time), GRW-4 (hooks have NO transcript access — the
        WHY can only be agent-confirmed), GRW-7 (the demote path ALREADY
        stamps invalid_after; the item narrows to threading the successor's
        commit date). HARD GATES confirmed still closed: RET-8 (blocks SIG-5,
        SIG-6), LIF-7 (blocks RUL-6), the v0.8.0 trust spine SEC-5/6/7
        (blocks RCH-5 install/update). RUL-7 is the only T7 item buildable
        today. implementation_notes are BINDING guidance for implementing
        sessions: verify each named symbol still exists, then follow the note
        unless the live tree contradicts it (the repo is the source of truth).
  scoring:
    priority:
      P0: broken promise / unblocks a tier — do first in its tier
      P1: core to the tier's done_means
      P2: quality and leverage
      P3: opportunistic or gated on a proving condition
    effort: {S: under a day / one PR, M: one to three days, L: multi-day / multi-PR}
  status_legend:
    planned: not started
    in_progress: an agent session is actively implementing it
    done: acceptance_criteria met, suite green, invariants preserved
    deferred: blocked or descoped this cycle (reason recorded in the capstone)

north_star: >-
  Raise the END-USER efficacy of hippo's memory/context — better recall, less
  noise, more trust, less friction, and genuinely new superpowers — WITHOUT
  compromising the local, offline, git-native, review-gated identity. The two
  highest-leverage levers (EXPLORATIONS.md §0): activate the signals hippo
  already collects but discards, and become the ranking/hygiene/staleness layer
  over the Claude-rules plane it already reads.

# ---------------------------------------------------------------------------
# Invariants every item must preserve (carried verbatim from ROADMAP.yaml).
# An item that violates one is wrong, not bold. `invariant_note` on an item
# names the guard when it sits in tension.
# ---------------------------------------------------------------------------
guiding_invariants:
  - inv1: markdown-in-git is the single source of authority; index/telemetry/
      graph/rules-derived caches are derived, rebuildable, gitignored.
  - inv2: hooks always exit 0, never download, never block; recall failures
      degrade silently at the hook boundary but become LOUD at doctor/SessionStart.
  - inv3: degradation must be legible — every silent-fallback path gains a
      user-visible signal (nudge/doctor/producer).
  - inv4: destructive/corrective writes are per-item and agent-gated; no bulk
      autonomous sweeps; writes into the rules plane are reviewable per-item diffs.
  - inv5: one canonical name/path per concept; renames and schema changes are
      clean breaks with a version bump, not compat shims.
  - inv6: the UserPromptSubmit hot path stays PURE RETRIEVAL — no LLM calls, no
      network, no consolidation work per-prompt.

# ===========================================================================
# SESSION PROTOCOL — how this roadmap is executed across many agent sessions,
# and the capstone-memory discipline that carries continuity between them.
# ===========================================================================
session_protocol:
  purpose: >-
    Enable multi-session, multi-agent implementation with no loss of context
    between sessions. This file's `status:` fields are the source of truth for
    WHAT is done; the capstone memory chain is the source of truth for the STORY
    (decisions, gotchas, what's next).

  # how a fresh agent session starts
  pick_up: |
    - Read MEMORY.md; open the most recent hippo-enh-t* capstone memory to learn
      the active tier, what last shipped (with commit shas), and the next item.
    - Read this file; select the next item whose status is planned and all of whose
      dependencies (in-file and cross-file) are satisfied (done or shipped).
    - READ THE ITEM'S implementation_notes AND ITS TIER'S audit_note FIRST (added
      by the 2026-07-08 post-T2 audit): they carry the verified seams, exact attach
      points, hard "do NOT" guards, and the test pins you must update. Verify each
      named symbol still exists (the repo is the source of truth), then follow the
      note unless the live tree contradicts it — if it does, correct the note
      in-file as part of your commit.
    - Sanity-check reality before coding (git log, run the suite) and confirm no
      drift from the capstone's claim before starting.

  execute: |
    - Implement ONE item (or a coherent slice) per its proposal, honoring
      RELEASING.md discipline — one commit per item, id-prefixed (e.g. "SIG-1: ..."),
      the full suite green after each commit.
    - Preserve every guiding_invariant. If the item has an invariant_note, apply
      the guard it names; if you cannot, set the item status to deferred, record
      why in the capstone, and stop — do not weaken an invariant to land a feature.
    - Add tests that pin each acceptance_criterion (the project's per-module
      hermetic convention; negative-capability pins where an invariant forbids a
      primitive).
    - Flip the item status planned -> in_progress -> done (or deferred).

  verify: |
    - Every acceptance_criteria demonstrably met; full suite green; no invariant
      regressed; any new silent-fallback path made legible at doctor/SessionStart.
    - If the item bumps a schema, follow decisions.ED-4 (clean break + one
      migration + a doctor-reported format delta) and state the re-bootstrap flag.

  # THE required end-of-session / end-of-tier step
  capstone:
    when: >-
      ALWAYS at the end of an agent session that touched this roadmap, and ALWAYS
      at tier completion. A tier that spans multiple sessions gets a progress
      capstone each session; the final one records the tier's done_means as met.
    do: |
      - Write a capstone memory file hippo-enh-t<N>-<slug>.md in the project
        memory dir using the capstone_template below.
      - Add or refresh its one-line pointer in MEMORY.md (newest at the enhancement
        block; supersede the prior same-tier progress line rather than stacking).
      - Update THIS file's item and tier status fields to match what actually
        shipped — the file is the ledger, the capstone is the narrative; keep them
        in agreement.
      - Link the new capstone to the previous one and to [[hippo-v1-roadmap-proposal]]
        so the chain is walkable.
    rationale: >-
      The next session may be a different agent with none of this context. The
      capstone plus the status fields are the entire handoff. Under-recording here
      is the main failure mode of multi-session work — write the capstone even if
      the session shipped nothing (record the blocker).

  capstone_template: |
    ---
    name: hippo-enh-t<N>-<slug>
    description: <tier theme> — shipped <X/Y> items; next: <next item id>
    metadata:
      type: project
    ---
    Tier T<N> (<target_version>, "<theme>") — session <YYYY-MM-DD>.

    SHIPPED THIS SESSION: <item-id — one-liner — commit sha> (repeat).
    TIER STATE: <n/total items done>; done_means <met | not yet: what remains>.
    ENGINE STATE: suite <green | N failing: which>; corpus_format <n>; index schema <n>;
      re-bootstrap <yes/no> if any dep changed.
    DECISIONS / GOTCHAS: <invariant guard applied, schema bump + migration, a surprise,
      a reshape refinement discovered mid-implementation>.
    NEXT: <next unblocked item id + why it's next>.
    DEFERRED / BLOCKED: <item ids + reason>.
    Related: [[hippo-v1-roadmap-proposal]], [[hippo-enh-t<N-1>-<slug>]].

# ===========================================================================
# WORKSTREAMS — fully-scoped enhancement items (grouped by area; sequenced into
# tiers by the release_train below). New namespaces (SIG/RUL/GOV/RCL/GRW/RCH)
# are used so these never collide with ROADMAP.yaml's numbering; `extends` names
# the original workstream each relates to.
# ===========================================================================
workstreams:

  # ------------------------------------------------------------------ SIG ---
  - id: SIG
    name: Signal activation & positive context
    extends: RET+INT+telemetry
    goal: >-
      Consume the signals hippo already collects but discards (episode buffer,
      abstention stream, salience machine, per-hit breakdown) and inject, for the
      first time, context because of WHAT YOU ARE DOING — not just what you typed.
    items:

      - id: SIG-1
        title: Relevant-to-current-work SessionStart producer (diff-seeded)
        priority: P0
        effort: M
        status: done
        source: {lens: retrieval+claude-rules, verdict: KEEP, leverage: 4, convergence: 3-lenses}
        problem: >-
          Recall is keyed on the raw opening prompt, and all 13 SessionStart
          producers are warnings or the floor — nothing ever says "here are the
          memories about the code you are actually touching." A dev who resumes
          mid-work on a half-edited feature branch gets no memory until they
          happen to name it.
        proposal: >-
          A new SessionStart producer (the first POSITIVE/relevance block) that
          reuses capture._git_changed_paths — called with the 'HEAD' watermark so
          modified-tracked AND untracked files both surface (with a None watermark it
          returns untracked only; NOT gather_session_context, which is episode-keyed
          and returns None at a fresh SessionStart) — to build a query from the
          uncommitted diff + touched files, runs recall.recall, and injects the top
          matches — ranked by strength, capped, SEC-1-gated like every content
          producer. Empty diff (clean tree) → silent. Attaches at session_start.py
          PRODUCERS via the shared RunContext, adding a new diff/changed-paths field
          computed once in _build_run_context.
        acceptance_criteria:
          - a dirty/feature-branch session surfaces memories whose cited_paths match the diff, before the first prompt
          - a clean checkout produces nothing (no false block); output honors the item/char budget
          - hermetic test seeds a diff touching a cited file and asserts the memory appears
        dependencies: []
        invariant_note: SessionStart idle-compute is off the hot path (inv6 safe); read-only (inv1); label the block so it's legible (inv3).

      - id: SIG-2
        title: "'Where was I' resume card — task continuity from the episode buffer"
        priority: P1
        effort: M
        status: done
        source: {lens: frontier, verdict: KEEP, leverage: 4}
        problem: >-
          The episode buffer soaks exactly the ingredients for continuity
          (per-session query previews, recalled names, a HEAD watermark) but is
          read only by capture.py. Reopening a repo is a cold start.
        proposal: >-
          A read-side SessionStart producer that replays the LAST session's
          episodes for this repo and renders a legible resume block: "Last session
          you worked on <themes>; you leaned on M1–M3; since your last HEAD these
          cited files changed: …" Pure template assembly at SessionStart.
        acceptance_criteria:
          - after a prior recorded session, reopening the repo shows the last task themes + relied-on memories + changed cited files
          - gated to substantive threads (trivial/exploratory last sessions produce nothing); strict budget cap
          - labelled clone-local (cannot resume a teammate's thread) per inv3
        dependencies: []
        invariant_note: read-only over gitignored telemetry (inv1); off hot path (inv6); makes prior work legible, does not act on it (inv3).

      - id: SIG-3
        title: Recall blind-spot mining — turn silent abstention into a curation backlog
        priority: P1
        effort: M
        status: done
        source: {lens: frontier+trust+capture, verdict: KEEP, leverage: 4, convergence: 3-lenses}
        problem: >-
          RET-1 correctly injects nothing when nothing clears the floor, but that
          abstention is invisible — the corpus never learns what it keeps being
          asked and cannot answer. abstention logs backend='none' + query_preview
          and is surfaced nowhere.
        proposal: >-
          Cluster recurring backend='none' queries into a legible, low-frequency
          doctor/SessionStart signal — "you asked about deploy-rollback 6× this
          month; hippo had no memory above the floor — capture one?" — routing to
          /hippo:consolidate or a quick capture. Ship the backend='none' arm only;
          DROP the "just under floor" sub-arm (near-miss scores are not logged on
          abstention).
        acceptance_criteria:
          - repeated near-identical abstained queries cluster into one "capture this?" backlog line
          - one-off diverse abstentions do not nag; signal is low-frequency (doctor + rare SessionStart)
        dependencies: []
        invariant_note: read-only aggregation of the gitignored ledger (inv1); loud at doctor/SessionStart, hook stays silent (inv2/inv3); no writes (inv4). SCOPE — abstention events are only logged for trusted + telemetry-opted-in corpora, so the backlog reflects those; untrusted/non-opted corpora leave no trace (state this, don't imply full coverage — inv3).

      - id: SIG-4
        title: Injection-precision MEASUREMENT (the KPI-2 read-signal)
        priority: P1
        effort: M
        status: done
        source: {lens: frontier, verdict: KEEP (measurement half; ranking half deferred to T7)}
        problem: >-
          hippo records what it INJECTED but never whether it HELPED, so
          "frequently recalled" is never distinguished from "frequently correct."
          KPI-2 (ROADMAP.yaml) names the missing PostToolUse read-signal outright.
        proposal: >-
          A lightweight PostToolUse hook that notes when an injected memory's cited
          file is subsequently Read/edited in the same session, writes it to a
          gitignored outcome ledger, and surfaces the injection-precision proxy in
          doctor/eval. Ship the MEASUREMENT only; the ranking-utility prior is
          gated on the salience keystone (SIG-5, tier T7).
        acceptance_criteria:
          - injected-then-touched events land in a gitignored outcome ledger
          - doctor/eval report the KPI-2 injection-precision proxy over the ledger
          - the ledger never influences ranking in this item (measurement-only)
        dependencies: []
        invariant_note: PostToolUse, not the UserPromptSubmit hot path (inv6); fire-and-forget gitignored ledger (inv1); no ranking change here.

      - id: SIG-5
        title: "Salience keystone — decide RET-5 default-on with RET-8 evidence"
        priority: P0
        effort: S
        status: planned
        source: {lens: retrieval, verdict: KEEP (= ROADMAP.v1 RET-10)}
        problem: >-
          RET-5 salience (recency/usage/staleness priors) ships DEFAULT OFF with
          both prerequisites wired but no decision and no tracked eval. It is the
          keystone gating an entire RANKING class (SIG-6, GOV-2 mute-read-side,
          team-hot, the SIG-4 utility prior). Until it is decided, those ship only
          as inert env flags.
        proposal: >-
          Run the eval both ways on RET-8's category-tagged set + the golden
          corpus; if no recall@10 regression and a measurable precision lift,
          promote salience to default-on and retire the flag-only debt; else keep
          off and record why. This IS ROADMAP.v1's RET-10 — execute it here if it
          did not land in the launch cycle.
        acceptance_criteria:
          - eval numbers recorded both ways; a written default-on/off decision with rationale
          - if on, the bounded priors are legible in the emitted breakdown (COR-8 scores)
        dependencies: [RET-8]      # cross-file: ROADMAP.v1 v0.9.0
        invariant_note: bounded, individually-capped multiplicative priors so relevance dominates (inv6-safe arithmetic); decision, not a silent flip.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). HARD-BLOCKED: RET-8 is NOT SHIPPED — its
          prerequisite gate (RET-1+GRA-1) cleared, but the deliverable is greenfield:
          eval_recall's fixture loader reads only {query, expected} with NO category
          field, and zero "category" hits exist anywhere in the tree. A T7 session must
          BUILD RET-8 FIRST (it is ROADMAP.v1 v0.9.0 work; doing it inside the T7
          session is legitimate — record it as cross-file work in the capstone): (1)
          extend load_hard_set/the fixture schema with a category field over
          multi-hop/temporal/update/abstention; (2) emit per-category recall@10/MRR in
          the report; (3) promote precision@k (already computed report-only) and
          abstention_rate to TRACKED entries in the gates dict (the abstention leg is
          half-built — an abstention_set loader + fixture already exist). THEN SIG-5
          itself is small: the salience machine is fully live and default-off
          (_salience_enabled reads HIPPO_SALIENCE; three individually-capped priors
          ≤1.42x worst-case swing; _apply_salience runs pre-cut; COR-8 components are
          already emitted per hit) — run eval_recall.evaluate both ways on the
          category-tagged set + golden fixtures, record numbers, write the decision
          into THIS file as a dated note on this item (the RUL-0 finding: pattern),
          and only then flip the default (change _salience_enabled's default, keep the
          env as the off-switch). DO NOT flip HIPPO_SALIENCE without the category
          evidence — that is the exact debt ED-2 exists to retire. If the decision is
          OFF, record why and leave the flag.

      - id: SIG-6
        title: "Abstention → self-populating eval fixtures (KPI-4)"
        priority: P2
        effort: M
        status: planned
        source: {lens: frontier, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          Per-project eval sets (RET-7) are hand-seeded, so KPI-4 measures what
          someone thought to test, not what users actually ask.
        proposal: >-
          At audit/consolidate time, auto-DRAFT agent-gated candidate RET-7 fixtures
          (query→expected memory) from the SIG-3 backend='none' abstention clusters
          (SIG-3 ships only that arm — sub-floor near-miss scores are not logged), so
          each project's yardstick grows from real un-answered traffic. Drafts only;
          human/agent confirms before a fixture is trusted.
        acceptance_criteria:
          - abstention clusters produce candidate query→expected fixtures for review
          - no fixture is trusted without explicit confirmation; KPI-4 set grows from real traffic
        dependencies: [SIG-3, RET-8]
        invariant_note: per-item agent-gated (inv4); off hot path.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). Source arm SHIPPED (SIG-3):
          telemetry.abstention_backlog returns [{"count","sample_query","terms",
          "queries"}] clusters. Sink SHIPPED (RET-7): eval_recall._default_fixture_path
          probes .claude/memory/.audit-fixtures/recall_hard_set.yaml FIRST (then
          tests/fixtures/), format [{query, expected:[stem]}] with an optional
          provenance-header YAML doc — the audit skill already writes drafts to that
          exact path. Residual blocker: RET-8 (the category-tagged KPI-4 substrate) —
          sequence AFTER RET-8 + SIG-5. FLOW at audit/consolidate time: for each
          recurring cluster emit a CANDIDATE row {query: sample_query, expected:
          [<agent-proposed stem>]} — the expected side is a JUDGMENT (the abstention
          has no answer by definition; the agent proposes, a human confirms; never
          fabricate a memory to make the fixture pass — that is the killed
          demand-gap-auto-draft). Land drafts clearly marked unconfirmed (the audit
          Phase-0.5 draft convention + the generated_with_backend provenance header);
          the CONFIRM step is what admits a row into the tracked set. Tag confirmed
          rows category: abstention (RET-8's fourth category) so KPI-4 measures the
          gap-closing loop end-to-end.

  # ------------------------------------------------------------------ RUL ---
  - id: RUL
    name: Claude-rules plane interconnection
    extends: INT (native-memory coexistence) + GRA + archive
    goal: >-
      Make hippo the ranking / hygiene / staleness / review layer over the
      always-loaded, unranked Claude-rules plane (CLAUDE.md, .claude/rules,
      agents) it already READ-scans — bidirectionally, per-item, agent-gated.
    items:

      - id: RUL-0
        title: "Spike — verify the .claude/rules `paths:` auto-load harness feature"
        priority: P0
        effort: S
        status: done
        source: {lens: claude-rules grounding, note: web-derived claim to confirm in-harness}
        problem: >-
          Several bridges lean on .claude/rules (Claude Code 2.0.64) being
          pattern-scoped by a YAML `paths:` glob auto-loaded at CLAUDE.md priority.
          This is web-sourced; build nothing paths:-dependent on an unverified
          feature.
        proposal: >-
          A short investigation (docs + a live probe) confirming whether
          .claude/rules exists, how `paths:` scoping loads, and its priority.
          Record the finding as a decision; it gates RUL-2's paths: leg and RUL-6.
        acceptance_criteria:
          - a written, dated confirmation (or refutation) of the .claude/rules paths: behavior
          - RUL-2/RUL-6 paths:-dependent scope is enabled or descoped accordingly
        dependencies: []
        finding: >-
          CONFIRMED 2026-07-08 (three sources; see decisions.ED-3). (1) Official docs
          (code.claude.com/docs/en/memory, "Organize rules with .claude/rules/"):
          project .claude/rules/*.md discovered recursively; YAML frontmatter
          `paths:` takes a list of globs (`**`, brace expansion supported); unscoped
          rules load at session launch at CLAUDE.md priority; paths:-scoped rules
          load LAZILY when Claude reads a file matching the glob; ~/.claude/rules is
          the user-level tier (project rules win). Introduced v2.0.64. (2) The
          installed harness binary (2.1.96) carries the feature's ".claude/rules/**"
          machinery. (3) LIVE in-harness probe on this machine: a paths:-scoped rule
          file was injected as a system-reminder immediately after a Read of a
          matching file — including inside a Task SUBAGENT, which received NO
          unscoped rules at start (confirms RUL-5's zero-automatic-injection premise)
          but DID receive the scoped rule on matching Read. VERDICT — RUL-2's
          paths:-glob-existence leg is ENABLED; RUL-6's paths: derivation is
          unblocked on the harness side (still LIF-7-gated, tier T7).

      - id: RUL-1
        title: Rule↔memory conflict radar (a first-class loud producer)
        priority: P1
        effort: M
        status: done
        source: {lens: claude-rules, verdict: KEEP (lead with the strength leg)}
        problem: >-
          Rules are unranked, un-staled, never reconciled with memory; a typed
          `contradicts` edge only annotates IF both sides co-surface on the hot
          path, so a live rule/memory conflict can sit unresolved forever.
        proposal: >-
          Generalize the WORKING audit authority-gap join (audit SKILL GOV_GLOBS +
          the strength<0.15 join) into a standing SessionStart/doctor producer.
          Lead with the broadly-applicable leg — "governance cites memory M but
          telemetry says nobody retrieves it (strength<0.15)" — and add the typed
          contradicts/supersedes leg as a bonus. Require the cited token to resolve
          to a real corpus file (precision). Route each finding to a per-item human
          decision via /hippo:consolidate.
        acceptance_criteria:
          - a rule citing a never-recalled (strength<0.15) memory fires a loud, specific producer line
          - a rule citing a memory another memory supersedes/contradicts is flagged with both files named
          - findings route to a per-item decision; nothing auto-resolves
        dependencies: []
        invariant_note: read-only, loud at doctor/SessionStart (inv3), proposes never auto-resolves (inv4); off hot path (inv6).

      - id: RUL-2
        title: Staleness & citation-rot applied to the rules plane itself
        priority: P2
        effort: M
        status: done
        source: {lens: claude-rules, verdict: KEEP (lead with CLAUDE.md code-ref drift)}
        problem: >-
          .claude/rules `paths:` globs and CLAUDE.md code references have ZERO
          staleness tracking — a rule scoped to a deleted tree, or naming a symbol
          that moved, silently wastes always-load context and misleads.
        proposal: >-
          Reuse provenance drift + citation_rot machinery over the rules plane.
          Lead with the FEATURE-INDEPENDENT leg (CLAUDE.md backtick code-references
          whose path/symbol drifted). Make the `.claude/rules paths:`-glob-existence
          leg conditional on RUL-0. Offer a per-item edit; never rewrite the file.
        acceptance_criteria:
          - a CLAUDE.md rule naming a now-missing path/symbol is flagged with the exact reference
          - '(if RUL-0 confirms) a .claude/rules file whose paths: glob matches nothing is flagged'
        dependencies: [RUL-0]
        invariant_note: read-only, legible (inv3); proposes edits, corpus/rules stay user-owned (inv1/inv4).

      - id: RUL-3
        title: Write-time dedup against the rules plane (preventive)
        priority: P2
        effort: S
        status: done
        source: {lens: claude-rules, verdict: KEEP (blind-spot — the preventive counterpart)}
        problem: >-
          Every other rules item cleans up two-plane drift AFTER it happens; nothing
          stops a new memory from restating a rule already in CLAUDE.md/.claude/rules
          in the first place.
        proposal: >-
          Extend the shipped write-time dup/conflict detection (LIF-2) to also scan
          the governance plane (the audit GOV_GLOBS set): when a new memory
          restates an existing rule, warn "this duplicates rule X — link, don't
          copy." Warn-only, agent-gated.
        acceptance_criteria:
          - creating a memory that restates a CLAUDE.md/.claude/rules rule surfaces the rule and suggests linking
          - no autonomous rejection — the agent decides
        dependencies: []
        invariant_note: warn-only at write time (inv4); reuses shipped dup machinery.

      - id: RUL-4
        title: Rules as an on-demand recall SOURCE (no import, no duplication)
        priority: P2
        effort: M
        status: done
        source: {lens: claude-rules, verdict: KEEP-worthy (blind-spot — the elegant reverse direction)}
        problem: >-
          The obvious "import CLAUDE.md/rules into the corpus" move creates a SECOND
          copy of each instruction in two authority planes that then drift (and its
          auto-demotion half is unsafe — guardrail rules must stay always-on).
        proposal: >-
          Instead of importing, let a CLAUDE.md/.claude/rules entry surface as a
          LOW-PRIORITY recall hit (clearly labelled "rule") when it is genuinely
          relevant — giving the "rule appears when needed" payoff with ZERO
          duplication or demotion risk. The rules plane stays the authority for its
          own content; hippo only ranks a pointer to it.
        acceptance_criteria:
          - a query strongly matching a rule surfaces a labelled "(rule)" pointer without copying the rule into the corpus
          - always-loaded guardrail rules are never demoted or moved; recall only ADDS a pointer
        dependencies: []
        invariant_note: pure retrieval on the hot path (inv6); rules plane stays user-owned (inv1); no corpus write (inv4).

      - id: RUL-5
        title: "MCP resources — expose hippo://floor (and a rules-view) for subagents"
        priority: P2
        effort: M
        status: done
        source: {lens: claude-rules, verdict: KEEP (resource half; prompts held)}
        problem: >-
          A Task subagent gets zero automatic memory injection (no UserPromptSubmit
          fires for it); the MCP server declares only capabilities.tools, leaving
          resources & prompts entirely unused.
        proposal: >-
          Extend mcp_server capabilities with RESOURCES: hippo://floor (the portable
          floor) and hippo://rules-view (the RUL-1 reconciliation), so a subagent
          can pull baseline memory at start with no new hook. Hold the promote/absorb
          PROMPTS until their underlying items land. hippo://floor must stay
          AGENT-PULLED, never wired as an implicit always-load (no second channel).
        acceptance_criteria:
          - a subagent can read hippo://floor to obtain the always-on memory without any hook firing
          - resources are agent-invoked, never an implicit always-load channel
        dependencies: []
        invariant_note: resource reads are agent-invoked, not per-prompt (inv6); no second silent always-load channel (NATIVE_MEMORY promise).

      - id: RUL-6
        title: "Glob-scoped rule promotion (folds cited_paths→paths: into LIF-7)"
        priority: P3
        effort: M
        status: planned
        source: {lens: claude-rules, verdict: FOLD into LIF-7 (scoping refinement)}
        problem: >-
          Promoting a reinforced procedural memory into CLAUDE.md (LIF-7's framing)
