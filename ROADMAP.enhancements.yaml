      - id: RUL-7
        title: AGENTS.md fan-out — one ranked source for the cross-tool rule plane
        priority: P3
        effort: M
        status: planned
        source: {lens: cross-project+claude-rules, verdict: RESHAPE (post-v1 reach; one target)}
        problem: >-
          Teams run multiple agents (Codex/Cursor/Copilot/…), each with its own
          unranked hand-maintained rules file that drifts. hippo's AUDIT SKILL already
          read-scans AGENTS.md (via GOV_GLOBS, the Linux-Foundation standard) for
