  # ------------------------------------------------------------------ RCL ---
  - id: RCL
    name: Retrieval mechanics (hot-path-safe precision)
    extends: RET
    goal: Make every injected token earn its place — right form, right count, no redundancy, terse-follow-up rescue — all hot-path-safe.
    items:

      - id: RCL-1
        title: Per-query dense/lexical intent routing
        priority: P1
        effort: S
        status: done
        source: {lens: retrieval, verdict: KEEP}
        problem: >-
          Fusion weights are static (1,1,0.5,0.5); an identifier/stacktrace-dense
          prompt is diluted by semantic scoring of boilerplate, and a prose query
          is under-served by lexical exactness.
        proposal: >-
          clean_query/_mine_identifiers already MINES identifier tokens on every
          prompt for free — derive a cheap density/shape ratio from that mined list
          (vs total tokens) and set the per-query RRF weights from it (lean lexical on
          symbol/error-heavy, dense on prose).
          Default to the balanced 1/1/0.5/0.5 whenever the shape signal is weak so a
          mis-route can never degrade the baseline. Gate behind the eval golden gate.
        acceptance_criteria:
          - a pasted-stacktrace query leans lexical; a prose paraphrase leans dense; ambiguous → balanced default
          - no recall@10 regression on the golden corpus (eval-gated)
        dependencies: []
        invariant_note: re-derives a cheap token classification on the hot path (no model/IO — inv6); the balanced default is the byte-identical fallback.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). CORRECTION — the density signal is NOT exposed today:
          clean_query (recall.py, called ONLY by recall.main) discards _mine_identifiers'
          count (list capped at _MAX_MINED_TOKENS=8) and returns a bare str. Compute the
          shape ratio INSIDE recall() — the one chokepoint all four surfaces share:
          ident=len(_mine_identifiers(query)); total=len(tokenize(query)); density=
          ident/max(total,1). Attach: the weights tuple in recall() (search
          "(1.0, 1.0, _body_rrf_weight(), _body_rrf_weight())") — replace the first two
          entries with (dense_w, lex_w) derived from density; a DEAD-BAND around the
          midpoint must return exactly (1.0, 1.0) so a weak signal is byte-identical to
          today. Add module constants + one HIPPO_* env override mirroring the
          _knee_ratio()/_body_rrf_weight() parse-or-fallback idiom. Do NOT touch the
          body weights (positions 3-4 — RET-2's backstop discount) and do NOT touch the
          unweighted primary_relevance fusion that feeds the knee. Rule pointers
          (corpus="rule") are containment-scored in a separate lane — no special-casing.
          GATE REALITY: eval_recall's gates are ABSOLUTE thresholds (GATE_SELF_RECALL=0.90,
          GATE_HARD_RECALL=0.80, GATE_MRR=0.60, GATE_P95_MS=300) — there is NO baseline-diff
          regression gate; "no regression" = those gates stay green + a hermetic
          tests/test_recall.py pair (stacktrace→lexical lean, prose→dense lean,
          ambiguous→exact balanced default) with HIPPO_DISABLE_DENSE=1 conventions.
        implementation_addendum: >-
          SHIPPED 2026-07-08 (commit-local finding, not a premise correction): two guards the
          note didn't spell out, both caught by existing hermetic tests before merge, not by
          the eval gates (small-corpus eval numbers were byte-identical before/after either
          way). (1) The lean must be a no-op whenever only ONE of dense/bm25 actually has
          candidates (e.g. HIPPO_DISABLE_DENSE=1) — there is no "which backend to favor"
          decision when just one contributes, and applying a non-1.0 weight to the lone
          contributor only rescales its score for nothing;
          test_recall_emitted_score_equals_true_penalized_fused_score pinned the old
          byte-identical BM25-only score and caught this immediately. (2) _INTENT_MIN_TOKENS
          needed to be 8, not a lower number — a short-but-plain technical query (6 tokens,
          zero mined identifiers, e.g. "oauth token refresh flow policy gateway") is common
          enough that leaning dense on it measurably reorders the fused list; primary_relevance
          (unweighted, the knee's own input) doesn't change, but the knee cutoff compares
          consecutive EMITTED entries in fused order, so a reorder can shift which entry's
          relevance becomes "prev_relevance" and trip the cutoff early —
          test_recall_superseded_ranks_below_successor_dense_path caught a memory dropping out
          of top-k entirely. Both guards are in recall.py: the both-backends check lives at the
          _intent_weights call site in recall(), not inside the helper itself (it needs
          dense/bm25 presence, which the helper doesn't receive).

      - id: RCL-2
        title: Floor-dedup + within-session injection cooldown
        priority: P1
        effort: M
        status: done
        source: {lens: retrieval, verdict: KEEP + blind-spot (cooldown)}
        problem: >-
          Recall spends the 9000-char budget re-injecting memories the model already
          holds from the always-loaded floor / CLAUDE.md, and re-injects the SAME
          pointer every turn of a multi-turn thread.
        proposal: >-
          (1) Floor-dedup — CORRECTION (post-T2 audit): recall.main() ALREADY floor-dedups
          as a silent DROP (over-fetch pool_k, filter fused_floor_names members, slice).
          This item CONVERTS the drop into a legible one-line "(already in floor)"
          collapse and WIDENS the set with CLAUDE.md/.claude/rules citations
          (archive._cited_by_claude_md_names). Exact-name, conservative. (2) Cooldown —
          a session-scoped "already injected this thread" collapse seeded from the
          episode buffer. Both LEGIBLE, never a silent vanish.
        acceptance_criteria:
          - a hit already in the floor renders as "(already in floor)", not a duplicate body
          - the same top pointer does not re-inject every turn of one thread
        dependencies: []
        invariant_note: pure retrieval reading two known sets + a session set (inv6); collapse-not-drop keeps it legible (inv3).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). All work lands in recall.main() + format_results —
          NOT inside recall() (eval_recall probes recall() directly and must stay
          ledger-free; the existing floor-dedup comment in main() says why). COLLAPSE: at
          main()'s floor filter, TAG (r["floor_collapsed"]=True) instead of dropping, keep
          the pool_k over-fetch so collapsed lines cost no slot, and render tagged hits in
          format_results as one line "• <name> (already in floor)". Widen the set once per
          call: floor |= archive._cited_by_claude_md_names(repo_root, {r["name"] for r in
          results}) — repo_root is already resolved in main(); note that helper fails
          CLOSED to "cited" on unreadable files (safe direction here: more collapsing,
          never less). COOLDOWN: the episode buffer already stores per-turn
          {session_id, recalled_names} (telemetry.log_episode fires AFTER recall in
          main(), so turn N sees turns 1..N-1). Derive the already-injected set by
          iterating telemetry.read_episodes(td) filtered to args.session_id (bounded:
          the ledger rotates at ~2MB) — one file read, same cost class as links.json.
          Collapse repeats, never drop (inv3/EKPI-1). T2 GUARD: main() already splits
          corpus="rule" pointers out BEFORE the floor slice — keep that split; rule
          pointers are EXEMPT from floor-dedup (a rule is not a floor memory) but
          INCLUDED in the cooldown (they re-fire every matching prompt otherwise).
          Tests: two main() invocations with a fixed --session-id in tests/test_recall.py;
          assert the second turn collapses the repeat and rule pointers still render.

      - id: RCL-3
        title: Multi-turn query formation — rescue terse follow-ups
        priority: P2
        effort: S
        status: done
        source: {lens: retrieval, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          Terse follow-ups abstain: clean_query returns "" for continuation phrases
          ("continue", "ok", …) and sub-2-content-token prompts, and slightly longer
          follow-ups ("and the other one?") pass through but share no token with any
          memory, so recall reflects your first message, never the thread. (CORRECTED
          post-T2 audit: the original claim that clean_query blanks "and the other
          one?" was wrong — it has 4 tokens and abstains DOWNSTREAM at the
          zero-overlap/floor check; the rescue must cover both paths.)
        proposal: >-
          When the current prompt carries no standalone retrieval intent, form the
          query from a blend of the last few user turns (pure string assembly, no
          model, hot-path-safe). Bounded and legible.
        acceptance_criteria:
          - a terse follow-up recalls relevant memory via the recent-turns blend instead of abstaining
          - substantive standalone prompts are unaffected
        dependencies: []
        invariant_note: pure string blend on the hot path, no LLM/network (inv6).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). HARD FACT: the UserPromptSubmit stdin payload
          carries ONLY {prompt, session_id} — there is NO transcript access anywhere, so
          "the last few user turns" must come from hippo's own state. Reuse the episode
          buffer: each prior turn's query_preview (≤80 chars) + session_id is already
          logged (telemetry.log_episode / read_episodes). Build the blend in recall.main()
          BETWEEN raw_query assembly and the clean_query call: when clean_query(raw)
          returns "" OR yields < N content tokens (reuse _CONTINUATION_PHRASES +
          _MIN_CONTENT_TOKENS as the trigger predicate — gate TIGHTLY so substantive
          prompts are untouched), re-run clean_query(raw + " " + last 2-3 same-session
          query_previews). Pure string assembly; one bounded ledger read (same read the
          RCL-2 cooldown does — share it if both land). Do NOT modify clean_query itself
          (it is pure/single-prompt and unit-pinned). Side-benefit: a blended query
          LENGTHENS q_tokens, which lowers rule-pointer containment |q∩s|/|q| — the safe
          direction for the T2 rules lane. Tests: drive R.main(["--stdin-json"]) twice
          with one session_id (substantive turn, then terse follow-up); assert the
          follow-up recalls what the first turn's vocabulary reaches, and a substantive
          second prompt is byte-identical to today.

      - id: RCL-4
        title: MMR intra-block diversity re-rank
        priority: P2
        effort: S
        status: done
        source: {lens: retrieval, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          Nothing collapses near-DUPLICATE hits WITHIN the injected block — two
          memories paraphrasing one decision (or a superseded pair) each eat a
          top-k slot.
        proposal: >-
          A maximal-marginal-relevance re-cut over the fused top-N using cheap
          pairwise cosine from the dense matrix already resident in memory (pure
          arithmetic, hot-path-safe), so the block spans DISTINCT facets.
        acceptance_criteria:
          - two near-paraphrase memories no longer both occupy top-k; the block spans distinct facets
          - no recall@10 regression (eval-gated)
        dependencies: []
        invariant_note: pure arithmetic over the resident dense matrix (inv6).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). SLOT: re-order `penalized` AFTER graph expansion +
          salience (immediately after the _expand_neighbors call in recall()) and BEFORE
          the emission loop — so graph neighbors are diversified too and the knee (which
          lives inside the emission loop) measures gaps on the diversified order. Never
          MMR the final results list: T2's corpus="rule" pointers are appended after
          emission, carry NO dense row, and must stay out of the cosine math. MECHANICS:
          take the top N≈2k of penalized; rows = entries[i]["row"] → idx.dense[row]
          (rows are L2-normalized — dot IS cosine; after tier-merge rows are re-stamped,
          so the map holds for fused corpora). One slice D=idx.dense[rows]; sims=D@D.T;
          classic MMR with _MMR_LAMBDA (~0.7) + HIPPO_MMR_LAMBDA override (the
          _knee_ratio parse-or-fallback idiom). GUARDS (mandatory): idx.dense is None
          (BM25-only corpus), row is None (model-mismatch merge, body-only/graph-injected
          entries) → those candidates keep their penalized position and are EXEMPT from
          the diversity math (mirror the knee's exemption posture) — MMR degrades to a
          no-op, never a crash. Cost: ~O(N²·dim) = sub-millisecond at N=20; the 300ms
          p95 gate is untouched. Gate: eval_recall absolute gates stay green (no
          baseline-diff gate exists) + a hermetic test seeding two near-paraphrase
          memories + one distinct memory, asserting the block spans both facets.
        implementation_correction: >-
          SHIPPED 2026-07-08. The SLOT instruction above is WRONG and was caught by two
          existing hermetic fixtures (a Japanese-corpus dense test, a supersession dense
          test), not by the eval gates (both still passed the absolute thresholds despite the
          bug — this is exactly the failure mode "no baseline-diff gate exists" cannot catch).
          Running MMR on `penalized` BEFORE the knee cutoff lets a diversity-promoted
          LOW-relevance candidate land ahead of a genuinely HIGH-relevance one in walk order;
          the knee then sees a false "cliff" at the low-relevance candidate and BREAKS,
          discarding the high-relevance candidate sitting right behind it -- observed
          concretely: a 3-entry Japanese corpus returned only 1 result (the on-topic
          tokyo_weather memory dropped entirely) because MMR swapped a low-similarity
          distractor ahead of it. FIX (the shipped design): split the emission step into two
          passes. PASS 1 walks `penalized` in the TRUE organic order (unchanged from
          pre-RCL-4 code) applying the old-skip/dangling-file/knee-cliff filters exactly as
          before, but admits up to `pool_n = max(k * _MMR_POOL_MULT, k)` candidates instead of
          just `k` — this is the ONLY behavioral widening, and it only ever admits MORE
          candidates, never fewer or different ones, for the same prefix (the knee/skip
          filters are a pure function of the sequence walked so far, so the first
          min(k, len(admissible)) entries are identical to the pre-RCL-4 k-capped walk).
          PASS 2 runs `_mmr_rerank` over this ALREADY relevance-vetted, possibly
          larger-than-k pool. PASS 3 builds result dicts from `admissible[:k]` post-MMR — no
          further knee/old/dangling checks needed, they are already resolved. Net effect:
          when idx.dense is None, `_mmr_rerank` is a no-op and the whole path is
          byte-identical to pre-RCL-4 (confirmed: the entire pre-existing hermetic suite,
          which is overwhelmingly BM25-only fixtures, passed unchanged). When dense is
          available, MMR can still promote a genuinely admissible (knee-cleared) candidate
          over a near-duplicate, satisfying the acceptance criterion, but can never resurrect
          a candidate the ORGANIC ranking had already ruled irrelevant, and can never cause
          the knee to falsely cut a candidate it would have kept. Also recalibrated
          `_MMR_LAMBDA` from the proposal's ~0.7 to 0.8 after this fix — even correctly
          sequenced, 0.7 measurably eroded the golden-corpus hard_recall@10/MRR (still
          gate-passing) by letting diversity outvote relevance too readily; 0.8 recovers
          hard_recall@10 to the pre-RCL-4 1.0 and MRR to within ~0.02 of baseline while the
          adversarial near-paraphrase fixture still diversifies correctly.

      - id: RCL-5
        title: Offline cross-encoder rerank — on explicit surfaces only
        priority: P3
        effort: L
        status: done
        source: {lens: retrieval, verdict: RESHAPE (off the hot path)}
        problem: >-
          RRF fuses ranks but never reads query-vs-description jointly; a
          cross-encoder does — the most-cited 2026 precision lever hippo lacks — but
          on the hot path it is a real p95 risk and a second model artifact.
        proposal: >-
          Ship a local ONNX cross-encoder second stage ONLY on the latency-tolerant
          explicit surfaces — /hippo:recall and the MCP recall tool — where a ~200ms
          rerank is free and there is no p95 gate. Never on UserPromptSubmit.
        acceptance_criteria:
          - '/hippo:recall and the MCP recall tool rerank the fused top-N with the cross-encoder'
          - the UserPromptSubmit hot path is untouched (no new model on it)
        dependencies: []
        invariant_note: keeps the hot path pure (inv6); the model is bundled/index-time-built (never downloaded on the hook, inv2).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). ATTACH: recall_view.describe is the single shared
          chokepoint — the /hippo:recall skill AND mcp_server._tool_recall both call it —
          so rerank there, after hits=recall(...) and before annotation. NEVER touch
          recall.main() (the UserPromptSubmit path). T2 GUARD: exclude corpus=="rule"
          pointers from the rerank and re-attach them at the tail (mirror recall.main()'s
          split) — a rule pointer has no query-vs-description joint signal and must never
          be re-ordered among corpus hits. MODEL: add _get_cross_encoder(allow_download)
          mirroring build_index._get_model exactly (module-level cache dict, HF-offline
          forced when allow_download=False, download permitted ONLY at build/bootstrap
          time); warm it in build_index/bootstrap; ride ensure_fastembed_cache_path()'s
          durable cache dir. On cache miss at describe time → return the un-reranked
          order (degrade, never download, never raise). DEP CHECK before coding: the
          pinned band fastembed>=0.4,<0.8 — verify the installed line exposes a
          TextCrossEncoder/rerank API; if not, bump the pin (requirements.txt change ⇒
          state the re-bootstrap flag in the capstone) rather than vendoring onnxruntime
          calls. Tests: hermetic path asserts describe() returns unreranked order with no
          model present; the model-bearing test goes under @pytest.mark.network (the
          hermetic CI lane deselects it; the dense lane opts in). tests/test_vendor.py +
          test_fastembed_cache_path.py pin the cache/vendor conventions — extend, don't
          fight them.
        implementation_correction: >-
          SHIPPED 2026-07-08. DEP CHECK confirmed clean: installed fastembed 0.7.4 (within
          the pinned >=0.4,<0.8 band) exposes fastembed.rerank.cross_encoder.TextCrossEncoder
          with .rerank(query, documents) -> scores; NO requirements.txt bump, re-bootstrap NO.
          Picked the smallest supported model (Xenova/ms-marco-MiniLM-L-6-v2, 0.08 GB) via
          TextCrossEncoder.list_supported_models() — its HF source repo IS its model name
          (unlike DEFAULT_MODEL's qdrant/* re-export), grounded not guessed.
          ONE finding the note's "mirror _get_model exactly" instruction turned out to be
          load-bearing for, not just stylistic: empirically verified that
          HF_HUB_OFFLINE=1 correctly blocks the real network reach ("Cannot reach
          huggingface.co: offline mode is enabled") but fastembed's OWN model loader wraps
          that local failure in a retry-with-backoff sleep loop ANYWAY (3s, 9s, 27s — ~40s
          total) before finally raising. Without _get_model's cheap pre-check
          (_cross_encoder_cached, a pure os.walk for a .onnx file, grounded against the same
          models--<repo> snapshot-dir convention), a cold cache on an "explicit surface a
          human is waiting on" would hang ~40s before degrading — confirmed the fix drops
          this to ~100 microseconds (test_get_cross_encoder_offline_raises_in_microseconds_
          on_cold_cache pins it under 0.1s). Also added a best-effort cross-encoder warm-up
          step to plugin/skills/bootstrap/SKILL.md (mirroring the embedding-model warm-up
          line already there) — with no OTHER natural trigger to download this model, a
          fresh install would otherwise degrade to the un-reranked order FOREVER. The real
          model was exercised network-marked (test_real_cross_encoder_reranks_by_actual_
          relevance) and correctly ranked a genuinely on-topic description above an
          off-topic one.

      - id: RCL-6
        title: Evidence-snippet form for the top body-hit
        priority: P3
        effort: M
        status: done
        source: {lens: retrieval, verdict: RESHAPE (body-hit-only, staleness-banded)}
        problem: >-
          For a memory whose key fact is buried in the body behind a generic
          description, a pointer forces a read-the-file round-trip.
        proposal: >-
          Emit the winning body chunk inline as a bounded verbatim evidence line —
          ONLY when the winning signal was a body chunk (not the description). The
          body-vs-description rankings exist internally (dense_body/bm25_body) but the
          'backend' label collapses body to invisible today, so a body-signal-win flag
          must first be plumbed into the result dict/breakdown. Only rank-1, only above
          a high score band, always carrying the RET-6 staleness banner (shipped) + a
          NEW "indexed @sha" mark (net-new render; no @sha mark exists today — see
          implementation_notes for the verified source). As a blanket rank-1 snippet it
          is redundant; as body-hit-only progressive disclosure it saves a round-trip.
        acceptance_criteria:
          - a rank-1 body-signal hit renders its winning chunk inline with a staleness banner + @sha
          - description-signal hits stay pointers; the snippet respects the char budget
        dependencies: []
        invariant_note: body chunks are not drift-patched mid-session — the banner + @sha keep the JIT contract legible (inv1/inv3).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). GOOD NEWS: body-chunk TEXT is ALREADY PERSISTED —
          build_index writes {"entry","hash","tokens","text"} per chunk into the manifest
          and LoadedIndex.body_chunks carries it, so the snippet is idx.body_chunks[j]
          ["text"] with NO read-at-emit. WHAT IS MISSING (verified): (1) the winning
          chunk index — _dense_rank_body/_bm25_rank_body dedup to the PARENT entry and
          discard j; plumb a {parent: winning_j} map out of them (or a sibling helper) so
          recall() can fetch the chunk. (2) The body-signal-win flag — derive it, don't
          invent state: an emitted entry ABSENT from primary_relevance (the desc-only
          fusion the knee already exempts) but PRESENT in a body ranking is a body-win;
          absent from both = graph injection (no snippet). (3) The @sha source — NEITHER
          per-entry source_commit (only source_commit_TIME is indexed) nor an index
          head_commit exists; stale.json's sha covers only STALE memories. ADD
          manifest["head_commit"] at build time (one git rev-parse HEAD in build_index,
          the telemetry.log_episode pattern) and render its 7-char form as "indexed
          @<sha>" — zero hot-path git cost. Do NOT read per-memory frontmatter at emit
          (a per-hit file read on the hot path). RENDER: format_results, extra clause
          after the banner, gated on rank==1 AND body-win AND score ≥ _SNIPPET_SCORE_BAND
          (new constant + HIPPO_* override) AND corpus != "rule" (mandatory T2 guard: on
          corpus abstention a rule pointer IS rank-1 and has no chunk/sha). Bound the
          snippet within _MAX_RECALL_CHARS. Manifest gains a key → this is a
          SCHEMA_VERSION bump per ED-4 (clean break, one forced rebuild, re-bootstrap
          no); coordinate with any same-tier bump so the suite sees one break.
        implementation_correction: >-
          SHIPPED 2026-07-08. TWO corrections against the note above, both caught before
          merge (not by the eval gates — the absolute gates stayed green either way).
          (1) "GOOD NEWS: body-chunk TEXT is ALREADY PERSISTED" is WRONG against the live
          tree: build_index.py's in-MEMORY body_chunks list does carry "text" (used for
          embedding), but the block actually WRITTEN to manifest.json
          (body_chunks_manifest) explicitly stripped it to {entry,hash,tokens,row} — the
          RET-2 comment there said so outright ("no raw chunk text — reconstructible from
          the source file"). idx.body_chunks[j]["text"] would have KeyError'd. FIX: added
          "text" back to body_chunks_manifest (the persisted shape is now
          {entry,hash,tokens,row,text}) — a real, if small, index-size increase, but it
          keeps the promise this note assumed: the snippet render is genuinely read-free at
          emit time. Confirmed as this tier's ONE schema break: SCHEMA_VERSION 3->4 covers
          BOTH this and the new manifest-wide head_commit key in one bump.
          (2) _SNIPPET_SCORE_BAND calibrated against _RRF_K ALONE (ignoring
          _BODY_RRF_WEIGHT) sets a bar NO body-win entry could ever clear: a body-win's
          entire score comes from body-discounted rankings, whose absolute ceiling is
          `2 * _body_rrf_weight() / (_RRF_K+1)` (rank-0 in both dense_body AND bm25_body at
          once) — roughly HALF that for a realistic single-lane rank-0 hit. A band
          calibrated on primary-signal magnitude alone (~0.03) is 3-6x higher than a
          body-win could ever reach (~0.008 for a real single-distinctive-fact fixture,
          confirmed empirically), silently making the whole feature dead code — no hermetic
          test would have caught this either, since a test asserting "the snippet renders"
          would have just failed, which is what happened first. FIX: default now derives
          from `_body_rrf_weight() / (_RRF_K+1)` (a fraction, `_SNIPPET_SCORE_BAND_FRACTION
          = 0.6`, of a single body-ranking's OWN rank-0 ceiling) so the gate scales
          correctly with whatever HIPPO_BODY_RRF_WEIGHT is configured, rather than a
          fixed number silently detached from the score space it's compared against.
          `HIPPO_SNIPPET_SCORE_BAND` still overrides with an absolute value for operators
          who want to tune it directly.

  # ------------------------------------------------------------------ GOV ---
  - id: GOV
    name: Corpus self-governance & trust legibility
    extends: LIF + graph + skills-dx
    goal: A corpus a human (or a team) can trust, govern, and steer — contradictions resolved, control granted, changes reviewable, health legible.
    items:

      - id: GOV-1
        title: "Contradiction inbox + /hippo:resolve"
        priority: P1
        effort: M
        status: done
        source: {lens: trust, verdict: KEEP, leverage: 4}
        problem: >-
          A `contradicts` edge only annotates a hot-path pointer IF both sides
          co-surface; a live conflict ("we use X" vs "we stopped using X") can sit
          unresolved forever, and the model gets injected both.
        proposal: >-
          A SessionStart producer enumerating ALL unresolved contradicts edges +
          high-similarity write-time conflicts, and a /hippo:resolve flow walking
          each pair for a per-item human verdict: keep-A-supersede-B, keep-both-as-
          scoped, merge, or mark-not-conflicting. Generalizes the audit authority-gap
          prototype. Empty-is-fine.
        acceptance_criteria:
          - every unresolved contradicts edge appears in a standing, drainable queue (not only when co-surfaced)
          - '/hippo:resolve applies a per-item verdict; nothing auto-picks a winner'
        dependencies: []
        invariant_note: loud producer (inv3); per-item agent-gated verdicts (inv4); zero hot-path cost (inv6).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). ENUMERATOR (net-new, the one graph primitive to
          add): LinkGraph.all_typed_edges(relation) -> sorted [(src, tgt)] iterating the
          public LinkGraph.typed map — nothing enumerates corpus-wide pairs today (do NOT
          reuse typed_unresolved: it means "target did not resolve to a file", not
          "unverdicted"). Scope the inbox to `contradicts` ONLY — supersedes already has
          its demotion mechanism (_SUPERSEDED_PENALTY + typed note). WRITE-TIME-CONFLICT
          ARM: nothing persists write-time neighbor warnings today (write_memory prints
          and drops them) — add a small gitignored append (e.g. conflicts.jsonl under the
          telemetry dir, byte-rotated) in write_memory when neighbors fire, OR descope
          the arm to typed edges only; do not pretend a source exists. RESOLVED
          MECHANISM: a per-clone gitignored ledger under CLAUDE_PLUGIN_DATA keyed by
          sha256(realpath(repo_root))[:16] (copy _periodic_nudge_should_fire's key
          derivation verbatim), storing sorted [src,tgt] pairs — ONLY the
          "mark-not-conflicting" verdict lands there; every corpus-mutating verdict
          (supersede via reconsolidate.semantic_reverify(loser, outcome,
          superseded_by=winner), merge, scope-both) is an ordinary git commit that
          REMOVES or annotates the edge, so inv1 keeps the authority. T2 BOUNDARY:
          rules_plane.conflict_radar already owns the GOVERNANCE-cited subset's loud
          SessionStart line — the inbox producer counts every pair but SKIPS re-printing
          pairs the rules_conflict producer already surfaced this session (no double
          nag). SKILL: plugin/skills/resolve/SKILL.md (skills are auto-discovered — no
          manifest registration) with the CLAUDE_PLUGIN_DATA guard + _resolve_py.sh
          preflight; MUST add "resolve" to
          test_skills_contract.test_shipped_skills_are_exactly_these (a pinned literal
          list) and satisfy the QUA-8 snippet-compiles checks. Producer joins PRODUCERS
          with the (memory_dir, repo_root, ctx) 3-arg shape. Feed the count into GOV-6.

      - id: GOV-2
        title: "steer: pin (then mute) — the missing control axis"
        priority: P1
        effort: M
        status: done
        source: {lens: trust, verdict: RESHAPE (ship PIN first; defer MUTE)}
        problem: >-
          Users can only add or delete — there is no way to say "surface this more
          here" (short of hand-editing the floor) or "this is noise, surface it
          less" (short of deleting an occasionally-useful memory).
        proposal: >-
          A per-item, agent-gated `steer` frontmatter field. Ship PIN first — a
          bounded, capped, always-on multiplicative BOOST (can't dominate genuine
          relevance), legible in the breakdown. DEFER MUTE; when it lands make it a
          DOWN-WEIGHT that may drop below the floor but is COUNTED in a doctor "N
          memories muted by steering" line — never a silent full-suppress.
        acceptance_criteria:
          - '"keep the deploy runbook in mind here" writes a reviewable steer:pin diff; recall gives it a bounded, capped lift'
          - MUTE (later) is legible in doctor; a muted memory is never silently gone
        dependencies: []
        invariant_note: write is per-item agent-gated (inv4); the always-on read-side prior needs a schema bump (ED-4) + the p95/eval gate; mute must be counted (inv3). Read-side ranking beyond pin's bounded boost is gated on SIG-5.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). TWO CLEAN BUMPS, verified mechanics: (1) new
          frontmatter key `steer` ⇒ CORPUS_FORMAT_VERSION 2→3 (the "migration" is the
          format-2 precedent: verify no key collides, then provenance.write_corpus_format
          stamps the marker; doctor.check_format_version already reports both
          directions); (2) carry steer in the index so the hot path never re-reads files
          ⇒ add _extract_steer(fm) (mirror _extract_invalid_after's
          top-level-then-metadata read) to build_index.compute_corpus's entry dict and
          bump SCHEMA_VERSION 3→4 — AND extend refresh_index's metadata no-op compare
          (the old_invalid==new_invalid / source_commit_time guard) with old_steer ==
          new_steer, or a steer edit on a quiet corpus never re-indexes (the exact
          starvation bug those two fields already guard). Value shape: a bounded enum
          (`steer: pin`), never a user-supplied float. BOOST ATTACH: the BASE penalized
          loop in recall() (beside _INVALIDATION_PENALTY/_SUPERSEDED_PENALTY), NOT
          _apply_salience — salience is default-OFF behind HIPPO_SALIENCE and pin must be
          always-on: `if entries[i].get("steer")=="pin": adj_score *= _PIN_BOOST`
          (~1.2, capped constant + HIPPO_PIN_BOOST override). Placing it pre-cut lets a
          pinned memory compete for graph-expansion seeds exactly like the penalties do.
          LEGIBILITY (COR-8): add a distinct `steer` key to the emitted result dict (do
          NOT overload `salience`, which is None when the flag is off) so
          recall_view/GOV-5 can echo "pinned ×1.2"; rule pointers (corpus="rule") never
          carry steer. Ship a doctor "N memories pinned" count now (reads the manifest) —
          it pre-wires the mandatory MUTE count for later. If GOV-7 lands the same tier,
          coordinate: each new frontmatter key is its own corpus_format break — land
          GOV-2 first (2→3), GOV-7 rides the next (3→4); same for SCHEMA_VERSION.
          Tests: pin lifts a borderline memory into top-k but cannot beat a strong
          organic hit (bounded), byte-identical output for an unpinned corpus, and the
          eval gates stay green.

      - id: GOV-3
        title: Consolidation proposals carry their evidence (rationale)
        priority: P2
        effort: M
        status: done
        source: {lens: trust, verdict: RESHAPE (keep the rationale payload)}
        problem: >-
          A teammate pulling the repo sees a MEMORY.md diff with no "why was this
          added / what did it replace" — memory changes are trust-opaque.
        proposal: >-
          Attach RATIONALE to each /hippo:consolidate proposal: the triggering
          episode/diff, the source_commit, which memories it supersedes/merges and
          why (similarity + typed-edge). The capture + new_memory --check flow already
          assembles the pieces (episode/diff from capture.py; source_commit +
          similarity-neighbors from new_memory --check; supersede via reconsolidate).
          The fancy Artifact review UI is optional gravy, not the deliverable.
        acceptance_criteria:
          - each proposed add/merge/supersede shows its evidence (episode, HEAD baseline, superseded neighbor + similarity)
          - the approved set still lands as ordinary per-item git commits (inv1)
        dependencies: []
        invariant_note: proposal/review only; nothing writes until per-item approval (inv4); reinforces markdown-in-git authority (inv1).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). This is a PRESENTATION/ASSEMBLY item — no new
          write path. Verified evidence inventory: episode context = the capture seed's
          query_previews/recalled_names/session_id (gather_session_context); neighbor +
          similarity = check_candidate's neighbors[].name/.score, PLUS T2's
          rule_neighbors[{file,score,preview}] (show it — "this candidate also restates
          CLAUDE.md"); supersede evidence = reconsolidate.semantic_reverify's result.
          CORRECTION: source_commit does NOT exist at proposal time (check_candidate is a
          dry run — provenance backfill only runs on the real write). Use the honest
          baselines that DO exist: provenance.git_head(repo_root) at proposal time
          ("as of HEAD <sha>") and/or the seed's <head_commit>..<head> range. Assembly
          point: extend the consolidate drain (Step 1 of
          plugin/skills/consolidate/SKILL.md, right after the new_memory --check call) —
          add a --check --json (or extend the printed block) so the skill renders
          "proposal <name>: from session <sid> (queries: …); restates/replaces <neighbor>
          (similarity 0.9x); as of HEAD <sha>". SEQUENCING HINT: GRW-1 (T5) upgrades the
          seed with verbatim diff hunks — the single biggest rationale-quality lift; if
          tiers run in order this item ships with name-only changed_paths and gets hunks
          retroactively when GRW-1 lands (design the render to include a hunks block IF
          the seed carries one). EXTENSION worth taking: on approval, fence the rationale
          into the memory BODY (git-committed why, not a one-time display), reusing the
          additive-append discipline of _append_related_line.

      - id: GOV-4
        title: Floor & corpus change governance ("changed since your last pull")
        priority: P2
        effort: S
        status: done
        source: {lens: trust, verdict: KEEP + blind-spot (generalize to whole corpus)}
        problem: >-
          The always-loaded floor is the highest-trust, least-reviewed surface — it
          changes silently via git diff. More generally, a teammate's pull can add/
          remove/supersede memories with no legible signal.
        proposal: >-
          A SessionStart producer diffing the current floor pointer-set (and, in the
          general case, the committed corpus) against a per-clone gitignored
          watermark: "the always-loaded floor changed since your last pull: +2/−1
          <names>" and "a teammate's pull added 3 / removed 1 / superseded 2." Route
          to review; de-dupe so a seen change stays quiet. Drop the CODEOWNERS
          speculation (policy hippo doesn't own).
        acceptance_criteria:
          - a floor/corpus change since the last seen watermark surfaces once, names the delta, and routes to review
          - a change already seen does not re-nag
        dependencies: []
        invariant_note: read-only, per-clone gitignored watermark (inv1); floor stays user-owned markdown (inv1); loud (inv3).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). WATERMARK FILE: a JSON under CLAUDE_PLUGIN_DATA
          named .gov4-watermark-<key> where <key> =
          sha256(realpath(repo_root))[:16] — copy _periodic_nudge_should_fire's key
          derivation VERBATIM (session_start.py), do not re-derive. Store
          {"floor": sorted(fused_floor_names(memory_dir, index_dir)),
          "corpus": sorted(stems from provenance._iter_memory_files)}. DETECTION =
          sorted-set diff, git-free (a teammate's pull changes files without a known base
          commit; set-diff needs no git log — keep this producer cheap). Producer:
          floor_change_producer in PRODUCERS (3-arg ctx shape); render "+2/−1 <names>"
          for the floor and "added N / removed M" for the corpus; route to review.
          NO-RE-NAG: write the new watermark AFTER surfacing (the nudge counters'
          read-then-write pattern). DEGRADE: CLAUDE_PLUGIN_DATA unset → return None
          (silent) — do NOT fire-every-session here (unlike the trust nudge): without a
          durable watermark every session would scream "everything changed". First run
          (no watermark yet) → write baseline silently, no block. EXTENSION worth
          taking: store a content-hash per floor pointer so an EDITED (not just
          added/removed) floor memory also surfaces — the floor is the highest-trust
          surface and a silent body edit is exactly the risk. Feed the
          floor-changed-since-pull line into GOV-6. Tests: mirror test_blind_spot's
          CLAUDE_PLUGIN_DATA tmp-dir pattern; assert surfaced-once semantics.

      - id: GOV-5
        title: "/hippo:why — the recall receipt (glass-box, incl. abstention reason)"
        priority: P2
        effort: M
        status: done
        implementation_correction: >-
          SHIPPED 2026-07-08. ONE premise correction to the notes below: the ABSTENTION
          recipe ("re-run recall.recall with HIPPO_DENSE_FLOOR=0 + HIPPO_KNEE_RATIO=0, take
          the best hit, report its score against _dense_floor") quotes INCOMMENSURABLE
          numbers — recall() emits RRF-FUSED scores (~1/(RRF_K+rank), ≈0.017 scale; COR-8
          pins the emitted score to that fused value), while _dense_floor is a COSINE
          (0.50 default). "best candidate scored 0.016 < floor 0.60" would be a fabricated
          comparison. The shipped receipt instead recovers the exact thing
          _dense_rank_rows discards: ONE direct similarity probe over the already-loaded
          dense matrix (index.dense @ embed_query(query), entry rows only — the matrix is
          RET-2-widened with body-chunk rows), reporting the true best COSINE against the
          cosine floor. No env overrides needed at all; the env-override knobs stay
          verified-correct for their own purposes. Also shipped: honesty ordering in the
          receipt — untrusted corpus reports WITHHELD (SEC-1; nothing was scored) before
          any near-miss talk, and a ≥-floor best candidate names the display-time filter
          (old-invalidated / deleted file) instead of pretending a floor miss. Rest of the
          note held: env floors ARE read per-call (verified), BM25-only branch on
          index.dense_ready, containment relabel via _rules_hit_floor(), --why flag +
          thin skill + MCP why tool all sharing describe(why=True).
        source: {lens: trust, verdict: RESHAPE (re-run recall live, don't replay the ledger)}
        problem: >-
          Two questions most erode trust — "why did you surface that?" and "why did
          you NOT surface the thing I know we wrote down?" — have no answer; the
          hook is invisible by design and abstention scores aren't even logged.
        proposal: >-
          A read-only command/MCP surface that RE-RUNS recall.recall on the query
          (as recall_view already does) to produce a real per-hit breakdown —
          ranking that won, edges traversed, tier, salience — AND the ABSTENTION
          reason ("best candidate 0.42 < floor 0.60"). Extend recall_view; don't
          build a whole new ledger replay (the ledger lacks near-miss scores).
        acceptance_criteria:
          - '/hippo:why explains each injected pointer (winning ranking, edges, tier, salience)'
          - when recall abstained, it shows the best candidate's sub-floor score and the floor
          - a "(rule)" pointer's receipt names its containment score and floor
        dependencies: []
        invariant_note: read-only, off hot path (inv6); reinforces legibility (inv3).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). RECEIPT (injected side): everything needed is
          ALREADY on the result dict — score (real penalized), backend, via, note
          (typed edges), stale_banner, salience (components or None), corpus/root, and
          (once GOV-2 lands) steer — recall_view.describe just doesn't render note/
          salience/steer yet; extend its tag assembly. ABSTENTION REASON (the verified
          recipe): sub-floor scores are DISCARDED inside _dense_rank_rows, so recover
          them with a diagnostics re-run — in describe's empty-hits branch, re-run
          recall.recall with env HIPPO_DENSE_FLOOR="0" + HIPPO_KNEE_RATIO="0" set around
          the call (both overrides verified: 0 disables each), take the best hit, and
          report "best candidate <name> scored 0.42 < floor 0.60" using
          recall._dense_floor(index.model) for the floor value. BM25-ONLY CORPUS: there
          is no cosine floor (dense_ready False → dense ranking empty; BM25's match-set
          IS its floor) — report "no memory shares a token with this query" instead of a
          fabricated number; branch on index.dense_ready. RULE POINTERS: containment is
          ALREADY the hit's score — relabel it in the receipt ("(rule) — containment
          0.71 ≥ floor 0.60" via recall._rules_hit_floor()). SURFACE: prefer a
          --why/--diagnose flag on recall_view.main (no new skill dir needed) + a thin
          /hippo:why skill wrapper if the verb is wanted — the skill then joins the
          pinned list in test_skills_contract.test_shipped_skills_are_exactly_these and
          needs the CLAUDE_PLUGIN_DATA guard. EXTENSION worth taking: an MCP `why` tool
          delegating to the same code path (register in _TOOLS/_DISPATCH; update the
          exactly-N-tools test — see RCH-3's note).

      - id: GOV-6
        title: Trust scorecard — a consolidated doctor corpus-health rollup
        priority: P2
        effort: S
        status: done
        source: {lens: trust, verdict: KEEP-worthy (blind-spot — the aggregation seam)}
        problem: >-
          The governance signals are scattered point-checks (contradictions,
          blind-spots, floor drift, muted count, orphans); nothing rolls them up
          into one view a lead can scan before trusting the corpus.
        proposal: >-
          One doctor section: N unverified · N contested-unresolved · N muted-by-
          steering · N orphan-never-recalled · floor-changed-since-pull. The natural
          aggregation of GOV-1/GOV-2/GOV-4 + SIG-3.
        acceptance_criteria:
          - '`/hippo:doctor` prints a single trust-scorecard block aggregating the point-signals'
          - each number links to the producer/skill that resolves it
          - a number whose producer has not shipped renders as absent/zero, not an error
          - the T2 rules-plane counts (rule↔memory conflicts, rules-plane rot) roll up too
        dependencies: [GOV-1, GOV-2, GOV-4, SIG-3]   # every point-signal it rolls up (SIG-3 is T1; GOV-* are earlier in T4)
        invariant_note: read-only rollup (inv3); degrades gracefully when a source signal is absent.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). One new check_trust_scorecard(ctx) in doctor.py
          CHECKS. INPUTS (all verified live or arriving earlier in T4):
          contested-unresolved = GOV-1's all_typed_edges("contradicts") minus its
          resolved ledger → "→ /hippo:resolve"; rule↔memory conflicts + authority gaps =
          rules_plane.conflict_radar counts (T2) → "→ /hippo:consolidate"; rules-plane
          rot = rules_plane.rules_rot counts (T2) → "edit the named file"; blind spots =
          telemetry.abstention_backlog len (T1) → "→ /hippo:consolidate"; N pinned (and
          later muted) = GOV-2's manifest count; floor/corpus-changed-since-pull = GOV-4's
          watermark diff; orphans = links isolates ∩ never-recalled (soak.curation_report).
          FORMAT: one block, each number followed by its fix route (the existing "Fix:"
          convention). GRACEFUL ABSENCE: wrap each source so an unshipped producer
          contributes 0/absent — never an error (checks are double-guarded anyway).
          DETERMINISM (load-bearing): the scorecard must be a pure function of state —
          sort every iteration, no timestamps in the message — or
          test_doctor.test_render_is_deterministic_across_runs breaks; the line-count
          pins reference len(D.CHECKS) and auto-adjust. PLACEMENT: early in CHECKS
          (right after "trust") so a lead sees the rollup first; the point-checks below
          are the drill-down. EXTENSION worth taking: expose the same rollup as an MCP
          resource (hippo://scorecard) mirroring hippo://rules-view's SEC-1-gated
          template — agent-pulled, never auto-loaded.

      - id: GOV-7
        title: Author-set confidence tier (draft | verified | authoritative)
        priority: P3
        effort: S
        status: done
        source: {lens: trust, verdict: KEEP-worthy (blind-spot — the author's trust dial)}
        problem: >-
          Every trust signal is SYSTEM-derived (reinforcement, usage, contradiction);
          the author has no direct way to mark "this is a guess" vs "this is canon."
        proposal: >-
          A one-field frontmatter confidence tier set at write time, surfaced at
          inject (a compact marker) and in recall_view. Orthogonal to steering
          (relevance) and reconsolidation (system-derived).
        acceptance_criteria:
          - a memory can be authored draft|verified|authoritative; the tier renders at inject and in recall_view
          - the field is optional; absence reads as the current default
        dependencies: []
        invariant_note: additive frontmatter field (schema bump per ED-4); display-only, NOT a ranking input (avoids the popularity=correctness trap).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). THE BUMP RULE (settled by this audit, contrast
          GRW-7): a NEW frontmatter key NAME forces the corpus_format bump; reusing a
          shipped name does not. `confidence` is a new name ⇒ CORPUS_FORMAT_VERSION bump
          (+ the stamp-marker migration + re-bootstrap-no flag), even though it is
          optional/additive. WRITE: extend new_memory._render_frontmatter to emit
          `confidence` under metadata: when the author sets it (both-schema readers —
          top-level-then-metadata — are the shipped convention; absence = today's
          default). RENDER AT INJECT (the recommended AC reading): a compact marker in
          format_results' line assembly (e.g. " [draft]") + a tag in
          recall_view.describe. Because inject-time render forbids a per-hit file read,
          carry the field in the manifest: add it to build_index.compute_corpus's entry
          dict ⇒ index SCHEMA_VERSION bump + the refresh_index no-op-compare extension
          (identical mechanics to GOV-2's steer — if both land in T4, sequence the two
          bumps as consecutive clean breaks, GOV-2 first). NEVER a ranking input — pin
          that negatively (grep-style test: recall's scoring path reads steer but not
          confidence). EXTENSIONS worth taking: count "N draft / N unverified" in
          GOV-6's scorecard; a doctor line for "authoritative memories citing drifted
          code" (join confidence against find_stale output) — the highest-priority
          reverify targets.

  # ------------------------------------------------------------------ GRW ---
  - id: GRW
    name: Knowledge growth (capture & consolidation)
    extends: CAP + LIF + GRA
    goal: Turn sessions into durable, well-organized knowledge with less human toil — all heavy work at Stop/consolidate time, never the hot path, never autonomous-to-corpus.
    items:

      - id: GRW-1
        title: Higher-fidelity capture — verbatim diff-hunk evidence + seed salience
        priority: P1
        effort: M
        status: done
        source: {lens: capture, verdict: KEEP, leverage: 4}
        problem: >-
          The SessionEnd seed carries only changed_paths (name-only) + query
          previews, so a drafted memory paraphrases instead of quoting; and a deep
          pending queue is a flat blur of equal-looking seeds.
        proposal: >-
          (1) Evidence — extend the seed with bounded verbatim git DIFF HUNKS so the
          drain drafts WITH a fenced evidence block (LIF-8's verbatim-beats-
          extraction, on the capture side). (2) Salience — a cheap per-seed value
          score (new files? repeated abstention? commit landed? many distinct
          queries?) so the pending producer/listing rank high-value seeds first and
          LABEL trivial ones. Keep salience a label, never a gate or auto-prune.
        acceptance_criteria:
          - drafted memories can carry a fenced verbatim evidence block from the captured hunks
          - the pending queue orders high-value seeds first and labels no-op sessions
          - the drain runs the shipped secret-lint before any hunk-bearing draft lands
        dependencies: []
        invariant_note: cheap git I/O at SessionEnd, no LLM/hot-path (inv6); stays in the gitignored queue (inv4); MUST secret-lint hunks (widens the exposure surface).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). HUNKS: add capture._git_diff_hunks(head_commit,
          repo_root, *, max_bytes) — tracked changes via run_git(["diff","--unified=3",
          "-M", head_commit]); UNTRACKED files (a plain `git diff <commit>` misses them
          and they are the highest-value evidence) per-path via run_git(["diff",
          "--no-index","--",os.devnull,path]) over git ls-files --others
          --exclude-standard. run_git has NO output cap — slice the concatenation to a
          new _MAX_HUNK_BYTES (~20_000) on a line boundary; skip binaries. Store as
          seed["diff_hunks"] in gather_session_context and bump _SEED_SCHEMA 1→2 — the
          gitignored QUEUE's own schema, NOT the corpus format (no ED-4 event; say so in
          the capstone). MANDATORY LINT: run secrets.scan_text(diff_hunks) INSIDE
          gather_session_context; on a hit set seed["hunks_secret_flagged"]=true; add a
          hard consolidate/SKILL.md Step-1 instruction — run scan_with_remediation
          before fencing any hunk into a --body and refuse the fence on a match
          (write_memory's own lint is the backstop, not the gate). SALIENCE: a
          _seed_salience(seed, telemetry_dir) LABEL — new_files count, commit_landed
          (seed head != head_commit), distinct_queries, abstained (join
          telemetry.abstention_backlog); order read_pending/_format_listing/
          pending_capture_producer best-first and LABEL trivial sessions; NEVER gate or
          prune. LOAD-BEARING TEST PINS to extend, not break (tests/test_capture.py):
          test_capture_never_writes_to_the_corpus (byte-identical corpus),
          test_capture_module_imports_no_corpus_writer (AST pin — capture.py must NOT
          import new_memory), test_seed_carries_full_provenance (assert the exact new
          fields), test_non_git_repo_still_captures_queries (hunks degrade to ""/absent).

      - id: GRW-2
        title: Hebbian co-recall edges — densify the graph from what surfaces together
        priority: P1
        effort: M
        status: done
        source: {lens: capture, verdict: KEEP, leverage: 4}
        problem: >-
          GRA-3 auto-links only by write-time recall similarity (BM25-only by
          construction — new_memory's link-discovery pass disables dense); nothing
          captures pairs that are semantically DISTANT but operationally inseparable
          (a bug + its unrelated-looking workaround). The episode buffer's co-recall
          signal is read by nothing.
        proposal: >-
          At consolidate, tally distinct-session CO-RECALL pairs from the episode
          buffer; pairs co-surfacing across ≥N distinct sessions get a per-item,
          agent-gated edge proposal. Use a HIGH threshold so a sparse/noisy map
          stays EMPTY rather than proposing spurious pairs. Once landed, GRA-1's
          1-hop expansion carries the associate for free. Ride untyped [[wikilinks]]
          to avoid a schema bump, OR take one clean bump for an `associates` edge —
          never a compat shim.
        acceptance_criteria:
          - memories co-recalled across ≥N distinct sessions yield an agent-gated edge proposal
          - below threshold, nothing is proposed (no spurious edges); accepted edges feed 1-hop expansion
        dependencies: []
        invariant_note: per-item gated at consolidate (inv4), zero hot-path (inv6); a distinct edge type is a clean bump (inv5/ED-4).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). TALLY (net-new, home = telemetry.py beside
          abstention_backlog, the reader-lives-with-the-ledger convention):
          co_recall_pairs(telemetry_dir, *, min_sessions=_CORECALL_MIN_SESSIONS) —
          iterate read_episodes, union recalled_names per session_id FIRST (a chatty
          single session counts once, structurally), pair via frozenset, count DISTINCT
          sessions per pair, return [{"pair":[a,b],"sessions":n}] for n >= threshold,
          sorted desc; below threshold → [] (the sparse-map-stays-empty bar).
          _CORECALL_MIN_SESSIONS: start HIGH (3-4). EXCLUDE floor names
          (lint_floor.floor_memory_names) — always-recalled floor memories would
          dominate every pair. EDGE TYPE DECISION (pick ONE, no shim): recommend option
          A — UNTYPED [[wikilink]] appended per-item by the agent to one side's body
          (the audit skill's Phase-5 two-turn pattern; zero schema bump; feeds
          recall._expand_neighbors immediately since expansion unions out|in untyped
          edges). Option B (a distinct `associates` in links.TYPED_RELATIONS) is a
          corpus_format clean break per ED-4 — take it only if associates must be
          visually distinct from hand-authored Related: lines. CONSUMER: a new
          consolidate/SKILL.md step (or audit block) that calls co_recall_pairs, drops
          pairs already adjacent in links.build_graph().adjacency/typed, and proposes
          per-item. Accepted edges ride the next links.json refresh into 1-hop
          expansion — no recall change needed.

      - id: GRW-3
        title: Consolidate-time merge of near-duplicate committed memories
        priority: P2
        effort: M
        status: done
        source: {lens: capture, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          LIF-2 dedups one NEW memory at write time; audit ARCHIVES; nothing MERGES
          two already-committed near-duplicates into a single canonical note — the
          most common accretion toil, untouched.
        proposal: >-
          A consolidate-time pass over high-similarity committed pairs (reuse the
          neighbor machinery) that proposes a per-item MERGE into one canonical
          memory, rewriting inbound links/edges to the survivor. Agent-gated,
          off hot path.
        acceptance_criteria:
          - a near-duplicate committed pair yields a per-item merge proposal with a canonical survivor
          - inbound [[links]] and typed edges are rewritten to the survivor on merge (no dangling)
        dependencies: []
        invariant_note: per-item agent-gated merge (inv4); reuses shipped neighbor machinery.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). DETECTION: reuse the AUDIT skill's GRA-3
          densification pass (recall(memory_doc_text(name,text)) per sampled memory,
          LINK_SIM_MAX_SAMPLE=200 cap, O(1) index lookups each) — NOT
          new_memory._duplicate_neighbors (that scores a rendered DRAFT vs the index;
          committed-vs-committed is what the audit sweep already computes). Add a MERGE
          tier above the link tier: flag when the pair clears a HIGH threshold (reuse
          _DUP_COSINE_THRESHOLD=0.80) — require BOTH directions (a↔b) above threshold to
          kill one-way false pairs; skip pairs where one side carries invalid_after
          (already demoted → supersede, don't merge). MERGE MECHANICS — HARD FACT: NO
          body-rewrite primitive exists anywhere; do NOT build one. The merge is
          PER-ITEM AGENT INSTRUCTIONS (the audit Phase-5 posture): (i) pick survivor;
          (ii) fold loser's body by hand; (iii) rewrite each LinkGraph.inbound(loser)
          referrer's [[loser]] → [[survivor]] by hand; (iv) for each
          typed_inbound(loser, rel) referrer, links.add_typed_relation(referrer_path,
          rel, survivor) then hand-remove the stale target; (v) optionally
          add_typed_relation(survivor, "supersedes", loser) as the machine-readable
          forwarding pointer; (vi) archive.archive_memory(loser) — its GRA-5 inbound
          guard REFUSES until (iii)+(iv) zero the inbound set, which STRUCTURALLY
          enforces the no-dangling AC. HOME: extend /hippo:audit (a "Merge candidates"
          report block + the existing two-turn apply gate) — it already owns the
          neighbor sweep; GRW-8 forks the same sweep (see its note).
        implementation_correction: >-
          SHIPPED 2026-07-09. TWO premise corrections against the note above, both the
          same class T4's GOV-5 hit. (1) SCALE ERROR: "reuse the audit densification
          pass … flag when the pair clears _DUP_COSINE_THRESHOLD=0.80" is incoherent
          against the live tree — the densification pass reads recall()'s RRF-FUSED
          h["score"] (~1/60 per contributing backend, COR-8; the pass applies NO
          threshold at all, top-K report only), which never approaches a 0.80 COSINE.
          And the note's own "NOT _duplicate_neighbors" prohibition rested on that same
          false premise ("committed-vs-committed is what the audit sweep already
          computes" — it computes fused ranks, not threshold-comparable similarity).
          Shipped the inverse: a public new_memory.committed_duplicate_neighbors
          wrapper (the write-time dup mechanic — dense cosine 0.80 / normalized BM25
          0.45, own-name exclusion — fed the committed file's own text; public because
          skills never import underscore-privates), called per sampled name in the
          audit sweep; a pair is a candidate only when BOTH directions clear the
          calibrated threshold, with staleness.invalid_after_map guarding the
          demoted-side skip. (2) SEQUENCE BUG: the note's (v)-then-(vi) recipe cannot
          pass its own enforcer — the optional supersedes pointer in (v) IS a typed
          inbound edge on the loser, so (vi)'s GRA-5 guard refuses. Shipped as two
          EXCLUSIVE per-item endings: demote-in-place via the shipped
          `--reverify <loser> --outcome demote --superseded-by <survivor>` flow (keeps
          the forwarding pointer, chains invalid_after), or archive after (iii)+(iv)
          zero the inbound set (clean removal, guard-proven). Everything else in the
          note held.

      - id: GRW-4
        title: Capture the WHY — session decisions/rationale into the seed
        priority: P2
        effort: M
        status: done
        source: {lens: capture, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          The seed captures WHAT changed (diff, GRW-1) but not the WHY — the salient
          tradeoffs/decisions — which is exactly what makes a durable memory and
          cannot be re-derived from git or code.
        proposal: >-
          A bounded capture of user-confirmed session decisions/rationale, added to the
          seed alongside the diff hunks — complements GRW-1, does not duplicate it.
          Confirmed content only (no fabrication). (REDESIGNED post-T2 audit: hook-time
          transcript mining is IMPOSSIBLE — see implementation_notes — so the WHY is
          captured in-session by the agent, never scraped at Stop.)
        acceptance_criteria:
          - a session's confirmed key decisions are captured into the seed as durable rationale
          - nothing is captured that the user did not state/confirm (no synthesis)
        dependencies: [GRW-1]
        invariant_note: capture-from-evidence spine (no fabrication); gitignored queue (inv4).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). HARD FACTS the design must respect: hooks.json
          has NO Stop event (UserPromptSubmit/SessionStart/PreCompact/SessionEnd/
          SubagentStop/PostToolUse only); the SessionEnd payload carries only
          {session_id, reason}; NOTHING in the codebase reads a transcript; and hooks
          run no LLM (inv6) — so a Stop-hook transcript scrape is triply impossible. Do
          NOT add one. The honest mechanism: (1) add an optional seed field
          "decisions": [str] (part of GRW-1's _SEED_SCHEMA 2 — coordinate), populated
          only by AGENT-CONFIRMED text; (2) the capture moment is IN-SESSION — extend the
          PreCompact nudge (memory_pre_compact.sh already prompts the agent to save
          durable facts before compaction — the one existing end-of-context surface) and
          the consolidate drain (when the draining agent still holds the session in
          context, prompt it to add user-confirmed rationale to the draft's --body);
          (3) confirmed content ONLY — the prompt text must require quoting/paraphrasing
          what the USER stated, never inferring from the diff (the hunks are the WHAT;
          the WHY is transcription, not synthesis). Test pins: seed tolerates an absent
          decisions field; capture.py still imports no corpus writer (AST pin).

      - id: GRW-5
        title: Commit-watermark re-verify — staleness at commit precision
        priority: P2
        effort: M
        status: done
        source: {lens: frontier, verdict: RESHAPE (watermark diff, NOT a git hook)}
        problem: >-
          Staleness is discovered lazily (find_stale re-scans against a git-log
          window at SessionStart), missing commits older than the window and long
          sessions with many commits and no restart.
        proposal: >-
          At SessionStart, diff <episode-watermark-commit>..HEAD (the watermark is
          already in the episode buffer) and intersect against corpus cited_paths to
          seed a precise per-item re-verify worklist. Same commit-precision as an
          opt-in git hook, ZERO new run surface (drop the git-hook version — it risks
          inv2 and collides with Husky/pre-commit).
        acceptance_criteria:
          - commits since the last watermark that touch cited files produce a precise per-item re-verify worklist
          - no .git/hooks surface is added; routes to the existing semantic_reverify gate
        dependencies: []
        invariant_note: reuses the episode watermark + provenance; per-item gated (inv4); no new run surface (inv2).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). ATTACH: session_start._build_run_context — it
          already runs find_stale + recalled_stale_worklist once per SessionStart. Read
          the LAST session's watermark from the episode buffer (lift the
          most-recent-session scan resume_card_producer already does →
          seed head_commit); compute run_git(["diff","--name-only",
          f"{watermark}..HEAD"], repo_root) — run_git returns "" when the sha is
          unreachable (the squash-merge case; GRW-6 heals it, don't guess here).
          Intersect the diff set with session_start._corpus_cited_union(memory_dir);
          each memory whose cited_paths hit → {"name","changed_paths"}. MERGE POINT:
          UNION into recalled_stale_worklist's output so everything routes through the
          ONE semantic_reverify gate — cleanest as a new watermark_stale= keyword param
          on recalled_stale_worklist (the exact shape of its existing stale= precomputed
          param; dedup by name). NO .git/hooks surface (the roadmap killed that
          variant — inv2). BOUND the diff read (reuse the _MAX_CHANGED_PATHS
          discipline) so a monorepo-wide <old>..HEAD stays cheap. EXTENSION worth
          taking: persist the last-verified watermark in the gitignored index dir so a
          LONG single session (many commits, no restart) re-checks incrementally.
          Tests: mirror test_reconsolidate's precomputed-list pattern (the stale= tests)
          for the new param; a hermetic repo with a commit between two watermarks
          asserting the touched memory joins the worklist.

      - id: GRW-6
        title: Squash-merge provenance auto-rebaseline (healing, not just detection)
        priority: P2
        effort: M
        status: done
        source: {lens: frontier, verdict: KEEP-worthy (blind-spot)}
        problem: >-
          SHP-3 only DEGRADES around a source_commit sha absent after a squash-merge:
          find_stale falls back to the memory's own recorded source_commit_time (a
          weaker, self-reported staleness signal a git-cross-checked sha would beat),
          and the break is never healed.
        proposal: >-
          A SessionStart git-event producer that detects a just-merged branch
          (merge-base/reflog) and offers a per-item, agent-gated watermark
          rebaseline — turning hippo's git-nativeness into REPAIR, not just a
          tripwire.
        acceptance_criteria:
          - after a squash-merge, memories with unresolvable baselines are offered a per-item rebaseline
          - rebaseline is agent-gated; nothing is re-baselined in bulk (inv4)
        dependencies: []
        invariant_note: per-item agent-gated (inv4), off hot path; extends SHP-3 detection into healing.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). THE HEALER ALREADY EXISTS: provenance.
          reverify_file re-baselines source_commit to HEAD, re-derives cited_paths,
          strips invalid_after — per-item, human-confirmed. GRW-6 is detection + offer,
          never a new write path and NEVER bulk (keep semantic_reverify's
          single-item-only signature pin intact). DETECTION (SessionStart producer,
          mirror unresolvable_baseline_producer): a squash-merge leaves NO merge commit,
          so probe three cheap signals — run_git(["reflog","-n","50","--format=%gs"])
          grepped for merge/pull subjects; run_git(["log","--oneline","-n","20",
          "--format=%s"]) for a squash subject (e.g. "(#N)"); run_git(["branch",
          "--merged"]) for freshly-merged branches — AND confirm the actual break with
          staleness.count_unresolvable_baselines(memory_dir, repo_root) > 0 (no break →
          silent, whatever the reflog says). OFFER: list the unresolvable-baseline
          memories per-item, route each to reverify_file via the consolidate drain —
          the agent confirms the memory still holds post-merge before the rebaseline
          (reverify_file IS the confirmation primitive). Pair naturally with GRW-5:
          the watermark diff and merge detection share one SessionStart git read
          moment. Tests: hermetic repo that squash-merges a branch citing a memory's
          file; assert the producer fires once, names the memory, and reverify_file
          clears count_unresolvable_baselines.

      - id: GRW-7
        title: Temporal auto-stamp — close invalid_after at supersession
        priority: P3
        effort: S
        status: done
        source: {lens: capture, verdict: RESHAPE (stamp only; defer the as-of retrieval mode)}
        problem: >-
          GRA-4 uses invalid_after only as a recall penalty, and it is only ever
          written by a semantic_reverify demotion; the succession moment is never
          recorded as an explicit validity boundary, so a supersede's demotion is a
          silent score nudge rather than an auditable fact.
        proposal: >-
          When the agent writes a supersedes edge, ALSO stamp the loser's EXISTING
          invalid_after field at the successor's commit date via the shipped
          set_invalid_after (staleness.py) — making demotion auditable at supersede
          time, not only via a reverify. This REUSES the one canonical field name
          (invalid_after), so it is NOT a new field and needs NO schema bump.
          (NARROWED post-T2 audit: the demote path ALREADY stamps invalid_after at
          now-UTC — the item is threading the SUCCESSOR'S COMMIT DATE into that stamp
          and covering the currently-unstamped edge-writing combinations.) DEFER
          the --as-of retrieval mode + a valid_from birth field (rare query; flirts
          with the no-query-DSL non-goal).
        acceptance_criteria:
          - a supersede stamps the loser's invalid_after at the successor's commit date; demotion is now explainable
          - no --as-of query mode is added in this item
        dependencies: []
        invariant_note: reuses the shipped invalid_after field + set_invalid_after — no new field, so NO schema bump (inv5 is satisfied by using the one canonical name, not by a clean break); keeps clear of a query DSL (non-goal).
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). VERIFIED BASELINE: reconsolidate.semantic_reverify's
          demote arm already calls set_invalid_after(path) — now-UTC, regardless of
          superseded_by; the fix+superseded_by combination stamps NOTHING (reverify_file
          clears staleness instead). THE CHANGE (one attach point — the
          `if successor_path is not None:` block where BOTH endpoints are known, right
          after add_typed_relation): compute successor_ts from the SUCCESSOR file's last
          commit (provenance git-last-commit-with-time helper → epoch →
          UTC ISO-8601) — NOT read_source_commit_time(successor), which is the
          successor's CITED-CODE baseline, not its authorship date — falling back to
          now-UTC when the successor is uncommitted (just written this session). Then
          pass ts=successor_ts INTO the demote arm's existing set_invalid_after call
          when superseded_by is set (one write, not a second stamp; set_invalid_after
          refreshes on a differing ts). GUARD the fix+superseded_by tension explicitly:
          "fix" (verified current) contradicts "superseded" — either treat it as
          demote-of-old or refuse the combination with a clear error; do not stamp a
          memory that reverify_file just re-baselined. Record the stamp in the
          reconsolidation ledger event so the boundary is auditable. NO schema bump
          (pin via read_invalid_after in the test). Tests: extend
          test_reconsolidate's superseded_by cases — assert the loser's invalid_after
          equals the successor's commit date ISO (and the uncommitted-successor
          fallback).

      - id: GRW-8
        title: Contradiction adjudication on audit's existing neighbor pass
        priority: P2
        effort: S
        status: done
        source: {lens: capture, verdict: RESHAPE (augment audit, don't build a module)}
        problem: >-
          Two memories can directly contradict with zero code drift; reconsolidation
          only fires on staleness, so it never touches them, and GRA-4's contradicts
          edge exists but nothing DETECTS the contradiction.
        proposal: >-
          Add a CONTRADICTION-adjudication lens to /hippo:audit's EXISTING
          high-similarity neighbor-pair pass: for each surfaced pair ask "do these
          DISAGREE?" and route a yes to a per-item contradicts/supersedes edge. A
          prompt addition riding shipped machinery (S, not a new M scanner). The
          contradicts edges it proposes drain through the GOV-1 inbox (T4, ships first).
        acceptance_criteria:
          - audit's neighbor pass flags genuinely-contradicting pairs and proposes a per-item typed edge
          - concordant near-duplicates are not mislabelled as contradictions
        dependencies: [GOV-1]      # GOV-1 (T4) is the inbox these edges drain into
        invariant_note: report-only detection + per-item edge (inv4); reuses audit's neighbor machinery.
        implementation_notes: >-
          AUDITED 2026-07-08 (post-T2). A PROMPT ADDITION to plugin/skills/audit/SKILL.md,
          not a module: extend the existing GRA-3 densification block (the
          link_density_suggestions loop — recall() per sampled memory,
          LINK_SIM_MAX_SAMPLE cap) with a classifier fork. SHARE ONE SWEEP with GRW-3:
          for each surfaced high-similarity pair the agent verdicts THREE ways —
          (a) concordant restatement → GRW-3 merge candidate; (b) genuine DISAGREEMENT
          (opposing claims about the same thing) → propose links.add_typed_relation(
          path, "contradicts", other) per-item (or "supersedes" when one side clearly
          wins); (c) neither → densification link candidate as today. The prompt MUST
          spell out the (a)-vs-(b) distinction — "reworded duplicate" is NOT a
          contradiction (the mislabel AC). Proposals ride the SAME Phase-5 two-turn
          apply gate as densification — never autonomous. Accepted contradicts edges
          drain through GOV-1's inbox (T4, ships first) and automatically light the T2
          rules_conflict producer when the pair is governance-cited, plus recall's
          existing "contradicts … — verify" typed note. Emit a new report block
          ("Contradiction candidates") beside the densification table so the audit
          report stays deterministic.

  # ------------------------------------------------------------------ RCH ---
  - id: RCH
