        proposal: >-
          When LIF-7 becomes eligible (its CAP-soak gate clears), implement its
          promotion as a per-item, PR-able .claude/rules/<name>.md whose `paths:` is
          derived from the memory's cited_paths, rather than an unscoped CLAUDE.md
