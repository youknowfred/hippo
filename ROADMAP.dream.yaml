# ============================================================================
# hippo — /dream: the generative sleep pass (EXECUTABLE roadmap)
# ============================================================================
# The EXECUTABLE form of EXPLORATIONS.dream.md (the design) + DRM-2.spec.md (the
# auto-apply loop spec). A single new verb — /dream — decomposed into the DRM
# workstream: six dependency-sequenced, fully-scoped items for multi-session
# implementation.
#
# /dream is the GENERATIVE function of sleep — replay that recombines existing
# memories into net-new graph structure — the one sleep function hippo's
# housekeeping verbs (consolidate / reconsolidate / staleness / salience) do NOT
# cover. Its identity move is REVERSIBLE AUTONOMY: the safety mechanism is
# git-revertibility, not human approval, so /dream auto-applies its SAFEST outputs
# and offers undo after — spending autonomy where undo is real and blast radius is
# a ranking nudge, and holding the gate only where undo-after genuinely fails.
#
# DRM ids use a NEW namespace so they never collide with round 1 (SIG/RUL/RCL/GOV/
# GRW/RCH), round 2 (MSR/GRF/SEN/TMB/CLB/IOP), ROADMAP.yaml (RET/GRA/LIF/CAP/INT/
# TEA/SEC), or ROADMAP.v1.md.
#
# Companion documents:
#   EXPLORATIONS.dream.md — the design (niche, landscape, autonomy model, proof)
#   DRM-2.spec.md         — the Tier-A auto-apply + notify-with-undo loop spec
#   ROADMAP.enhancements2.yaml — the round-2 train this mirrors in shape (MSR-5 etc.)
# ============================================================================

